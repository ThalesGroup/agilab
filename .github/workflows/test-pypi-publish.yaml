name: test-pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version (e.g. 0.7.4 or v0.7.4). If omitted on tag runs, the tag name is used."
        required: false
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: test-pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.TEST_PYPI_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Resolve TestPyPI version (auto .postN if needed)
        id: resolve
        run: |
          set -euo pipefail
          BASE_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          BASE_VERSION="${BASE_VERSION#refs/tags/}"
          BASE_VERSION="${BASE_VERSION#v}"

          echo "Base version: $BASE_VERSION"

          PKGS="agi-env agi-node agi-cluster agi-core"
          NEED_POST=0
          MAX_POST=0

          for pkg in $PKGS; do
            url="https://test.pypi.org/pypi/$pkg/json"
            if curl -fsS "$url" > resp.json; then
              if jq -e --arg v "$BASE_VERSION" '.releases[$v]' resp.json > /dev/null; then
                NEED_POST=1
              fi
              POST=$(jq -r 'keys[]' resp.json | grep "^$BASE_VERSION\.post" | sed -E "s/.*\.post([0-9]+)/\1/" | sort -n | tail -1 || true)
              if [ -n "$POST" ]; then
                MAX_POST=$(( POST > MAX_POST ? POST : MAX_POST ))
              fi
            fi
          done

          if [ $NEED_POST -eq 1 ]; then
            NEXT=$((MAX_POST+1))
            TARGET="$BASE_VERSION.post$NEXT"
          else
            TARGET="$BASE_VERSION"
          fi

          echo "Resolved target version: $TARGET"
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Update versions in core pyproject.toml
        env:
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          set -euxo pipefail
          py=$(command -v python || command -v python3)
          "$py" - <<'PY'
          import os, re
          from pathlib import Path
          target = os.environ["TARGET"]
          roots = [
              Path("src/agilab/core/agi-env/pyproject.toml"),
              Path("src/agilab/core/agi-node/pyproject.toml"),
              Path("src/agilab/core/agi-cluster/pyproject.toml"),
              Path("src/agilab/core/agi-core/pyproject.toml"),
          ]
          def set_version(text: str, ver: str) -> str:
              return re.sub(r'(?m)^\s*version\s*=.*$', f'version = \"{ver}\"', text)
          for p in roots:
              s = p.read_text(encoding="utf-8")
              p.write_text(set_version(s, target), encoding="utf-8")
              print(f"[ok] {p}: version -> {target}")
          PY

      - name: Build core wheels
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            pushd "src/agilab/core/$pkg"
              rm -rf dist build
              uv build --wheel
            popd
          done

      - name: Ensure TestPyPI token present
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "ERROR: Missing TEST_PYPI_API_TOKEN or TEST_PYPI_SECRET" >&2
            exit 2
          fi
          echo "Found TestPyPI token (length: ${#TWINE_PASSWORD})"

      - name: Upload core wheels to TestPyPI
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            twine upload \
              --verbose \
              --repository-url https://test.pypi.org/legacy/ \
              --non-interactive --skip-existing \
              "src/agilab/core/${pkg}/dist/*"
          done

      - name: Guard: ensure root pyproject.toml exists
        run: test -f pyproject.toml

      - name: Update umbrella agilab version & pin core deps
        env:
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          set -euxo pipefail
          py=$(command -v python || command -v python3)
          "$py" - <<'PY'
          import os, re
          from pathlib import Path
          target = os.environ["TARGET"]
          p = Path("pyproject.toml")
          lines = p.read_text(encoding="utf-8").splitlines(True)
          dep_pat = re.compile(r'(?P<q>["\'])(agi-env|agi-node|agi-cluster|agi-core)(?P<extras>\[[^"\']*\])?[^"\']*(?P=q)')
          out, section = [], None
          for line in lines:
              if line.strip().startswith("["):
                  section = line.strip("[] \n")
              if section == "project" and line.strip().startswith("version"):
                  line = f'version = "{target}"\n'
              if section and (section == "project" or section.startswith("project.")):
                  line = dep_pat.sub(lambda m: f'{m.group(1)}{m.group(2)}{m.group("extras") or ""}=={target}{m.group(1)}', line)
              out.append(line)
          p.write_text("".join(out), encoding="utf-8")
          print(f"Updated {p} to version={target} and pinned deps.")
          PY

      - name: Build agilab (wheel + sdist)
        run: |
          set -euxo pipefail
          rm -rf dist build
          uv build --sdist --wheel

      - name: Upload agilab to TestPyPI
        run: |
          set -euxo pipefail
          twine upload \
            --verbose \
            --repository-url https://test.pypi.org/legacy/ \
            --non-interactive --skip-existing \
            dist/*
