name: test-pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version (e.g. 0.7.4 or v0.7.4). If omitted on tag runs, the tag name is used."
        required: false
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: test-pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.TEST_PYPI_SECRET }}
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Resolve unified TestPyPI version
        id: resolve
        uses: actions/github-script@v7
        env:
          BASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        with:
          script: |
            // Node 20 has global fetch; core is injected.
            const enc = encodeURIComponent;
            const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            async function getReleases(name) {
              const url = `https://test.pypi.org/pypi/${enc(name)}/json`;
              try {
                const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!res.ok) {
                  core.warning(`HTTP ${res.status} from ${url}`);
                  return { releases: {} };
                }
                return await res.json();
              } catch (e) {
                core.warning(`Fetch failed for ${name}: ${String(e)}`);
                return { releases: {} };
              }
            }
            const baseRaw = (process.env.BASE_VERSION || '')
              .trim().replace(/^refs\/tags\//, '').replace(/^v/i, '');
            if (!baseRaw) throw new Error('BASE_VERSION is empty');
            core.info(`Base version input: ${baseRaw}`);

            const pkgs = ['agi-env','agi-node','agi-cluster','agi-core'];
            const runNumber = parseInt(process.env.GITHUB_RUN_NUMBER || '1', 10);

            let needPost = false, maxPost = 0;
            const re = new RegExp(`^${esc(baseRaw)}\\.post(\\d+)$`);

            for (const p of pkgs) {
              const data = await getReleases(p);
              const versions = Object.keys(data.releases || {});
              if (versions.includes(baseRaw)) needPost = true;
              for (const v of versions) {
                const m = v.match(re);
                if (m) maxPost = Math.max(maxPost, Number(m[1]));
              }
            }

            const nextPost = Math.max(maxPost + 1, runNumber);
            const target = needPost ? `${baseRaw}.post${nextPost}` : baseRaw;

            core.setOutput('target', target);
            core.info(`Unified core version => ${target}`);

      - name: Update versions in core pyproject.toml files
        env:
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          set -euxo pipefail
          py=$(command -v python || command -v python3)
          "$py" - <<'PY'
          import os, re
          from pathlib import Path
          target = os.environ["TARGET"]
          roots = [
              Path("src/agilab/core/agi-env/pyproject.toml"),
              Path("src/agilab/core/agi-node/pyproject.toml"),
              Path("src/agilab/core/agi-cluster/pyproject.toml"),
              Path("src/agilab/core/agi-core/pyproject.toml"),
          ]
          def set_version(text: str, ver: str) -> str:
              return re.sub(r'(?m)^\s*version\s*=\s*["\']?[^"\']+["\']?\s*$', f'version = "{ver}"', text)
          for p in roots:
              s = p.read_text(encoding="utf-8")
              s2 = set_version(s, target)
              p.write_text(s2, encoding="utf-8")
              print(f"[ok]   {p}: version -> {target}")
          PY

      - name: Build core wheels
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            pushd "src/agilab/core/$pkg"
              rm -rf dist build
              uv build --wheel
            popd
          done

      - name: Ensure TestPyPI token present
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "ERROR: Missing TEST_PYPI_API_TOKEN or TEST_PYPI_SECRET (TestPyPI API token from https://test.pypi.org)" >&2
            exit 2
          fi
          echo "Found TestPyPI token (length: ${#TWINE_PASSWORD})"

      - name: Upload core wheels to TestPyPI
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            twine upload \
              --verbose \
              --repository-url https://test.pypi.org/legacy/ \
              --non-interactive --skip-existing \
              "src/agilab/core/${pkg}/dist/*"
          done

      - name: "Guard: ensure root pyproject.toml exists"
        run: |
          set -euo pipefail
          test -f pyproject.toml || { echo "pyproject.toml not found at repo root"; ls -la; exit 1; }

      - name: "Update umbrella agilab version & pin core deps (root pyproject.toml)"
        env:
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          set -euxo pipefail
          py=$(command -v python || command -v python3)
          "$py" - <<'PY'
          import os, re
          from pathlib import Path

          target = os.environ["TARGET"]
          p = Path("pyproject.toml")
          lines = p.read_text(encoding="utf-8").splitlines(True)  # keep EOLs

          def section_name(line: str):
              m = re.match(r'^\s*\[([^\]]+)\]\s*$', line)
              return m.group(1).strip() if m else None

          # Quoted deps for our 4 packages; preserve extras + quotes; markers live outside quotes
          dep_pat = re.compile(
              r'(?P<q>["\'])'
              r'(?P<name>agi-env|agi-node|agi-cluster|agi-core)'
              r'(?P<extras>\[[^"\']*\])?'
              r'(?P<rest>[^"\']*)'
              r'(?P=q)'
          )
          def pin_in_line(line: str) -> str:
              def repl(m):
                  q = m.group('q')
                  base = m.group('name') + (m.group('extras') or '')
                  return f'{q}{base}=={target}{q}'
              return dep_pat.sub(repl, line)

          out = []
          current_section = None

          for line in lines:
              sec = section_name(line)
              if sec is not None:
                  current_section = sec
                  out.append(line)
                  continue

              # version = "<target>" only inside [project]
              if current_section == 'project' and re.match(r'^\s*version\s*=', line):
                  indent = re.match(r'^(\s*)', line).group(1)
                  line = f'{indent}version = "{target}"\n'

              # pin quoted deps in [project] and [project.*] (e.g., optional-dependencies)
              if current_section and (current_section == 'project' or current_section.startswith('project.')):
                  line = pin_in_line(line)

              out.append(line)

          new_txt = ''.join(out)
          p.write_text(new_txt, encoding="utf-8")
          print(f"Updated {p} to version={target} and pinned core deps.")
          PY

      - name: Build agilab (wheel + sdist) from root
        working-directory: .
        run: |
          set -euxo pipefail
          rm -rf dist build
          uv build --sdist --wheel

      - name: Upload agilab to TestPyPI
        working-directory: .
        run: |
          set -euxo pipefail
          twine upload \
            --verbose \
            --repository-url https://test.pypi.org/legacy/ \
            --non-interactive --skip-existing \
            dist/*
