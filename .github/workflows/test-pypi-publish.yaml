name: test-pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release (e.g. v0.3.66 or 0.3.66)"
        required: true
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: test-pypi-publish-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Fix accidental O.* version typos (core only)
        run: |
          set -euxo pipefail
          find src/agilab/core -type f -name pyproject.toml -print0 |
          while IFS= read -r -d '' f; do
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$f"
          done
          if grep -R --line-number '^[[:space:]]*version[[:space:]]*=[[:space:]]*"O\.' src/agilab/core; then
            echo "❌ Still found bad version lines (capital O)"; exit 1
          fi

      - name: Sync and install editable core projects
        run: |
          set -eux
          pushd "src/agilab/core/agi-cluster"
          uv sync --dev
          uv pip install -e .
          uv pip install -e ../agi-env
          uv pip install -e ../agi-node
          popd

      - name: Run tests
        run: |
          set -eux
          pushd "src/agilab/core"
          uv run --dev --project agi-cluster python -m pytest --maxfail=5 --disable-warnings -v
          popd

  publish-core-packages-testpypi:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: |
          rm -rf src/agilab/core/agi-env/dist
          rm -rf src/agilab/core/agi-node/dist
          rm -rf src/agilab/core/agi-cluster/dist
          rm -rf src/agilab/core/agi-core/dist

      - name: Resolve TestPyPI versions (per package)
        id: resolve
        uses: actions/github-script@v7
        env:
          BASE_VERSION: ${{ env.VERSION }}
        with:
          script: |
            const base = (process.env.BASE_VERSION || '').replace(/^v/i, '');
            if (!base) core.setFailed('Empty base version.');
            const pkgs = ['agi-env','agi-node','agi-cluster','agi-core'];
            const runNumber = parseInt(process.env.GITHUB_RUN_NUMBER || '1', 10);

            async function releases(pkg) {
              try {
                const res = await fetch(`https://test.pypi.org/pypi/${pkg}/json`, { headers: { 'Accept':'application/json' } });
                if (!res.ok) return [];
                const data = await res.json();
                return Object.keys(data.releases || {});
              } catch { return []; }
            }
            const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            for (const p of pkgs) {
              const versions = await releases(p);
              let v = base;
              if (versions.includes(base)) {
                const re = new RegExp(`^${esc(base)}\\.post(\\d+)$`);
                const posts = versions.map(x => (x.match(re)||[])[1]).filter(Boolean).map(Number);
                const next = posts.length ? Math.max(...posts) + 1 : runNumber;
                v = `${base}.post${next}`;
              }
              core.setOutput(p.replace(/-/g,'_'), v);
              console.log(`${p} -> ${v}`);
            }

      - name: Update version in core pyproject.toml files
        env:
          AGI_ENV_VERSION:     ${{ steps.resolve.outputs.agi_env }}
          AGI_NODE_VERSION:    ${{ steps.resolve.outputs.agi_node }}
          AGI_CLUSTER_VERSION: ${{ steps.resolve.outputs.agi_cluster }}
          AGI_CORE_VERSION:    ${{ steps.resolve.outputs.agi_core }}
        run: |
          set -euxo pipefail
          bump_in_file() {
            local py="$1" ver="$2"
            awk -v NEWVER="$ver" '
              BEGIN{ in_project=0; replaced=0 }
              /^\[/{
                if(in_project && !replaced){ print "version = \"" NEWVER "\""; replaced=1 }
                in_project=0
              }
              /^\[project\]$/{ in_project=1 }
              {
                if(in_project && match($0, /^[[:space:]]*version[[:space:]]*=/)) next
                print $0
              }
              END{ if(in_project && !replaced){ print "version = \"" NEWVER "\"" } }
            ' "$py" > "$py.tmp" && mv "$py.tmp" "$py"
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$py"
            sed -i -E '/^[[:space:]]*dynamic[[:space:]]*=/d' "$py"
          }

          declare -A NEWVER=(
            ["agi-env"]="${AGI_ENV_VERSION}"
            ["agi-node"]="${AGI_NODE_VERSION}"
            ["agi-cluster"]="${AGI_CLUSTER_VERSION}"
            ["agi-core"]="${AGI_CORE_VERSION}"
          )

          for pkg in "${!NEWVER[@]}"; do
            base="src/agilab/core/$pkg"
            find "$base" -type f -name pyproject.toml -print0 | while IFS= read -r -d "" file; do
              echo "→ Updating $file to ${NEWVER[$pkg]}"
              bump_in_file "$file" "${NEWVER[$pkg]}"
            done
          done

      - name: Commit version bumps to a side branch (optional)
        run: |
          set -euxo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -B "ci/testpypi-bump-${GITHUB_RUN_ID}"
          git add $(find src/agilab/core -type f -name pyproject.toml -not -path "./.git/*")
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bump core package versions (auto .postN if needed)"
            git push -u origin "ci/testpypi-bump-${GITHUB_RUN_ID}"
          fi

      - name: Build, verify and publish core packages (loop)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_SECRET }}
        run: |
          set -euxo pipefail
          declare -A V=(
            ["agi-env"]="${{ steps.resolve.outputs.agi_env }}"
            ["agi-node"]="${{ steps.resolve.outputs.agi_node }}"
            ["agi-cluster"]="${{ steps.resolve.outputs.agi_cluster }}"
            ["agi-core"]="${{ steps.resolve.outputs.agi_core }}"
          )
          for pkg in agi-env agi-node agi-cluster agi-core; do
            echo "→ Building $pkg ${V[$pkg]}"
            uv build --project "src/agilab/core/$pkg" --wheel
            twine check "src/agilab/core/$pkg/dist/"*
            twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ "src/agilab/core/$pkg/dist/"*
          done

  publish-agilab-testpypi:
    needs: publish-core-packages-testpypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      agilab_version: ${{ steps.resolve_agilab.outputs.value }}
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf dist

      - name: Resolve TestPyPI version (agilab umbrella)
        id: resolve_agilab
        uses: actions/github-script@v7
        env:
          BASE_VERSION: ${{ env.VERSION }}
        with:
          script: |
            const base = (process.env.BASE_VERSION || '').replace(/^v/i, '');
            const runNumber = parseInt(process.env.GITHUB_RUN_NUMBER || '1', 10);
            let versions = [];
            try {
              const res = await fetch('https://test.pypi.org/pypi/agilab/json', { headers: { 'Accept':'application/json' }});
              if (res.ok) {
                const data = await res.json();
                versions = Object.keys(data.releases || {});
              }
            } catch {}
            let v = base;
            if (versions.includes(base)) {
              const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp('^' + esc(base) + '\\.post(\\d+)$');
              const posts = versions.map(x => (x.match(re)||[])[1]).filter(Boolean).map(Number);
              const next = posts.length ? Math.max(...posts) + 1 : runNumber;
              v = `${base}.post${next}`;
            }
            core.setOutput('value', v);
            console.log(`agilab -> ${v}`);

      - name: Update version across repository (exclude core/*)
        env:
          VERSION: ${{ steps.resolve_agilab.outputs.value }}
        run: |
          set -eux
          echo "Bumping umbrella agilab version to $VERSION (excluding src/agilab/core/*)"
          find . -type f -name pyproject.toml \
            -not -path "./.git/*" \
            -not -path "./src/agilab/core/*" \
          | while read -r file; do
            echo "→ Updating $file"
            sed -i -E '/^[[:space:]]*dynamic[[:space:]]*=/d' "$file"
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$file"
            if grep -Eq '^[[:space:]]*version[[:space:]]*=' "$file"; then
              sed -i -E "s/^[[:space:]]*version[[:space:]]*=.*/version = \"$VERSION\"/" "$file"
            else
              awk -v NEWVER="$VERSION" '
                /^\[project\]/{ print; print "version = \"" NEWVER "\""; next }
                { print }
              ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            fi
          done

      - name: Commit umbrella bump to a side branch (optional)
        run: |
          set -euxo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -B "ci/testpypi-bump-${GITHUB_RUN_ID}" || git checkout -b "ci/testpypi-bump-${GITHUB_RUN_ID}"
          git add $(find . -type f -name pyproject.toml -not -path "./.git/*" -not -path "./src/agilab/core/*")
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bump agilab umbrella version (auto .postN if needed) to ${{ steps.resolve_agilab.outputs.value }}"
            git push -u origin "ci/testpypi-bump-${GITHUB_RUN_ID}"
          fi

      - name: Capture & remove symlinks (apps/ and views/)
        run: |
          set -eux
          tmpfile=$(mktemp)
          find apps views -xtype l -print 2>/dev/null | tee "$tmpfile" || true
          if [ -s "$tmpfile" ]; then
            xargs -a "$tmpfile" rm -f
          fi
          rm -f "$tmpfile"
