name: test-pypi-publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release (e.g. v0.3.66 or 0.3.66)"
        required: true
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: test-pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Fix accidental O.* version typos (core only)
        run: |
          set -euxo pipefail
          find src/agilab/core -type f -name pyproject.toml -print0 |
          while IFS= read -r -d '' f; do
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$f"
          done
          if grep -R --line-number '^[[:space:]]*version[[:space:]]*=[[:space:]]*"O\.' src/agilab/core; then
            echo "❌ Still found bad version lines (capital O)"; exit 1
          fi

      - name: Sync and install editable core projects
        run: |
          set -eux
          pushd "src/agilab/core/agi-cluster"
          uv sync --dev
          uv pip install -e .
          uv pip install -e ../agi-env
          uv pip install -e ../agi-node
          popd

      - name: Run tests
        run: |
          set -eux
          pushd "src/agilab/core"
          uv run --dev --project agi-cluster python -m pytest --maxfail=5 --disable-warnings -v
          popd

  publish-core-packages-testpypi:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: |
          rm -rf src/agilab/core/agi-env/dist
          rm -rf src/agilab/core/agi-node/dist
          rm -rf src/agilab/core/agi-cluster/dist
          rm -rf src/agilab/core/agi-core/dist

      - name: Resolve TestPyPI versions (per package)
        id: resolve
        env:
          BASE_VERSION: ${{ env.VERSION }}
        run: |
          set -euo pipefail
          py() { python - "$@"; }

          resolve_one() {
            local project="$1"
            local base="${2#v}"; base="${base#V}"
            py <<'PY' "$project" "$base"
import json, sys, urllib.request, re, os
project, base = sys.argv[1], sys.argv[2]
url = f"https://test.pypi.org/pypi/{project}/json"
def fetch_versions():
    try:
        with urllib.request.urlopen(url, timeout=10) as r:
            data = json.load(r)
        return list(data.get("releases", {}).keys())
    except Exception:
        return []
versions = fetch_versions()
if base not in versions:
    print(base); raise SystemExit(0)
post_re = re.compile(rf"^{re.escape(base)}\.post(\d+)$")
existing = [int(m.group(1)) for v in versions for m in [post_re.match(v)] if m]
nxt = (max(existing) + 1) if existing else int(os.environ.get("GITHUB_RUN_NUMBER","1"))
print(f"{base}.post{nxt}")
PY
          }

          AGI_ENV_VER=$(resolve_one "agi-env"        "$BASE_VERSION")
          AGI_NODE_VER=$(resolve_one "agi-node"      "$BASE_VERSION")
          AGI_CLUSTER_VER=$(resolve_one "agi-cluster" "$BASE_VERSION")
          AGI_CORE_VER=$(resolve_one "agi-core"      "$BASE_VERSION")

          {
            echo "agi_env=$AGI_ENV_VER"
            echo "agi_node=$AGI_NODE_VER"
            echo "agi_cluster=$AGI_CLUSTER_VER"
            echo "agi_core=$AGI_CORE_VER"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved: agi-env=$AGI_ENV_VER agi-node=$AGI_NODE_VER agi-cluster=$AGI_CLUSTER_VER agi-core=$AGI_CORE_VER"

      - name: Update version in core pyproject.toml files
        env:
          AGI_ENV_VERSION: ${{ steps.resolve.outputs.agi_env }}
          AGI_NODE_VERSION: ${{ steps.resolve.outputs.agi_node }}
          AGI_CLUSTER_VERSION: ${{ steps.resolve.outputs.agi_cluster }}
          AGI_CORE_VERSION: ${{ steps.resolve.outputs.agi_core }}
        run: |
          set -euxo pipefail

          bump_in_file() {
            local py="$1" ver="$2"
            awk -v NEWVER="$ver" '
              BEGIN{ in_project=0; replaced=0 }
              /^\[/{
                if(in_project && !replaced){ print "version = \"" NEWVER "\""; replaced=1 }
                in_project=0
              }
              /^\[project\]$/{ in_project=1 }
              {
                if(in_project && match($0, /^[[:space:]]*version[[:space:]]*=/)) next
                print $0
              }
              END{
                if(in_project && !replaced){ print "version = \"" NEWVER "\"" }
              }
            ' "$py" > "$py.tmp" && mv "$py.tmp" "$py"
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$py"
            sed -i '/^[[:space:]]*dynamic[[:space:]]*=/d' "$py"
          }

          for pkg in agi-env agi-node agi-cluster agi-core; do
            base="src/agilab/core/$pkg"
            ver_var=$(echo "${pkg}_version" | tr '[:lower:]-' '[:upper:]_')
            ver="${!ver_var}"
            find "$base" -type f -name pyproject.toml -print0 | while IFS= read -r -d "" file; do
              echo "→ Updating $file to $ver"
              bump_in_file "$file" "$ver"
            done
          done

      - name: Commit version bumps to a side branch (optional)
        run: |
          set -euxo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b "ci/testpypi-bump-${GITHUB_RUN_ID}"
          git add $(find src/agilab/core -type f -name pyproject.toml -not -path "./.git/*")
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bump core package versions (auto .postN if needed)"
            git push -u origin "ci/testpypi-bump-${GITHUB_RUN_ID}"
          fi

      # --- agi-env ---
      - name: Build agi-env
        run: uv build --project src/agilab/core/agi-env --wheel
      - name: Verify agi-env
        run: twine check src/agilab/core/agi-env/dist/*
      - name: Publish agi-env to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_SECRET }}
        run: twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ src/agilab/core/agi-env/dist/*

      # --- agi-node ---
      - name: Build agi-node
        run: uv build --project src/agilab/core/agi-node --wheel
      - name: Verify agi-node
        run: twine check src/agilab/core/agi-node/dist/*
      - name: Publish agi-node to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_SECRET }}
        run: twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ src/agilab/core/agi-node/dist/*

      # --- agi-cluster ---
      - name: Build agi-cluster
        run: uv build --project src/agilab/core/agi-cluster --wheel
      - name: Verify agi-cluster
        run: twine check src/agilab/core/agi-cluster/dist/*
      - name: Publish agi-cluster to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_SECRET }}
        run: twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ src/agilab/core/agi-cluster/dist/*

      # --- agi-core ---
      - name: Build agi-core
        run: uv build --project src/agilab/core/agi-core --wheel
      - name: Verify agi-core
        run: twine check src/agilab/core/agi-core/dist/*
      - name: Publish agi-core to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_SECRET }}
        run: twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ src/agilab/core/agi-core/dist/*

  publish-agilab-testpypi:
    needs: publish-core-packages-testpypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      agilab_version: ${{ steps.resolve_agilab.outputs.value }}
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf dist

      - name: Resolve TestPyPI version (agilab umbrella)
        id: resolve_agilab
        env:
          BASE_VERSION: ${{ env.VERSION }}
        run: |
          set -euo pipefail
          py() { python - "$@"; }
          ver=$(py <<'PY' "agilab" "${BASE_VERSION#v}"
import json, sys, urllib.request, re, os
project, base = sys.argv[1], sys.argv[2]
url = f"https://test.pypi.org/pypi/{project}/json"
def fetch_versions():
    try:
        with urllib.request.urlopen(url, timeout=10) as r:
            data = json.load(r)
        return list(data.get("releases", {}).keys())
    except Exception:
        return []
versions = fetch_versions()
if base not in versions:
    print(base); raise SystemExit
post_re = re.compile(rf"^{re.escape(base)}\.post(\d+)$")
existing = [int(m.group(1)) for v in versions for m in [post_re.match(v)] if m]
nxt = (max(existing)+1) if existing else int(os.environ.get("GITHUB_RUN_NUMBER","1"))
print(f"{base}.post{nxt}")
PY
          )
          echo "value=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved agilab version: $ver"

      - name: Update version across repository (exclude core/*)
        env:
          VERSION: ${{ steps.resolve_agilab.outputs.value }}
        run: |
          set -eux
          echo "Bumping umbrella agilab version to $VERSION (excluding src/agilab/core/*)"
          find . -type f -name pyproject.toml \
            -not -path "./.git/*" \
            -not -path "./src/agilab/core/*" \
          | while read -r file; do
            echo "→ Updating $file"
            sed -i '/^dynamic\s*=/d' "$file"
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$file"
            if grep -q '^version *= *".*"' "$file"; then
              sed -i "s/^version *= *.*/version = \"$VERSION\"/" "$file"
            else
              sed -i "/^\[project\]/a version = \"$VERSION\"" "$file"
            fi
          done

      - name: Commit umbrella bump to a side branch (optional)
        run: |
          set -euxo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -B "ci/testpypi-bump-${GITHUB_RUN_ID}" || git checkout -b "ci/testpypi-bump-${GITHUB_RUN_ID}"
          git add $(find . -type f -name pyproject.toml -not -path "./.git/*" -not -path "./src/agilab/core/*")
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bump agilab umbrella version (auto .postN if needed) to ${{ steps.resolve_agilab.outputs.value }}"
            git push -u origin "ci/testpypi-bump-${GITHUB_RUN_ID}"
          fi

      - name: Capture & remove symlinks (apps/ and views/)
        shell: bash
        run: |
          set -euo pipefail
          SYMLIST=".removed_symlinks.txt"
          : > "$SYMLIST"

          while IFS= read -r -d '' p; do
            rel="${p#src/agilab/}"
            echo "$rel" >> "$SYMLIST"
            echo "Removing symlink: $rel"
          done < <(find src/agilab/apps src/agilab/views -type l -print0 2>/dev/null || true)

          find src/agilab/apps src/agilab/views -type l -delete || true
          if find src/agilab/apps src/agilab/views -type l | grep -q .; then
            echo "❌ Some symlinks still remain under apps/ or views/"; exit 1
          fi

      - name: Build agilab (sdist + wheel)
        run: uv build --sdist --wheel

      - name: Verify agilab does not package removed symlink payload (sdist + wheel)
        shell: bash
        run: |
          set -euo pipefail
          SYMLIST=".removed_symlinks.txt"

          if [[ -s "$SYMLIST" ]]; then
            echo "→ Checking sdist for removed symlink paths"
            : > .sdist.list
            for tarball in dist/*.tar.gz; do
              tar -tzf "$tarball" >> .sdist.list
            done

            esc() { sed -E 's/[][\.^$*+?(){}|/]/\\&/g'; }
            ec=0
            while IFS= read -r rel; do
              [[ -z "$rel" ]] && continue
              e=$(printf '%s' "$rel" | esc)
              if grep -E "/(src/)?agilab/${e}(/|$)" .sdist.list; then
                echo "Found removed symlink path in sdist: $rel"
                ec=1
              fi
            done < "$SYMLIST"
            if [[ $ec -ne 0 ]]; then
              echo "❌ sdist contains payload from removed symlinks"; exit 1
            else
              echo "✅ sdist OK"
            fi

            echo "→ Checking wheel for removed symlink paths and disallow symlink entries"
            cat > .check_wheel.py <<'PY'
import re, glob, zipfile, sys, os
symlist = [l.strip() for l in open(".removed_symlinks.txt").read().splitlines()] if os.path.exists(".removed_symlinks.txt") else []
bad = []
for whl in glob.glob("dist/*.whl"):
    with zipfile.ZipFile(whl) as z:
        for zi in z.infolist():
            mode = (zi.external_attr >> 16) & 0o170000
            if mode == 0o120000:
                print(f"Wheel contains a symlink entry: {whl}: {zi.filename}")
                sys.exit(1)
        names = z.namelist()
        for rel in symlist:
            if not rel: 
                continue
            pat = re.compile(r'(^|/)agilab/' + re.escape(rel) + r'(/|$)')
            if any(pat.search(n) for n in names):
                bad.append((whl, rel))
if bad:
    print("Found removed symlink payload in wheel:")
    for whl, rel in bad:
        print(f"  {whl}: agilab/{rel}")
    sys.exit(1)
print("✅ wheel OK")
PY
            python .check_wheel.py
          else
            echo "No symlinks existed; skipping artifact payload checks."
          fi

      - name: Verify agilab metadata
        run: twine check dist/*

      - name: Publish agilab to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_SECRET }}
        run: twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ dist/*

  e2e-install-from-testpypi:
    needs: publish-agilab-testpypi
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.publish-agilab-testpypi.outputs.agilab_version }}
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Show version under test
        run: echo "Testing install from TestPyPI at version: $VERSION"

      - name: Run end-user install & product tests from TestPyPI
        run: |
          set -euxo pipefail
          chmod +x ./test-install-enduser.sh
          ./test-install-enduser.sh --source testpypi --version "$VERSION"
