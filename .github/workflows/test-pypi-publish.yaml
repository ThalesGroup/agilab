name: test-pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version (e.g. 0.7.4 or v0.7.4). If omitted on tag runs, the tag name is used."
        required: false
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: test-pypi-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHON_VERSION: "3.13"
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN || secrets.TEST_PYPI_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade --no-cache-dir pip build twine

      - name: Resolve per-package versions & update pyprojects
        env:
          BASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, re, sys, urllib.request
          from pathlib import Path

          # ---- Input / packages ------------------------------------------------
          base = os.environ.get("BASE_VERSION","").replace("refs/tags/","").lstrip("v").strip()
          if not base:
              print("BASE_VERSION missing; pass via workflow input 'version' or push a tag like v1.2.3.", file=sys.stderr)
              sys.exit(1)

          core = {
              "agi-env": "src/agilab/core/agi-env/pyproject.toml",
              "agi-node": "src/agilab/core/agi-node/pyproject.toml",
              "agi-cluster": "src/agilab/core/agi-cluster/pyproject.toml",
              "agi-core": "src/agilab/core/agi-core/pyproject.toml",
          }
          umbrella = {"agilab": "pyproject.toml"}
          packages = {**core, **umbrella}

          # ---- Query TestPyPI and resolve targets per package ------------------
          def release_keys(name: str) -> set[str]:
              url = f"https://test.pypi.org/pypi/{name}/json"
              try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                      data = json.load(r) or {}
                      return set((data.get("releases") or {}).keys())
              except Exception:
                  return set()

          def next_version(base: str, keys: set[str]) -> str:
              if base not in keys:
                  return base
              max_post = 0
              pref = base + ".post"
              for v in keys:
                  if v.startswith(pref):
                      try:
                          n = int(v.split(".post", 1)[1])
                          max_post = max(max_post, n)
                      except Exception:
                          pass
              return f"{base}.post{max_post+1}"

          targets: dict[str, str] = {name: next_version(base, release_keys(name)) for name in packages}
          print("Resolved targets:", json.dumps(targets, indent=2))

          # ---- Update versions and pin internal deps across all pyprojects -----
          ver_line = re.compile(r'(?m)^\s*version\s*=\s*["\'].*?["\']\s*$')
          dep_pat  = re.compile(r'(?P<q>["\'])(agi-env|agi-node|agi-cluster|agi-core)(?P<extras>\[[^"\']*\])?[^"\']*(?P=q)')

          def pin_deps(text: str) -> str:
              def repl(m):
                  pkg = m.group(2)
                  return f'{m.group(1)}{pkg}{m.group("extras") or ""}=={targets[pkg]}{m.group(1)}'
              return dep_pat.sub(repl, text)

          for name, path in packages.items():
              p = Path(path)
              s = p.read_text(encoding="utf-8")
              s = ver_line.sub(f'version = "{targets[name]}"', s)
              s = pin_deps(s)
              p.write_text(s, encoding="utf-8")
              print(f"[ok] {p} -> version {targets[name]}")

          Path("versions.json").write_text(json.dumps(targets, indent=2), encoding="utf-8")
          PY

      - name: Build (core) wheels
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            python -m build --wheel --outdir "src/agilab/core/${pkg}/dist" "src/agilab/core/${pkg}"
          done

      - name: Build umbrella (agilab)
        run: |
          set -euxo pipefail
          rm -rf dist build
          python -m build --sdist --wheel

      - name: Upload to TestPyPI
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "ERROR: Missing TEST_PYPI_API_TOKEN or TEST_PYPI_SECRET" >&2
            exit 2
          fi
          twine upload \
            --repository-url https://test.pypi.org/legacy/ \
            --non-interactive --skip-existing \
            src/agilab/core/*/dist/* dist/*
