name: test-pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Base version for the release (e.g. 0.7.4 or v0.7.4). If omitted on tag runs, the tag name is used."
        required: false
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: test-pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository (exact triggering commit)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      # Compute a unified target version for all core pkgs.
      # If the base already exists for ANY of the pkgs on TestPyPI, we publish .postN for ALL.
      - name: Resolve unified TestPyPI version
        id: resolve
        uses: actions/github-script@v7
        env:
          BASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        with:
          script: |
            // 'core' is provided by github-script runtime (do NOT require('@actions/core'))
            const enc = encodeURIComponent;
            const esc = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            async function getReleases(name) {
              const url = `https://test.pypi.org/pypi/${enc(name)}/json`;
              try {
                const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!res.ok) {
                  core.warning(`HTTP ${res.status} from ${url}`);
                  return { releases: {} };
                }
                return await res.json();
              } catch (e) {
                core.warning(`Fetch failed for ${name}: ${String(e)}`);
                return { releases: {} };
              }
            }

            const baseRaw = (process.env.BASE_VERSION || '')
              .trim().replace(/^refs\/tags\//, '').replace(/^v/i, '');
            if (!baseRaw) throw new Error('BASE_VERSION is empty');
            core.info(`Base version input: ${baseRaw}`);

            const pkgs = ['agi-env','agi-node','agi-cluster','agi-core'];
            const runNumber = parseInt(process.env.GITHUB_RUN_NUMBER || '1', 10);

            let needPost = false, maxPost = 0;
            const re = new RegExp(`^${esc(baseRaw)}\\.post(\\d+)$`);

            for (const p of pkgs) {
              const data = await getReleases(p);
              const versions = Object.keys(data.releases || {});
              if (versions.includes(baseRaw)) needPost = true;
              for (const v of versions) {
                const m = v.match(re);
                if (m) maxPost = Math.max(maxPost, Number(m[1]));
              }
            }

            const nextPost = Math.max(maxPost + 1, runNumber);
            const target = needPost ? `${baseRaw}.post${nextPost}` : baseRaw;

            // unified version for all core packages
            core.setOutput('target', target);
            core.setOutput('agi_env', target);
            core.setOutput('agi_node', target);
            core.setOutput('agi_cluster', target);
            core.setOutput('agi_core', target);
            core.info(`ALL core packages => ${target}`);

      - name: Update versions in core pyproject.toml files
        env:
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          set -euxo pipefail
          py=$(command -v python || command -v python3)
          "$py" - <<'PY'
          import os, re
          from pathlib import Path

          target = os.environ["TARGET"]
          roots = [
              Path("src/agilab/core/agi-env/pyproject.toml"),
              Path("src/agilab/core/agi-node/pyproject.toml"),
              Path("src/agilab/core/agi-cluster/pyproject.toml"),
              Path("src/agilab/core/agi-core/pyproject.toml"),
          ]

          def set_version(text: str, ver: str) -> str:
              # robust single-line replacement
              return re.sub(r'(?m)^version\s*=\s*["\']?[^"\']+["\']?\s*$',
                            f'version = "{ver}"', text)

          for p in roots:
              s = p.read_text(encoding="utf-8")
              s2 = set_version(s, target)
              if s == s2:
                  print(f"[info] {p}: version unchanged or already set")
              p.write_text(s2, encoding="utf-8")
              print(f"[ok]   {p}: version -> {target}")
          PY

      - name: Build core wheels
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            pushd "src/agilab/core/$pkg"
              rm -rf dist build
              uv build --wheel
            popd
          done

      - name: Upload core wheels to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          set -euxo pipefail
          for pkg in agi-env agi-node agi-cluster agi-core; do
            twine upload --repository-url https://test.pypi.org/legacy/ --non-interactive --skip-existing "src/agilab/core/${pkg}/dist/*"
          done

      - name: Update umbrella agilab version & pin core deps
        env:
          TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          set -euxo pipefail
          py=$(command -v python || command -v python3)
          "$py" - <<'PY'
          import os, re
          from pathlib import Path

          target = os.environ["TARGET"]
          p = Path("src/agilab/pyproject.toml")
          txt = p.read_text(encoding="utf-8")

          # set [project].version
          txt = re.sub(r'(?m)^version\s*=\s*["\']?[^"\']+["\']?\s*$', f'version = "{target}"', txt)

          # pin deps in [project.dependencies] (keep extras and markers)
          def pin_line(line: str, name: str) -> str:
              # split env markers
              parts = line.split(';', 1)
              left = parts[0].strip()
              marker = ('; ' + parts[1]) if len(parts) == 2 else ''
              # keep package name (and extras if any), drop specifiers
              # examples that become 'agi-env' or 'agi-env[extra]'
              left = re.sub(r'\s*(?:[<>=!~]=?|==).*$','', left)
              if re.match(rf'^{re.escape(name)}(\[.*\])?$', left):
                  return f"{left}=={target}{marker}"
              return line

          dep_names = ("agi-env","agi-node","agi-cluster","agi-core")
          # rewrite lines in the dependencies array/table
          def repl_dep_block(m):
              block = m.group(0)
              lines = block.splitlines()
              for i, line in enumerate(lines):
                  for name in dep_names:
                      # work only on lines that start with package name or have quotes around it
                      # common in PEP 621 arrays: "agi-env>=0.1", or just agi-env==...
                      # We'll handle both quoted and unquoted approximations.
                      if re.search(rf'(^|\s|["\']){re.escape(name)}([^\w-]|\Z)', line):
                          lines[i] = pin_line(lines[i], name)
              return "\n".join(lines)

          txt = re.sub(r'(?s)^\s*\[project\]\s.*?\[', lambda m: repl_dep_block(m) + "[", txt, count=1)
          # If the above failed to catch (no next table), try to process the rest
          if '[project.dependencies]' in txt:
              # Alternate path: process only the dependencies section lines
              pass

          p.write_text(txt, encoding="utf-8")
          print(f"Updated {p} to version={target} and pinned core deps to =={target}.")
          PY

      - name: Build agilab (wheel + sdist)
        working-directory: src/agilab
        run: |
          set -euxo pipefail
          rm -rf dist build
          uv build --sdist --wheel

      - name: Upload agilab to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        working-directory: src/agilab
        run: |
          set -euxo pipefail
          twine upload --repository-url https://test.pypi.org/legacy/ --non-interactive --skip-existing dist/*
