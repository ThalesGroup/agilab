# Simple workflow for deploying static content to GitHub Pages
name: docs-publish

on:
  push:
    branches:
      - main
    paths:
      - 'docs/source/**'
      - 'src/agilab/core/**'
      - 'src/agilab/resources/help/**'
      - '.github/workflows/docs-publish.yaml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-gate:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Decide whether today's publish quota is already used
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_publish', 'true');
              core.setOutput('reason', 'manual dispatch bypasses daily cap');
              return;
            }

            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const currentRunId = context.runId;
            const todayUtc = new Date().toISOString().slice(0, 10);

            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'docs-publish.yaml',
              branch,
              event: 'push',
              per_page: 20,
            });

            const lastSuccessfulRun = response.data.workflow_runs
              .filter((run) => run.id !== currentRunId && run.conclusion === 'success')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (!lastSuccessfulRun) {
              core.setOutput('should_publish', 'true');
              core.setOutput('reason', 'no prior successful publish found');
              return;
            }

            const lastPublishDay = String(lastSuccessfulRun.created_at).slice(0, 10);
            if (lastPublishDay === todayUtc) {
              core.setOutput('should_publish', 'false');
              core.setOutput(
                'reason',
                `publish already succeeded today (${lastSuccessfulRun.created_at})`
              );
              return;
            }

            core.setOutput('should_publish', 'true');
            core.setOutput(
              'reason',
              `last successful publish was on ${lastSuccessfulRun.created_at}`
            );

      - name: Log publish decision
        run: |
          echo "should_publish=${{ steps.gate.outputs.should_publish }}"
          echo "reason=${{ steps.gate.outputs.reason }}"

  deploy:
    needs: publish-gate
    if: needs.publish-gate.outputs.should_publish == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Graphviz
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y graphviz
      - name: Build docs/html artifact from in-repo Sphinx source
        run: |
          set -euo pipefail
          uv run \
            --with sphinx \
            --with sphinx-rtd-theme \
            --with myst-parser \
            --with linkify-it-py \
            --with sphinx-pyreverse \
            --with sphinx-autodoc-typehints \
            --with sphinx-design \
            --with sphinx-tabs \
            python -m sphinx -b html docs/source docs/html
          test -f docs/html/index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare docs/html for Pages
        run: |
          set -euo pipefail
          if [ ! -d docs/html ] || [ -z "$(ls -A docs/html 2>/dev/null)" ]; then
            echo "[docs] docs/html missing or empty; aborting publish to avoid stale content" >&2
            exit 1
          fi
          # Ensure an index.html exists to keep Pages happy
          if [ ! -f docs/html/index.html ]; then
            # Try to pick a reasonable default if one exists
            idx=$(ls docs/html/*index*.html 2>/dev/null | head -n1 || true)
            if [ -n "$idx" ]; then
              cp "$idx" docs/html/index.html
            else
              # Create a simple listing index if nothing obvious exists
              {
                echo '<html><body><h1>AGILab Documentation</h1><ul>'
                for f in docs/html/*.html; do bn=$(basename "$f"); echo "<li><a href=\"$bn\">$bn</a></li>"; done
                echo '</ul></body></html>'
              } > docs/html/index.html
            fi
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
