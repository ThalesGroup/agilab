name: repo-guardrails

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  local-only-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Guard against committed docs/html artifacts
        run: |
          set -euo pipefail
          tracked="$(git ls-files docs/html | wc -l | tr -d ' ')"
          if [ "${tracked}" != "0" ]; then
            echo "docs/html artifacts must not be tracked in git."
            git ls-files docs/html
            exit 1
          fi

      - name: Fail if symlinks are present in repo
        run: |
          set -euo pipefail
          symlinks="$(git ls-files -s | awk '$1 ~ /^120000/ {print $4}')"
          if [ -n "$symlinks" ]; then
            echo "Symlinks detected in repository (tracked files):" >&2
            echo "$symlinks" >&2
            echo "Please remove these symlinks or replace with real files." >&2
            exit 1
          fi

      - name: Confirm local-only test policy
        run: |
          echo "Repository tests are intentionally local-only."
          echo "GitHub Actions CI runs lightweight repository guardrails only."
