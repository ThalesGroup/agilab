name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against committed docs/html artifacts
        run: |
          set -euo pipefail
          tracked="$(git ls-files docs/html | wc -l | tr -d ' ')"
          if [ "${tracked}" != "0" ]; then
            echo "docs/html artifacts must not be tracked in git."
            git ls-files docs/html
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.10.7"

      - name: Prepare test artifacts
        run: mkdir -p test-results

      - name: Run agilab tests with coverage
        run: |
          set -e
          rm -f .coverage.agilab coverage-agilab-base.xml
          export PYTHONPATH="src"
          COVERAGE_FILE=.coverage.agilab uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with pytest \
            --with pytest-cov \
            --with pytest-asyncio \
            --with streamlit \
            --with streamlit_code_editor \
            --with mlflow \
            --with openai \
            --with watchdog \
            --with pathspec \
            --with py7zr \
            --with astor \
            --with tomlkit \
            --with tomli_w \
            --with parso \
            --with toml \
            --with packaging \
            python -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            -m "not integration" \
            --cov=agilab --cov-report=xml:coverage-agilab-base.xml \
            --junitxml=test-results/junit.xml \
            --ignore=src/agilab/test/test_model_returns_code.py \
            src/agilab/test \
            test/test_orchestrate_cluster.py \
            test/test_orchestrate_distribution.py \
            test/test_orchestrate_execute.py \
            test/test_orchestrate_page_helpers.py \
            test/test_orchestrate_services.py \
            test/test_orchestrate_support.py \
            test/test_pipeline_ai.py \
            test/test_pipeline_editor.py \
            test/test_pipeline_lab.py \
            test/test_pipeline_openai.py \
            test/test_pipeline_runtime.py \
            test/test_pipeline_service_guard.py \
            test/test_pipeline_sidebar.py \
            test/test_pipeline_steps.py \
            test/test_pipeline_views.py \
            test/test_ui_pages.py

      - name: Run agi-env tests with coverage
        run: |
          set -e
          rm -f .coverage.agi-env coverage-agi-env.xml
          COVERAGE_FILE=.coverage.agi-env uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with sqlalchemy \
            --with pytest \
            --with pytest-cov \
            python -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            --cov=agi_env --cov-report=xml:coverage-agi-env.xml \
            src/agilab/core/agi-env/test

      - name: Run agi-node tests with coverage
        run: |
          set -e
          rm -f .coverage.agi-node coverage-agi-node.xml
          COVERAGE_FILE=.coverage.agi-node uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with pytest \
            --with pytest-asyncio \
            --with pytest-cov \
            python -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            --cov=agi_node --cov-report=xml:coverage-agi-node.xml \
            src/agilab/core/test

      - name: Run agi-cluster tests with coverage
        run: |
          set -e
          rm -f .coverage.agi-cluster coverage-agi-cluster.xml
          COVERAGE_FILE=.coverage.agi-cluster uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with pytest \
            --with pytest-asyncio \
            --with pytest-cov \
            python -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            --cov=agi_cluster --cov-report=xml:coverage-agi-cluster.xml \
            src/agilab/core/test

      - name: Run agi-core tests with coverage
        run: |
          set -e
          rm -f .coverage.agi-core coverage-agi-core.xml
          COVERAGE_FILE=.coverage.agi-core uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with pytest \
            --with pytest-asyncio \
            --with pytest-cov \
            python -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            --cov=agi_core --cov-report=xml:coverage-agi-core.xml \
            src/agilab/core/test

      - name: Run service health smoke tests
        if: matrix.python-version == '3.13'
        run: |
          set -e
          rm -f .coverage.service-health coverage-service-health.xml
          COVERAGE_FILE=.coverage.service-health uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with pytest \
            --with pytest-asyncio \
            --with pytest-cov \
            python -m pytest -q -o addopts='' \
            --cov=agi_cluster --cov=agi_env --cov-report=xml:coverage-service-health.xml \
            src/agilab/core/test/test_agi_distributor.py::test_agi_serve_health_action_writes_json \
            test/test_service_health_check.py

      - name: Validate coverage artifacts
        if: matrix.python-version == '3.13'
        run: |
          set -euo pipefail
          if [ ! -f .coverage.service-health ]; then
            echo "Missing .coverage.service-health artifact after service health smoke tests."
            ls -la .coverage* || true
            exit 1
          fi
          shopt -s nullglob
          coverage_files=(.coverage .coverage.*)
          if [ ${#coverage_files[@]} -eq 0 ]; then
            echo "No .coverage artifacts found before combine."
            exit 1
          fi
          printf 'Coverage artifacts:\\n'
          printf '  %s\\n' "${coverage_files[@]}"
          shopt -u nullglob

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: test-results/junit.xml
          if-no-files-found: ignore

      - name: Upload agi-env coverage to Codecov
        if: always() && hashFiles('coverage-agi-env.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-agi-env.xml
          flags: agi-env,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: true

      - name: Upload agi-node coverage to Codecov
        if: always() && hashFiles('coverage-agi-node.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-agi-node.xml
          flags: agi-node,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: true

      - name: Upload agi-cluster coverage to Codecov
        if: always() && hashFiles('coverage-agi-cluster.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-agi-cluster.xml
          flags: agi-cluster,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: true

      - name: Upload agi-meta coverage to Codecov
        if: always() && hashFiles('coverage-agi-core.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-agi-core.xml
          flags: agi-meta,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: true

      - name: Upload agi-gui coverage to Codecov
        if: always() && matrix.python-version == '3.13' && hashFiles('coverage-agilab-base.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-agilab-base.xml
          flags: agi-gui
          use_oidc: true
          verbose: true
          fail_ci_if_error: true

  clean-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.10.7"

      - name: Run clean-home installer smoke
        env:
          CLEAN_ROOT: ${{ runner.temp }}/agilab-clean-home
        run: |
          set -euo pipefail
          rm -rf "$CLEAN_ROOT"
          mkdir -p "$CLEAN_ROOT/home"
          replay_log="$CLEAN_ROOT/replay.out"
          mkdir -p "$(dirname "$replay_log")"
          exec > >(tee -a "$replay_log") 2>&1

          on_error() {
            status=$?
            echo "clean-install-smoke failed with status $status"
            if [ -d "$HOME/log/install_logs" ]; then
              latest_log="$(ls -1t "$HOME/log/install_logs"/*.log 2>/dev/null | head -1 || true)"
              if [ -n "${latest_log:-}" ] && [ -f "$latest_log" ]; then
                echo "Latest installer log: $latest_log"
                echo "---- tail $latest_log ----"
                tail -n 200 "$latest_log" || true
              fi
            fi
            exit "$status"
          }
          trap on_error ERR

          rsync -a \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '.pytest_cache' \
            --exclude '.mypy_cache' \
            --exclude '.ruff_cache' \
            --exclude 'test-results' \
            --exclude '.coverage*' \
            --exclude 'docs/html' \
            "$GITHUB_WORKSPACE/" "$CLEAN_ROOT/agilab-src/"

          export HOME="$CLEAN_ROOT/home"
          export AGI_LOCAL_DIR="$HOME/localshare"
          export AGI_SHARE_DIR="$HOME/clustershare"
          # Keep the smoke job lightweight by avoiding TensorFlow-heavy optional pages.
          export BUILTIN_PAGES_OVERRIDE="view_maps"
          export OPENAI_API_KEY="dummy"
          export SKIP_OFFLINE=1
          export UV_NO_SYNC=1
          unset CLUSTER_CREDENTIALS

          cd "$CLEAN_ROOT/agilab-src"
          ./install.sh \
            --non-interactive \
            --source local \
            --install-path "$HOME/agi-space" \
            --install-apps builtin \
            --test-apps

          latest_log="$(ls -1t "$HOME/log/install_logs"/*.log | head -1)"
          test -n "$latest_log"
          grep -F "Installation of apps complete!" "$latest_log"
          grep -F "All done: Installation complete." "$latest_log"

          test -x "$HOME/agi-space/.venv/bin/python"
          "$HOME/agi-space/.venv/bin/python" - <<'PY'
          import agilab
          import agi_cluster
          import agi_env
          import agi_node

          print("installed-imports-ok")
          print(agilab.__file__)
          PY

          echo "clean-install-smoke completed successfully"

      - name: Upload clean-home installer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-home-install-logs
          path: |
            ${{ runner.temp }}/agilab-clean-home/home/log/install_logs
            ${{ runner.temp }}/agilab-clean-home/replay.out
          if-no-files-found: ignore
