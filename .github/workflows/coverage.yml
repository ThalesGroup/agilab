name: coverage

on:
  push:
    branches: ["main"]
    paths:
      - ".coveragerc*"
      - ".github/workflows/coverage.yml"
      - "pyproject.toml"
      - "src/**"
      - "test/**"
      - "tools/coverage_badge_guard.py"
      - "tools/generate_component_coverage_badges.py"
      - "tools/workflow_parity.py"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  agi-env:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Define heartbeat helper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/coverage-heartbeat.sh" <<'EOF'
          start_coverage_heartbeat() {
            local label="$1"
            while true; do
              sleep 20
              printf '[heartbeat] %s %s still running\n' "$(date -u +%H:%M:%S)" "$label"
            done
          }
          EOF

      - name: Run agi-env coverage
        run: |
          set -e
          source "$RUNNER_TEMP/coverage-heartbeat.sh"
          start_coverage_heartbeat "agi-env coverage" &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT
          rm -f .coverage.agi-env coverage-agi-env.xml
          COVERAGE_FILE=.coverage.agi-env uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with sqlalchemy \
            --with streamlit \
            --with pytest \
            --with pytest-cov \
            python -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            --cov=agi_env --cov-config=.coveragerc.agi-env --cov-report=xml:coverage-agi-env.xml \
            src/agilab/core/agi-env/test
          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

      - name: Upload agi-env coverage to Codecov
        if: always() && hashFiles('coverage-agi-env.xml') != ''
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-agi-env.xml
          flags: agi-env,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: false

      - name: Archive agi-env coverage XML
        if: always() && hashFiles('coverage-agi-env.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-agi-env-xml
          path: coverage-agi-env.xml
          if-no-files-found: error
          retention-days: 3

  agi-core:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Define heartbeat helper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/coverage-heartbeat.sh" <<'EOF'
          start_coverage_heartbeat() {
            local label="$1"
            while true; do
              sleep 20
              printf '[heartbeat] %s %s still running\n' "$(date -u +%H:%M:%S)" "$label"
            done
          }
          EOF

      - name: Run agi-node + agi-cluster coverage
        run: |
          set -e
          source "$RUNNER_TEMP/coverage-heartbeat.sh"
          start_coverage_heartbeat "agi-node+agi-cluster coverage" &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT
          rm -f .coverage.agi-core-combined coverage-agi-node.xml coverage-agi-cluster.xml
          uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with fastparquet \
            --with pytest \
            --with pytest-asyncio \
            --with coverage \
            python -m coverage run --data-file=.coverage.agi-core-combined \
            --source=agi_node,agi_cluster \
            -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
            src/agilab/core/test
          uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with fastparquet \
            --with pytest \
            --with pytest-asyncio \
            --with coverage \
            python -m coverage xml --data-file=.coverage.agi-core-combined \
            -o coverage-agi-node.xml --include='*/agi_node/*'
          uv run --no-project \
            --with-editable ./src/agilab/core/agi-env \
            --with-editable ./src/agilab/core/agi-node \
            --with-editable ./src/agilab/core/agi-cluster \
            --with-editable ./src/agilab/core/agi-core \
            --with sqlalchemy \
            --with fastparquet \
            --with pytest \
            --with pytest-asyncio \
            --with coverage \
            python -m coverage xml --data-file=.coverage.agi-core-combined \
            -o coverage-agi-cluster.xml --include='*/agi_cluster/*'
          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

      - name: Upload agi-node coverage to Codecov
        if: always() && hashFiles('coverage-agi-node.xml') != ''
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-agi-node.xml
          flags: agi-node,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: false

      - name: Upload agi-cluster coverage to Codecov
        if: always() && hashFiles('coverage-agi-cluster.xml') != ''
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-agi-cluster.xml
          flags: agi-cluster,agi-core
          use_oidc: true
          verbose: true
          fail_ci_if_error: false

      - name: Archive agi-node coverage XML
        if: always() && hashFiles('coverage-agi-node.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-agi-node-xml
          path: coverage-agi-node.xml
          if-no-files-found: error
          retention-days: 3

      - name: Archive agi-cluster coverage XML
        if: always() && hashFiles('coverage-agi-cluster.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-agi-cluster-xml
          path: coverage-agi-cluster.xml
          if-no-files-found: error
          retention-days: 3

  agi-gui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Prepare artifacts
        run: mkdir -p test-results

      - name: Define heartbeat helper
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/coverage-heartbeat.sh" <<'EOF'
          start_coverage_heartbeat() {
            local label="$1"
            while true; do
              sleep 20
              printf '[heartbeat] %s %s still running\n' "$(date -u +%H:%M:%S)" "$label"
            done
          }
          EOF

      - name: Run agi-gui coverage
        run: |
          set -e
          source "$RUNNER_TEMP/coverage-heartbeat.sh"
          start_coverage_heartbeat "agi-gui coverage" &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT
          rm -f .coverage.agi-gui coverage-agi-gui.xml test-results/junit-agi-gui-*.xml
          export AGILAB_DISABLE_BACKGROUND_SERVICES=1

          run_gui_chunk() {
            local label="$1"
            shift
            timeout 8m uv --preview-features extra-build-dependencies run --group dev \
              python -m coverage run \
              --rcfile=.coveragerc.agi-gui \
              --data-file=.coverage.agi-gui \
              --append \
              -m pytest -q --maxfail=1 --disable-warnings -o addopts='' \
              -m "not integration" \
              --junitxml="test-results/junit-agi-gui-${label}.xml" \
              --ignore=src/agilab/test/test_model_returns_code.py \
              "$@"
          }

          run_gui_chunk support \
            src/agilab/test \
            src/agilab/lib/agi-gui/test \
            test/test_orchestrate_cluster.py \
            test/test_orchestrate_distribution.py \
            test/test_orchestrate_execute.py \
            test/test_orchestrate_page_helpers.py \
            test/test_orchestrate_page_state.py \
            test/test_orchestrate_services.py \
            test/test_orchestrate_support.py \
            test/test_analysis_page_helpers.py \
            test/test_about_agilab_helpers.py \
            test/test_app_template_registry.py \
            test/test_cluster_flight_validation.py \
            test/test_cluster_lan_discovery.py \
            test/test_venv_linker.py \
            test/test_workflow_ui.py

          run_gui_chunk pipeline \
            test/test_first_proof_cli.py \
            test/test_notebook_colab_support.py \
            test/test_page_docs.py \
            test/test_pipeline_ai.py \
            test/test_pipeline_editor.py \
            test/test_pipeline_lab.py \
            test/test_pipeline_openai.py \
            test/test_pipeline_run_controls.py \
            test/test_pipeline_runtime.py \
            test/test_pipeline_service_guard.py \
            test/test_pipeline_sidebar.py \
            test/test_pipeline_steps.py \
            test/test_pipeline_views.py \
            test/test_tracking.py

          run_gui_chunk robots \
            test/test_agilab_web_robot.py \
            test/test_agilab_widget_robot.py \
            test/test_first_launch_robot.py \
            test/test_screenshot_manifest.py

          run_gui_chunk pages \
            test/test_ui_pages.py \
            test/test_apps_pages_launcher.py \
            test/test_app_args.py \
            test/test_streamlit_args.py \
            test/test_pagelib.py \
            test/test_connector_registry.py \
            test/test_run_manifest.py

          run_gui_chunk views \
            test/test_view*.py

          run_gui_chunk reports \
            test/test_*_report.py \
            test/test_*_workflow.py

          timeout 5m uv --preview-features extra-build-dependencies run --group dev \
            python -m coverage xml \
            --rcfile=.coveragerc.agi-gui \
            --data-file=.coverage.agi-gui \
            -o coverage-agi-gui.xml
          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gui-junit
          path: test-results/junit-agi-gui-*.xml
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload agi-gui coverage to Codecov
        if: always() && hashFiles('coverage-agi-gui.xml') != ''
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage-agi-gui.xml
          flags: agi-gui
          use_oidc: true
          verbose: true
          fail_ci_if_error: false

      - name: Archive agi-gui coverage XML
        if: always() && hashFiles('coverage-agi-gui.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-agi-gui-xml
          path: coverage-agi-gui.xml
          if-no-files-found: error
          retention-days: 3

  agilab:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - agi-env
      - agi-core
      - agi-gui
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download coverage XML artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-*-xml
          path: merged-coverage
          merge-multiple: true

      - name: Show merged coverage inputs
        run: ls -R merged-coverage

      - name: Refresh static coverage badges
        run: |
          cp merged-coverage/coverage-*.xml .
          python tools/generate_component_coverage_badges.py

      - name: Verify committed badges are up to date
        run: git diff --exit-code -- badges/

      - name: Upload repo-wide agilab coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: >-
            ./merged-coverage/coverage-agi-env.xml,
            ./merged-coverage/coverage-agi-node.xml,
            ./merged-coverage/coverage-agi-cluster.xml,
            ./merged-coverage/coverage-agi-gui.xml
          use_oidc: true
          verbose: true
          fail_ci_if_error: false
