name: pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release (e.g. 0.3.66)"
        required: true
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Fix accidental O.* version typos (core only)
        run: |
          set -euxo pipefail
          find src/agilab/core -type f -name pyproject.toml -print0 |
          while IFS= read -r -d '' f; do
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$f"
          done
          if grep -R --line-number '^[[:space:]]*version[[:space:]]*=[[:space:]]*"O\.' src/agilab/core; then
            echo "❌ Still found bad version lines (capital O)"; exit 1
          fi

      - name: Sync and install editable core projects
        run: |
          set -eux
          pushd "src/agilab/core/agi-cluster"
          uv sync --dev
          uv pip install -e .
          uv pip install -e ../agi-env
          uv pip install -e ../agi-node
          popd

      - name: Run tests
        run: |
          set -eux
          pushd "src/agilab/core"
          uv run --dev --project agi-cluster python -m pytest --maxfail=5 --disable-warnings -v
          popd

  publish-core-packages:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: |
          rm -rf src/agilab/core/agi-env/dist
          rm -rf src/agilab/core/agi-node/dist
          rm -rf src/agilab/core/agi-cluster/dist
          rm -rf src/agilab/core/agi-core/dist

      - name: Prepare git (rebase first, before edits)
        run: |
          set -euxo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          # Start from latest main to avoid conflicts later
          git checkout -B main origin/main

      - name: Update version in core pyproject.toml files
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euxo pipefail
          VERSION=${VERSION#v}; VERSION=${VERSION#V}
          echo "Bumping version to $VERSION"

          bump_in_file() {
            py="$1"
            awk -v NEWVER="$VERSION" '
              BEGIN{ in_project=0; replaced=0 }
              /^\[/{
                if(in_project && !replaced){ print "version = \"" NEWVER "\""; replaced=1 }
                in_project=0
              }
              /^\[project\]$/{ in_project=1 }
              {
                if(in_project && match($0, /^[[:space:]]*version[[:space:]]*=/)) next
                print $0
              }
              END{
                if(in_project && !replaced){ print "version = \"" NEWVER "\"" }
              }
            ' "$py" > "$py.tmp" && mv "$py.tmp" "$py"
            # Fix any lingering capital-O typos on version lines
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$py"
            # Remove conflicting dynamic version keys (if any)
            sed -i '/^[[:space:]]*dynamic[[:space:]]*=/d' "$py"
          }

          for pkg in agi-env agi-node agi-cluster agi-core; do
            base="src/agilab/core/$pkg"
            find "$base" -type f -name pyproject.toml -print0 | while IFS= read -r -d "" file; do
              echo "→ Updating $file"
              bump_in_file "$file"
            done
          done

      - name: Commit & push (ours-wins on race)
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euxo pipefail
          git add $(find src/agilab/core -type f -name pyproject.toml -not -path "./.git/*")
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bump core package versions to ${VERSION#v}"
            # If someone pushed between checkout and now, prefer our bump on conflicts
            git pull --rebase -X ours origin main || (git rebase --abort && echo "Rebase aborted; proceeding with our local bump")
            git push origin HEAD:main
          fi

      # --- agi-env ---
      - name: Build agi-env
        run: uv build --project src/agilab/core/agi-env --wheel
      - name: Upload agi-env artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-env-distributions
          path: src/agilab/core/agi-env/dist/
      - name: Verify agi-env
        run: twine check src/agilab/core/agi-env/dist/*
      - name: Publish agi-env to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload src/agilab/core/agi-env/dist/*

      # --- agi-node ---
      - name: Build agi-node
        run: uv build --project src/agilab/core/agi-node --wheel
      - name: Upload agi-node artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-node-distributions
          path: src/agilab/core/agi-node/dist/
      - name: Verify agi-node
        run: twine check src/agilab/core/agi-node/dist/*
      - name: Publish agi-node to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload src/agilab/core/agi-node/dist/*

      # --- agi-cluster ---
      - name: Build agi-cluster
        run: uv build --project src/agilab/core/agi-cluster --wheel
      - name: Upload agi-cluster artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-cluster-distributions
          path: src/agilab/core/agi-cluster/dist/
      - name: Verify agi-cluster
        run: twine check src/agilab/core/agi-cluster/dist/*
      - name: Publish agi-cluster to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload src/agilab/core/agi-cluster/dist/*

      # --- agi-core ---
      - name: Build agi-core
        run: uv build --project src/agilab/core/agi-core --wheel
      - name: Upload agi-core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-core-distributions
          path: src/agilab/core/agi-core/dist/
      - name: Verify agi-core
        run: twine check src/agilab/core/agi-core/dist/*
      - name: Publish agi-core to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload src/agilab/core/agi-core/dist/*

  publish-agilab:
    needs: publish-core-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf dist

      - name: Prepare git (rebase first, before edits)
        run: |
          set -euxo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout -B main origin/main

      - name: Update version across repository
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -eux
          VERSION=${VERSION#v}; VERSION=${VERSION#V}
          echo "Bumping repo-wide version to $VERSION"
          find . -type f -name pyproject.toml -not -path "./.git/*" | while read -r file; do
            echo "→ Updating $file"
            sed -i '/^dynamic\s*=/d' "$file"
            sed -i -E '/^[[:space:]]*version[[:space:]]*=/ s/"O\./"0./' "$file"
            if grep -q '^version *= *".*"' "$file"; then
              sed -i "s/^version *= *.*/version = \"$VERSION\"/" "$file"
            else
              sed -i "/^\[project\]/a version = \"$VERSION\"" "$file"
            fi
          done

      - name: Commit & push (ours-wins on race)
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euxo pipefail
          git add $(find . -type f -name pyproject.toml -not -path "./.git/*")
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bump agilab version to ${VERSION#v}"
            git pull --rebase -X ours origin main || (git rebase --abort && echo "Rebase aborted; proceeding with our local bump")
            git push origin HEAD:main
          fi

      - name: Build agilab
        run: uv build --wheel

      - name: Upload agilab artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agilab-distributions
          path: dist/

      - name: Verify agilab
        run: twine check dist/*

      - name: Publish agilab to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload dist/*
