name: pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release (e.g. 0.3.66)'
        required: true
  push:
    tags:
      - 'v*.*.*'

jobs:
  setup-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        run: python3 -m pip install --upgrade --no-cache-dir uv

      - name: Create symlinks for agi-core subpackages
        run: |
          set -eux
          src_dir="src/fwk/core/agi-core/src"

          # Ensure target directories exist
          mkdir -p src/fwk/core/env/src
          mkdir -p src/fwk/core/cluster/src
          mkdir -p src/fwk/core/node/src

          ln -sf "${src_dir}/agi_env" src/fwk/core/env/src/agi_env
          ln -sf "${src_dir}/agi_cluster" src/fwk/core/cluster/src/agi_cluster
          ln -sf "${src_dir}/agi_node" src/fwk/core/node/src/agi_node

  test:
    needs: setup-env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        run: python3 -m pip install --upgrade --no-cache-dir uv

      - name: Sync uv project agi_cluster
        run: |
          pushd "src/fwk/core/cluster"
          uv build --wheel
          uv add dist/*
          popd

      - name: Run tests
        run: |
          pushd "src/fwk/core"
          uv run --project cluster pytest --maxfail=5 --disable-warnings -v
          popd

  pypi-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        run: python3 -m pip install --upgrade --no-cache-dir uv

      - name: Clean previous builds
        run: rm -rf dist

      - name: Update version in pyproject.toml files
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION=${VERSION#v}
          echo "Bumping version to $VERSION"
          find . -type f -name pyproject.toml -not -path "./.git/*" | while read -r file; do
            echo "→ Updating $file"
            sed -i '/^dynamic\s*=/d' "$file"
            if grep -q '^version *= *".*"' "$file"; then
              sed -i "s/^version *= *.*/version = \"$VERSION\"/" "$file"
            else
              sed -i "/^\[project\]/a version = \"$VERSION\"" "$file"
            fi
          done

      - name: Commit version changes if any
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add $(find . -type f -name pyproject.toml -not -path "./.git/*")
          if ! git diff --cached --quiet; then
            git commit -m "Bump version to ${VERSION#v}"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Build agilab package
        working-directory: .
        run:
          uv build --wheel

      - name: Upload agilab package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agilab-distributions
          path: dist/

      - name: Verify agi-core package files before upload
        run: twine check dist/*

      - name: Publish agilab package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload dist/*

      # Optional: If you want to publish the main agilab package,
      # make sure to add a build step before this
      # - name: Build main agilab package
      #   run: <your build commands here>

      - name: Publish agilab main package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload dist/*

