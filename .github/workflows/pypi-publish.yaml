name: pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release (e.g. v0.3.66 or 0.3.66)"
        required: true
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Fail on accidental O.* version typos in published packages
        run: |
          set -euxo pipefail
          if grep -R --line-number '^[[:space:]]*version[[:space:]]*=[[:space:]]*"O\.' src/agilab/core src/agilab/lib; then
            echo "❌ Found bad version lines (capital O). Fix the source metadata before release." >&2
            exit 1
          fi

      - name: Run release preflight tests
        run: |
          set -eux
          uv --preview-features extra-build-dependencies run --no-project python tools/workflow_parity.py \
            --profile agi-env \
            --profile agi-gui \
            --profile agi-core-combined \
            --profile shared-core-typing \
            --profile dependency-policy


  release-evidence:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Build sample external evidence payload
        run: |
          set -euxo pipefail
          uv --preview-features extra-build-dependencies run \
            python tools/github_actions_artifact_index.py \
            --write-sample-directory "$RUNNER_TEMP/public-evidence-sample" \
            --compact

      - name: Upload sample external evidence artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-evidence-sample
          path: ${{ runner.temp }}/public-evidence-sample
          if-no-files-found: error
          retention-days: 7

      - name: Validate live GitHub Actions artifact harvest path
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          for attempt in 1 2 3 4 5 6; do
            uv --preview-features extra-build-dependencies run \
              python tools/github_actions_artifact_index.py \
              --live-github \
              --repo "$GITHUB_REPOSITORY" \
              --run-id "$GITHUB_RUN_ID" \
              --workflow "$GITHUB_WORKFLOW" \
              --run-attempt "$GITHUB_RUN_ATTEMPT" \
              --source-machine "github-actions:${RUNNER_OS}-${RUNNER_ARCH}" \
              --download-dir "$RUNNER_TEMP/downloaded-evidence" \
              --output "$RUNNER_TEMP/artifact_index.json" \
              --compact
            if uv --preview-features extra-build-dependencies run \
              python tools/ci_artifact_harvest_report.py \
              --artifact-index "$RUNNER_TEMP/artifact_index.json" \
              --compact; then
              break
            fi
            if [ "$attempt" = "6" ]; then
              exit 1
            fi
            sleep 5
          done
          uv --preview-features extra-build-dependencies run \
            python tools/compatibility_report.py \
            --artifact-index "$RUNNER_TEMP/artifact_index.json" \
            --no-default-manifests \
            --compact


  publish-library-packages:
    needs:
      - test
      - release-evidence
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agilab/
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN || secrets.PYPI_SECRET }}
      PYPI_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING || secrets.PYPI_TRUSTED_PUBLISHING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: |
          rm -rf dist-library
          rm -rf src/agilab/core/agi-env/dist
          rm -rf src/agilab/lib/agi-gui/dist
          rm -rf src/agilab/core/agi-node/dist
          rm -rf src/agilab/core/agi-cluster/dist
          rm -rf src/agilab/core/agi-core/dist

      # Build + verify + publish to PyPI (official)
      - name: Build agi-env
        run: uv --preview-features extra-build-dependencies build --project src/agilab/core/agi-env --wheel
      - name: Verify agi-env
        run: twine check src/agilab/core/agi-env/dist/*

      - name: Build agi-gui
        run: uv --preview-features extra-build-dependencies build --project src/agilab/lib/agi-gui --wheel
      - name: Verify agi-gui
        run: twine check src/agilab/lib/agi-gui/dist/*

      - name: Build agi-node
        run: uv --preview-features extra-build-dependencies build --project src/agilab/core/agi-node --wheel
      - name: Verify agi-node
        run: twine check src/agilab/core/agi-node/dist/*

      - name: Build agi-cluster
        run: uv --preview-features extra-build-dependencies build --project src/agilab/core/agi-cluster --wheel
      - name: Verify agi-cluster
        run: twine check src/agilab/core/agi-cluster/dist/*

      - name: Build agi-core
        run: uv --preview-features extra-build-dependencies build --project src/agilab/core/agi-core --wheel
      - name: Verify agi-core
        run: twine check src/agilab/core/agi-core/dist/*

      - name: Collect library distributions
        run: |
          set -euxo pipefail
          mkdir -p dist-library
          cp src/agilab/core/agi-env/dist/* dist-library/
          cp src/agilab/lib/agi-gui/dist/* dist-library/
          cp src/agilab/core/agi-node/dist/* dist-library/
          cp src/agilab/core/agi-cluster/dist/* dist-library/
          cp src/agilab/core/agi-core/dist/* dist-library/

      - name: Check whether library distributions already exist on PyPI
        id: library-pypi-state
        run: |
          set -euxo pipefail
          python tools/pypi_distribution_state.py \
            --dist-dir dist-library \
            --github-output "$GITHUB_OUTPUT"

      - name: Ensure PyPI auth is configured for library packages
        if: steps.library-pypi-state.outputs.all-exist != 'true'
        run: |
          set -euo pipefail
          if [ -n "${PYPI_TOKEN:-}" ]; then
            echo "Using PyPI API token authentication."
            exit 0
          fi
          if [ "${PYPI_TRUSTED_PUBLISHING:-}" = "true" ]; then
            echo "Using PyPI trusted publishing."
            exit 0
          fi
          echo "ERROR: Missing PYPI_API_TOKEN/PYPI_SECRET. To use OIDC instead, configure a PyPI trusted publisher for this workflow and set repository variable PYPI_TRUSTED_PUBLISHING=true." >&2
          exit 2

      - name: Publish library packages to PyPI with token
        if: steps.library-pypi-state.outputs.all-exist != 'true' && env.PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-library/
          skip-existing: true
          password: ${{ env.PYPI_TOKEN }}

      - name: Publish library packages to PyPI with trusted publishing
        if: steps.library-pypi-state.outputs.all-exist != 'true' && env.PYPI_TOKEN == '' && env.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-library/
          skip-existing: true
  publish-agilab:
    needs: publish-library-packages
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agilab/
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN || secrets.PYPI_SECRET }}
      PYPI_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING || secrets.PYPI_TRUSTED_PUBLISHING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf dist

      - name: Remove symlinks (apps/ and views/)
        shell: bash
        run: |
          set -euxo pipefail
          find src/agilab/apps src/agilab/views -type l -print -delete || true

      - name: Build agilab
        run: uv --preview-features extra-build-dependencies build --wheel

      - name: Verify agilab
        run: twine check dist/*

      - name: Check whether agilab distribution already exists on PyPI
        id: agilab-pypi-state
        run: |
          set -euxo pipefail
          python tools/pypi_distribution_state.py \
            --dist-dir dist \
            --github-output "$GITHUB_OUTPUT"

      - name: Ensure PyPI auth is configured for agilab
        if: steps.agilab-pypi-state.outputs.all-exist != 'true'
        run: |
          set -euo pipefail
          if [ -n "${PYPI_TOKEN:-}" ]; then
            echo "Using PyPI API token authentication."
            exit 0
          fi
          if [ "${PYPI_TRUSTED_PUBLISHING:-}" = "true" ]; then
            echo "Using PyPI trusted publishing."
            exit 0
          fi
          echo "ERROR: Missing PYPI_API_TOKEN/PYPI_SECRET. To use OIDC instead, configure a PyPI trusted publisher for this workflow and set repository variable PYPI_TRUSTED_PUBLISHING=true." >&2
          exit 2

      - name: Publish agilab to PyPI with token
        if: steps.agilab-pypi-state.outputs.all-exist != 'true' && env.PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          password: ${{ env.PYPI_TOKEN }}

      - name: Publish agilab to PyPI with trusted publishing
        if: steps.agilab-pypi-state.outputs.all-exist != 'true' && env.PYPI_TOKEN == '' && env.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
