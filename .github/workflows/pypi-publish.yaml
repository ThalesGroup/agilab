name: pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release'
        required: true
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv twine pytest numpy

      - name: Create symbolic links for agi-env, cluster, and node
        run: |
          src_dir="agi-core/src"
          for dir in "$src_dir"/*/; do
            [ -d "$dir" ] || continue
            base=${dir%/}
            base=${base##*/}
            if [[ "$base" == *_worker || "$base" == "agi_dispatcher" ]]; then
              target="src/fwk/core/node/src/$base"
            else
              case "$base" in
                agi_env) target="src/fwk/core/env/src/$base" ;;
                agi_distributor) target="src/fwk/core/cluster/src/$base" ;;
                *) echo "Warning: no target for $base, skipping"; continue ;;
              esac
            fi
            ln -sf "$dir" "$target"
            echo "Linked $dir → $target"
          done

      - name: Run tests
        env:
          PYTHONPATH: "${{ github.workspace }}/src"
        run: pytest

