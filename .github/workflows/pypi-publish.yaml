name: Upload release to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release'
        required: true

  push:
    tags:
      - 'v*.*.*'

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install uv

    - name: Remove all existing distribution directories
      run: |
        rm -rf src/fwk/env/dist src/fwk/core/dist src/fwk/lab/dist dist

    - name: Update version in pyproject.toml
      env:
        VERSION: ${{ github.event.inputs.version || github.ref_name }}
      run: |
        VERSION=${VERSION#v}
        echo "Setting version: $VERSION"
        sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

    - name: Build and upload subpackages
      run: |
        SUBDIRS=("src/fwk/env" "src/fwk/core" "src/fwk/lab")
        for dir in "${SUBDIRS[@]}"; do
          echo "Building package in $dir"
          pushd "$dir"
          uv build
          popd
        done

    - name: Upload agi-env package
      uses: actions/upload-artifact@v4
      with:
        name: agi-env-distributions
        path: src/fwk/env/dist/

    - name: Upload agi-core package
      uses: actions/upload-artifact@v4
      with:
        name: agi-core-distributions
        path: src/fwk/core/dist/

    - name: Upload agi-lab package
      uses: actions/upload-artifact@v4
      with:
        name: agi-lab-distributions
        path: src/fwk/lab/dist/

    - name: Build and upload main package (agilab)
      run: uv build

    - name: Upload agilab package
      uses: actions/upload-artifact@v4
      with:
        name: agilab-distributions
        path: dist/