name: pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release (e.g. v0.3.66 or 0.3.66)"
        required: true
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Fail on accidental O.* version typos in published packages
        run: |
          set -euxo pipefail
          if grep -R --line-number '^[[:space:]]*version[[:space:]]*=[[:space:]]*"O\.' src/agilab/core src/agilab/lib; then
            echo "❌ Found bad version lines (capital O). Fix the source metadata before release." >&2
            exit 1
          fi

      - name: Run release preflight tests
        run: |
          set -eux
          uv --preview-features extra-build-dependencies run python tools/workflow_parity.py \
            --profile agi-env \
            --profile agi-gui \
            --profile agi-core-combined \
            --profile shared-core-typing \
            --profile dependency-policy \
            --profile release-proof


  release-evidence:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Build sample external evidence payload
        run: |
          set -euxo pipefail
          uv --preview-features extra-build-dependencies run \
            python tools/github_actions_artifact_index.py \
            --write-sample-directory "$RUNNER_TEMP/public-evidence-sample" \
            --compact

      - name: Upload sample external evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: public-evidence-sample
          path: ${{ runner.temp }}/public-evidence-sample
          if-no-files-found: error
          retention-days: 7

      - name: Validate live GitHub Actions artifact harvest path
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          for attempt in 1 2 3 4 5 6; do
            if uv --preview-features extra-build-dependencies run \
              python tools/github_actions_artifact_index.py \
              --live-github \
              --repo "$GITHUB_REPOSITORY" \
              --run-id "$GITHUB_RUN_ID" \
              --workflow "$GITHUB_WORKFLOW" \
              --run-attempt "$GITHUB_RUN_ATTEMPT" \
              --source-machine "github-actions:${RUNNER_OS}-${RUNNER_ARCH}" \
              --download-dir "$RUNNER_TEMP/downloaded-evidence" \
              --output "$RUNNER_TEMP/artifact_index.json" \
              --compact; then
              if uv --preview-features extra-build-dependencies run \
                python tools/ci_artifact_harvest_report.py \
                --artifact-index "$RUNNER_TEMP/artifact_index.json" \
                --compact; then
                break
              fi
            fi
            if [ "$attempt" = "6" ]; then
              exit 1
            fi
            sleep 5
          done
          uv --preview-features extra-build-dependencies run \
            python tools/compatibility_report.py \
            --artifact-index "$RUNNER_TEMP/artifact_index.json" \
            --no-default-manifests \
            --compact

  supply-chain-evidence:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade --no-cache-dir uv

      - name: Generate per-profile SBOM and vulnerability evidence
        run: |
          set -euxo pipefail
          mkdir -p test-results/supply-chain
          uv --preview-features extra-build-dependencies run \
            python tools/profile_supply_chain_scan.py \
            --profile all \
            --output-dir test-results/supply-chain \
            --json > test-results/supply-chain/scan-plan.json
          uv --preview-features extra-build-dependencies run \
            python tools/profile_supply_chain_scan.py \
            --profile all \
            --output-dir test-results/supply-chain \
            --run

      - name: Upload supply-chain release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: supply-chain-release-evidence
          path: test-results/supply-chain
          if-no-files-found: error
          retention-days: 90

  trusted-publisher-contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Render PyPI trusted publisher contract
        run: |
          set -euxo pipefail
          python tools/pypi_trusted_publisher_contract.py \
            --check-workflow .github/workflows/pypi-publish.yaml \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

  publish-library-packages:
    needs:
      - test
      - release-evidence
      - supply-chain-evidence
      - trusted-publisher-contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: agi-env
            project: src/agilab/core/agi-env
            dist: src/agilab/core/agi-env/dist
            pypi_project: agi-env
            pypi_environment: pypi-agi-env
          - package: agi-gui
            project: src/agilab/lib/agi-gui
            dist: src/agilab/lib/agi-gui/dist
            pypi_project: agi-gui
            pypi_environment: pypi-agi-gui
          - package: agi-pages
            project: src/agilab/lib/agi-pages
            dist: src/agilab/lib/agi-pages/dist
            pypi_project: agi-pages
            pypi_environment: pypi-agi-pages
          - package: agi-node
            project: src/agilab/core/agi-node
            dist: src/agilab/core/agi-node/dist
            pypi_project: agi-node
            pypi_environment: pypi-agi-node
          - package: agi-cluster
            project: src/agilab/core/agi-cluster
            dist: src/agilab/core/agi-cluster/dist
            pypi_project: agi-cluster
            pypi_environment: pypi-agi-cluster
          - package: agi-core
            project: src/agilab/core/agi-core
            dist: src/agilab/core/agi-core/dist
            pypi_project: agi-core
            pypi_environment: pypi-agi-core
          - package: agi-apps
            project: src/agilab/lib/agi-apps
            dist: src/agilab/lib/agi-apps/dist
            pypi_project: agi-apps
            pypi_environment: pypi-agi-apps
    environment:
      name: ${{ matrix.pypi_environment }}
      url: https://pypi.org/project/${{ matrix.pypi_project }}/
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PYPI_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING || secrets.PYPI_TRUSTED_PUBLISHING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous ${{ matrix.package }} build
        run: rm -rf "${{ matrix.dist }}"

      - name: Build ${{ matrix.package }}
        run: uv --preview-features extra-build-dependencies build --project "${{ matrix.project }}" --wheel

      - name: Verify ${{ matrix.package }}
        run: twine check "${{ matrix.dist }}"/*

      - name: Check whether ${{ matrix.package }} distributions already exist on PyPI
        id: library-pypi-state
        run: |
          set -euxo pipefail
          python tools/pypi_distribution_state.py \
            --dist-dir "${{ matrix.dist }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Ensure PyPI auth is configured for library packages
        if: steps.library-pypi-state.outputs.all-exist != 'true'
        run: |
          set -euo pipefail
          if [ "${PYPI_TRUSTED_PUBLISHING:-}" = "true" ]; then
            echo "Using PyPI trusted publishing."
            exit 0
          fi
          echo "ERROR: PyPI publication requires Trusted Publishing/OIDC. Configure a PyPI trusted publisher for this workflow and set repository variable PYPI_TRUSTED_PUBLISHING=true." >&2
          exit 2

      - name: Report trusted publisher claim for ${{ matrix.package }}
        if: steps.library-pypi-state.outputs.all-exist != 'true'
        run: |
          set -euxo pipefail
          python tools/pypi_trusted_publisher_contract.py \
            --package "${{ matrix.package }}" \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      # PyPI OIDC tokens are project-scoped. The matrix gives each PyPI
      # project a distinct GitHub environment claim.
      - name: Publish ${{ matrix.package }} to PyPI with trusted publishing
        if: steps.library-pypi-state.outputs.all-exist != 'true' && env.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ matrix.dist }}
          skip-existing: true
  publish-agilab:
    needs: publish-library-packages
    runs-on: ubuntu-latest
    environment:
      name: pypi-agilab
      url: https://pypi.org/project/agilab/
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      PYPI_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING || secrets.PYPI_TRUSTED_PUBLISHING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and twine
        run: python -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf dist

      - name: Remove symlinks (apps/ and views/)
        shell: bash
        run: |
          set -euxo pipefail
          find src/agilab/apps src/agilab/views -type l -print -delete || true

      - name: Build agilab
        run: uv --preview-features extra-build-dependencies build --wheel

      - name: Verify agilab
        run: twine check dist/*

      - name: Check whether agilab distribution already exists on PyPI
        id: agilab-pypi-state
        run: |
          set -euxo pipefail
          python tools/pypi_distribution_state.py \
            --dist-dir dist \
            --github-output "$GITHUB_OUTPUT"

      - name: Ensure PyPI auth is configured for agilab
        if: steps.agilab-pypi-state.outputs.all-exist != 'true'
        run: |
          set -euo pipefail
          if [ "${PYPI_TRUSTED_PUBLISHING:-}" = "true" ]; then
            echo "Using PyPI trusted publishing."
            exit 0
          fi
          echo "ERROR: PyPI publication requires Trusted Publishing/OIDC. Configure a PyPI trusted publisher for this workflow and set repository variable PYPI_TRUSTED_PUBLISHING=true." >&2
          exit 2

      - name: Report trusted publisher claim for agilab
        if: steps.agilab-pypi-state.outputs.all-exist != 'true'
        run: |
          set -euxo pipefail
          python tools/pypi_trusted_publisher_contract.py \
            --package agilab \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Publish agilab to PyPI with trusted publishing
        if: steps.agilab-pypi-state.outputs.all-exist != 'true' && env.PYPI_TRUSTED_PUBLISHING == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
