name: pypi-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release (e.g. 0.3.66)'
        required: true
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      python-version: '3.13'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        run: python3 -m pip install --upgrade --no-cache-dir uv

      - name: Sync and build uv projects
        run: |
          set -eux
          pushd "src/agilab/core/agi-cluster"
          uv sync --dev
          uv pip install -e .
          uv pip install -e ../agi-env
          uv pip install -e ../agi-node
          popd

      - name: Run tests
        run: |
          set -eux
          pushd "src/agilab/core"
          uv run --dev --project agi-cluster python -m pytest --maxfail=5 --disable-warnings -v
          popd

  publish-agi-core:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv and twine
        run: python3 -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf src/agilab/core/agi-core/dist

      - name: Update version in pyproject.toml files
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION=${VERSION#v}
          echo "Bumping version to $VERSION"
          find src/agilab/core/agi-core -type f -name pyproject.toml -not -path "./.git/*" | while read -r file; do
            echo "→ Updating $file"
            sed -i '/^dynamic\s*=/d' "$file"
            if grep -q '^version *= *".*"' "$file"; then
              sed -i "s/^version *= *.*/version = \"$VERSION\"/" "$file"
            else
              sed -i "/^\[project\]/a version = \"$VERSION\"" "$file"
            fi
          done

      - name: Commit version changes if any
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add $(find src/agilab/core/agi-core -type f -name pyproject.toml -not -path "./.git/*")
          if ! git diff --cached --quiet; then
            git commit -m "Bump version to ${VERSION#v}"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: Build agi-core package
        run: uv build --project src/agilab/core/agi-core --wheel
      - name: Upload agi-core package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-core-distributions
          path: src/agilab/core/agi-core/dist/
      - name: Verify agi-core package files before upload
        run: twine upload src/agilab/core/agi-core/dist/*

      - name: Build agi-env package
        run: uv build --project src/agilab/core/agi-env --wheel
      - name: Upload agi-env package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-env-distributions
          path: src/agilab/core/agi-env/dist/
      - name: Verify agi-env package files before upload
        run: twine upload src/agilab/core/agi-env/dist/*

      - name: Build agi-cluster package
        run: uv build --project src/agilab/core/agi-cluster --wheel
      - name: Upload agi-cluster package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-cluster-distributions
          path: src/agilab/core/agi-cluster/dist/
      - name: Verify agi-cluster package files before upload
        run: twine upload src/agilab/core/agi-cluster/dist/*

      - name: Build agi-node package
        run: uv build --project src/agilab/core/agi-node --wheel
      - name: Upload agi-node package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agi-node-distributions
          path: src/agilab/core/agi-node/dist/
      - name: Verify agi-node package files before upload
        run: twine upload src/agilab/core/agi-node/dist/*

      - name: Publish agi-core package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload src/agilab/core/agi-core/dist/*

  publish-agilab:
    needs: publish-agi-core
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install uv
        run: python3 -m pip install --upgrade --no-cache-dir uv twine

      - name: Clean previous builds
        run: rm -rf dist

      - name: Update version in pyproject.toml files
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION=${VERSION#v}
          echo "Bumping version to $VERSION"
          find . -type f -name pyproject.toml -not -path "./.git/*" | while read -r file; do
            echo "→ Updating $file"
            sed -i '/^dynamic\s*=/d' "$file"
            if grep -q '^version *= *".*"' "$file"; then
              sed -i "s/^version *= *.*/version = \"$VERSION\"/" "$file"
            else
              sed -i "/^\[project\]/a version = \"$VERSION\"" "$file"
            fi
          done

      - name: Commit version changes if any
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add $(find . -type f -name pyproject.toml -not -path "./.git/*")
          if ! git diff --cached --quiet; then
            git commit -m "Bump version to ${VERSION#v}"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: Build agilab package
        run: uv build --wheel

      - name: Upload agilab package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agilab-distributions
          path: dist/

      - name: Verify agilab package files before upload
        run: twine check dist/*

      - name: Publish agilab package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SECRET }}
        run: twine upload dist/*
