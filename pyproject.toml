[project]
name = "agi-core"
version = "0.5.7"
description = "AGI meta-package that installs agi-env, agi-node, and agi-cluster"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Jean-Pierre Morard", email = "focus@thalesgroup.com" }]
classifiers = [
  "Intended Audience :: Developers",
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Operating System :: MacOS",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: Linux",
]

# 👉 The key bit: depend on the three subpackages by name
dependencies = [
  "agi-env",       # pin to the first known-good version (adjust)
  "agi-node",
  "agi-cluster",
]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab"
Issues = "https://github.com/ThalesGroup/agilab/issues"

