[project]
version = "0.6.4"
name = "agilab"
description = "AGILAB a datascience IDE for engineering to explore AI"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "Jean-Pierre Morard", email = "focus@thalesgroup.com" }
]

classifiers = [
    "Intended Audience :: Developers",
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]

keywords = [
    "jupyter", "mlflow", "asyncio", "dask", "rapids",
    "streamlit", "distributed", "cython", "cluster", "dataframe",
    "dataset", "load balancing", "gen ai", "copilot", "agi",
    "pycharm", "datascience"
]

dependencies = [
    "astor",
    "asyncssh",
    "build",
    "fastparquet",
    "geojson",
    "humanize",
    "jupyter-ai[all]",
    "keras",
    "matplotlib",
    "mlflow",
    "networkx",
    "numba",
    "openai",
    "pathspec",
    "pip",
    "plotly",
    "polars",
    "py7zr",
    "pytest-asyncio>=1.1.0",
    "seaborn",
    "setuptools",
    "streamlit",
    "streamlit-modal",
    "streamlit_code_editor",
    "streamlit_extras",
    "tomli",
    "tomli_w",
    "twine",
    "watchdog",
    "wheel",
    "agi-cluster",
    "agi-env",
    "agi-node",
]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab"
Issues = "https://github.com/ThalesGroup/agilab/issues"

[tool.uv.sources.agi-node]
path = "src/agilab/core/agi-node"

[tool.uv.sources.agi-cluster]
path = "src/agilab/core/agi-cluster"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["agilab*"]  # This grabs agilab, agilab.gui, agilab.apps, etc.
exclude = [
    "agilab.core*",
    ".idea*",
    "test*",
    "build*",
    ".venv*"
]

[tool.setuptools.package-data]
agilab = [
    "resources/*.*",
    "resources/help/*",
    "*.toml",
    "*.ipynb",
]

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.pyment]
source_dir = "src"
format = "google"
