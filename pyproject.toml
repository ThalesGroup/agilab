[project]
version = "2026.4.27.post3"
name = "agilab"
description = "AGILAB is an end-to-end experimentation platform linking interactive development with scalable, reproducible execution orchestration."
requires-python = ">=3.11"
readme = "README.pypi.md"
authors = [
    { name = "Jean-Pierre Morard" }
]
maintainers = [{ name = "Jean-Pierre Morard" }]
license = "BSD-3-Clause"
license-files = ["LICENSE"]

classifiers = [
    "Intended Audience :: Developers",
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
keywords = [
    "ai-experimentation",
    "ai-lab",
    "agentic-ai",
    "jupyter-notebooks",
    "multi-venv",
    "streamlit",
    "distributed-execution",
    "mlops",
    "python",
    "pycharm",
    "jupyter",
    "ci-cd"
]
dependencies = ["astor", "asyncssh", "fastparquet", "geojson", "geopy", "humanize", "jupyter-ai", "keras", "matplotlib", "mlflow", "networkx", "noise", "numba>=0.61.0", "numpy>=1.14.1", "openai", "pathspec", "plotly", "polars", "pulp", "py7zr", "scipy==1.16.1", "seaborn", "simpy>=4.1,<5", "skforecast>=0.19,<0.20", "streamlit>=1.56.0", "streamlit-modal", "streamlit_code_editor", "streamlit_extras", "tomli", "tomli_w", "watchdog", "sgp4", "agi-core==2026.4.27.post3", "agi-env[ui]==2026.4.27.post3", "legacy-cgi; python_version >= '3.13'", "standard-imghdr; python_version >= '3.13'"]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab"
Repository = "https://github.com/ThalesGroup/agilab"
Issues = "https://github.com/ThalesGroup/agilab/issues"
Discussions = "https://github.com/ThalesGroup/agilab/discussions"
Changelog = "https://github.com/ThalesGroup/agilab/releases"

[project.scripts]
agilab = "agilab.lab_run:main"

[project.optional-dependencies]
offline = ["gpt-oss>=0.0.8; python_version >= '3.12'", "universal-offline-ai-chatbot>=0.1.0; python_version >= '3.12'", "transformers>=4.57.0; python_version >= '3.12'", "torch>=2.8.0; python_version >= '3.12'", "accelerate>=0.34.2; python_version >= '3.12'"]



































































































[dependency-groups]
dev = [
    "agi-core",
    "build",
    "pip",
    "pytest",
    "pytest-cov",
    "pytest-local-badge",
    "pytest-asyncio",
    "setuptools",
    "twine",
    "wheel",
    "ydata-profiling",
    "genbadge[coverage]",
    "pypi-cleanup",
]

[tool.uv.extra-build-dependencies]
htmlmin = ["legacy-cgi"]
ydata-profiling = ["standard-imghdr"]

[tool.uv.sources.agi-core]
    path = "./src/agilab/core/agi-core"
    editable = true

[tool.uv.sources.agi-env]
    path = "./src/agilab/core/agi-env"
    editable = true

[tool.uv.sources.agi-node]
    path = "./src/agilab/core/agi-node"
    editable = true

[tool.uv.sources.agi-cluster]
    path = "./src/agilab/core/agi-cluster"
    editable = true

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = false
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = [
    "agilab",
    "agilab.resources*",
]
exclude = [
    "agilab.core*",
    "agilab.test*",
    "agilab.apps.*",
    ".idea*",
    "test*",
    "build*",
    ".venv*"
]

[tool.setuptools.package-data]
agilab = [
    "resources/*.*",
    "resources/help/*",
    "pages/*.py",
    "apps/builtin/*/pyproject.toml",
    "apps/builtin/*/README.md",
    "apps/builtin/*/lab_steps.toml",
    "apps/builtin/*/pipeline_view.dot",
    "apps/builtin/*/src/**/*.py",
    "apps/builtin/*/src/**/*.pyx",
    "apps/builtin/*/src/**/*.toml",
    "apps/builtin/*/src/**/*.csv",
    "apps/builtin/*/src/**/*.dot",
    "apps/builtin/*/src/*/sample_data/*.json",
    "apps-pages/README.md",
    "apps-pages/*/pyproject.toml",
    "apps-pages/*/*.py",
    "apps-pages/*/src/*/*.py",
    "*.toml",
    "*.ipynb",
]

[tool.setuptools.exclude-package-data]
agilab = [
    # Keep internal tests out of the distribution.
    "test/*",
    # Drop local build artifacts from packaged built-in apps.
    "apps/builtin/*/src/pre_prompt.json",
    "apps/builtin/*/src/__pycache__/*",
    "apps/builtin/*/src/*/__pycache__/*",
    "apps/builtin/*/src/*/*/__pycache__/*",
    "apps/builtin/*/src/*.pyc",
    "apps/builtin/*/src/*/*.pyc",
    "apps/builtin/*/src/*/*/*.pyc",
    "apps/builtin/*/src/*.egg-info/*",
    "apps/builtin/*/src/*/*.egg-info/*",
    "apps/builtin/*/src/*/*.c",
    "apps/builtin/*/src/*/*.7z",
]

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.pyment]
source_dir = "agilab"
format = "google"

[tool.pytest.ini_options]
# Let pytest discover tests from repo root
testpaths = [
  "test",
  "src/agilab/core/test",
  "src/agilab/core/agi-env/test",
]

# Make the core packages importable when running pytest from the repo root
pythonpath = [
  "src",
  "src/agilab/core/agi-env/src",
  "src/agilab/core/agi-node/src",
  "src/agilab/core/agi-cluster/src",
]

# (merge everything you had inline here)
asyncio_mode = "auto"
markers = [
  "integration: live/external integration checks (excluded from default CI suite)",
  "ui_robot: browser-driven AGILAB UI robot checks (opt-in; launches Streamlit/Playwright)",
]
# addopts = "--import-mode=importlib"   # if you had it
filterwarnings = [
  "ignore:ast\\.Num is deprecated.*:DeprecationWarning:ast",
  "ignore:Theme names and color schemes are lowercase.*:DeprecationWarning:IPython\\.core\\.ultratb",
  "ignore:'oneOf' deprecated - use 'one_of':Warning:matplotlib\\._fontconfig_pattern",
  "ignore:'parseString' deprecated - use 'parse_string':Warning:matplotlib\\._fontconfig_pattern",
  "ignore:'resetCache' deprecated - use 'reset_cache':Warning:matplotlib\\._fontconfig_pattern",
  "ignore:'enablePackrat' deprecated - use 'enable_packrat':Warning:matplotlib\\._mathtext",
]

addopts = [
  "--cov=agilab", "--cov=agi_core", "--cov=agi_env", "--cov=agi_cluster", "--cov=agi_node", "--cov=src/agilab/apps-pages",
  "--cov-report=term-missing:skip-covered"
]

[tool.coverage.run]
branch = true
source = ["agilab", "agi_core", "agi_env", "agi_cluster", "agi_node", "src/agilab/apps-pages"]
disable_warnings = ["module-not-imported"]

[tool.coverage.report]
omit = [
    "src/agilab/About_agilab.py",
    "src/agilab/lab_run.py",
    "src/agilab/pages/*.py",
]
