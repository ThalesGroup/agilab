[project]
name = "link_sim_project"
version = "0.4.01"
description = "link_sim_project is an example of data project"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "Jean-Pierre Morard", email = "focus@thalesgroup.com" },
]
dependencies = [
    "numpy",
    "geopy",
    "setuptools",
    "cython",
    "parso",
    "py7zr",
    "python-dotenv",
    "fastparquet",
    "ipython",
    "dask[distributed]",
    "pyarrow",
    "polars",
    "pandas",
    "plotly",
    "noise",
    "agi-env",
    "agi-node",
    "agi-cluster",
]

[project.license]
text = "Thales SIX GTS France SAS"

[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-cov",
    "pytest-local-badge",
    "pytest-asyncio",
    "licensecheck",
    "link_sim_project",
    "dask[distributed]",
]
#rapids = [
#    "cuspatial-cu12; platform_system == 'Linux'",
#]

[tool.uv]
default-groups = [
    "dev",
]

[tool.uv.sources]
agi-env = {path = "../../core/env", editable = true}
agi-node = {path = "../../core/node", editable = true}
agi-cluster = {path = "../../core/cluster", editable = true}

[tool.uv.sources.link_sim_project]
workspace = true

[tool.setuptools]
include-package-data = true

[tool.setuptools.data-files]
pyprojects = [
    "src/*.ipynb",
    "src/*.json",
    "src/*.toml",
    "src/*/*.py*",
]

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = false
ignore_missing_imports = true

[project.optional-dependencies]
agi-worker = []
agent-worker = []
dag-worker = []
polars-worker = ["polars",]
agi-manager = []