requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "dask[distributed]",
    "numpy",
    "geopy",
    "humanize",
    "setuptools",
    "cython",
    "parso",
    "polars",
    "py7zr",
    "python-dotenv",
    "fastparquet",
