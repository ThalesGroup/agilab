[project]
name = "your_pandas_project"
version = "0.1.8"
description = ""
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "your name", email = "your email"}
]

dependencies = [ "numpy", "geopy", "setuptools", "cython", "psutil", "parso", "py7zr", "python-dotenv", "humanize", "requests", "dask[distributed]"]

[dependency-groups]
dev = [
    "black",
    "pytest",
    "licensecheck",
    "your_pandas_project",
    "psutil",
    "agi-env",
    "agi-cluster",
]

[tool.uv.sources]
agi-cluster = {path = "/Users/jpm/PycharmProjects/agilab/src/fwk/core/cluster", editable = true}
agi-env = {path = "/Users/jpm/PycharmProjects/agilab/src/fwk/core/env", editable = true}

[tool.uv.sources.your_pandas_project]
workspace = true

[tool.setuptools]
include-package-data = true

[tool.setuptools.data-files]
pyprojects = [
    "src/*.ipynb",
    "src/*.json",
    "src/*.toml",
    "src/*/*.py*",
]

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = false
ignore_missing_imports = true
