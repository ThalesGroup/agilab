[project]
name = "mycode_project"
version = "0.4.0"
description = ""
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "cython",
    "dask[distributed]",
    "geopy",
    "humanize",
    "numpy<2.3",
    "parso",
    "psutil",
    "py7zr",
    "python-dotenv",
    "requests",
    "setuptools",
]

[[project.authors]]
name = "Jean-Pierre Morard"
email = "focus@thalesgroup.com"

[dependency-groups]
dev = [ "black", "pytest", "pytest-asyncio", "licensecheck"]

[project.license]
text = "Thales SIX GTS France SAS"

[tool.mypy]
mypy_path = [ "stubs",]
disallow_untyped_defs = false
ignore_missing_imports = true

[project.optional-dependencies]
agi-worker = []
agent-worker = []
dag-worker = []
polars-worker = []
agi-manager = []