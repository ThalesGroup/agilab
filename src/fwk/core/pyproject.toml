[project]
name = "core"
version = "0.4.0"
description = "agi-core is a framework to explore AI for engineering"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cluster",
    "node",
    "env"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["cluster", "node", "env"]
exclude = [
    ".idea*",
    "test*",
    "build",
]
