[project]
name = "agi-core"
version = "0.1.0"
description = "AGI Core"
requires-python = "==3.12.*"
readme = "README.md"
# Define authors with only name and email
authors = [
    { name = "Jean-Pierre Morard", email = "focus@thalesgroup.com" }
]
# Uncomment and adjust if a license is required:
# license = { text = "BSD 3-Clause License" }
dependencies = [
    "dask[distributed]", "paramiko", "scp", "scikit-learn", "parso",
    "cython", "setuptools", "msgpack", "numba", "py7zr",
    "agi-env", "python-dotenv"
]

[dependency-groups]
dev = [
    "agi-core", "black", "pytest", "licensecheck"
]
# Use a list entry with inline marker for rapids group
rapids = [
    "cuspatial-cu12; platform_system == 'Linux'"
]

[project.optional-dependencies]
agi-worker = []
agent-worker = []
dag-worker = []
data-worker = ["polars"]
managers = ["jupyter", "mypy", "numba", "pydantic", "requests", "wheel", "polars"]
workers = []

[tool.uv]
default-groups = ["dev"]

[tool.uv.sources.agi-env]
path = "/home/pcm/agilab/src/fwk/env"
editable = true

[tool.uv.sources.agi-core]
workspace = true

[tool.mypy]
mypy_path = ["stubs"]
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.pyment]
source_dir = "src"
format = "google"