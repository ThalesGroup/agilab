[project]
version = "2026.05.12.post2"
name = "agi-env"
description = "Environment bootstrap package for AGILAB with virtualenv, path, and runtime helpers"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "Jean-Pierre Morard" }
]
maintainers = [{ name = "Jean-Pierre Morard" }]
license = "BSD-3-Clause"
license-files = ["LICENSE"]

classifiers = [
    "Intended Audience :: Developers",
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]

keywords = [
    "python",
    "reproducibility",
    "reproducible-research",
    "workflow-orchestration",
    "dependency-management",
    "virtual-environments",
    "environment-management",
    "python-automation",
    "free-threaded-python",
]

dependencies = [
    "astor",
    "pathspec",
    "psutil",
    "py7zr",
    "pydantic",
    "python-dotenv",
    "tomlkit",
]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab/tree/main/src/agilab/core/agi-env"
Issues = "https://github.com/ThalesGroup/agilab/issues"
Homepage = "https://github.com/ThalesGroup/agilab"
Repository = "https://github.com/ThalesGroup/agilab"
Discussions = "https://github.com/ThalesGroup/agilab/discussions"
Changelog = "https://github.com/ThalesGroup/agilab/releases"













[[tool.mypy.overrides]]
module = "agi_core.*"
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true
warn_unused_ignores = true





























































































































[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-asyncio",
    "licensecheck",
    "pytest-cov",
    "agi-gui"
]

[tool.uv.sources.agi-gui]
    path = "../../lib/agi-gui"
    editable = true

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.data-files]
agi_env = [
    "src/resources/*",
    "*.ipynb",
    "*.json",
    "*.toml",
]

[tool.mypy]
mypy_path = ["stubs"]
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.pyment]
source_dir = "src"
format = "google"

[tool.pytest.ini_options]
# Where your tests live for this project
testpaths = ["test"]

# Prefer auto so async tests don't need @pytest.mark.asyncio
asyncio_mode = "auto"

# Quiet known third-party deprecations
filterwarnings = [
  "ignore:ast\\.Num is deprecated.*:DeprecationWarning:ast",
]
