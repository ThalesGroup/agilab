[project]
name = "agi-core"
description = "AGI core aggregation of agi-env, agi-cluster, agi-node"
requires-python = ">=3.11"
authors = [
    { name = "Jean-Pierre Morard", email = "focus@thalesgroup.com" },
]
readme = "README.md"
classifiers = [
    "Intended Audience :: Developers",
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
keywords = [
    "jupyter",
    "mlflow",
    "asyncio",
    "dask",
    "rapids",
    "streamlit",
    "distributed",
    "cython",
    "cluster",
    "dataframe",
    "dataset",
    "loadbalancing",
    "genai",
    "copilot",
    "agi",
    "pycharm",
    "datascience",
    "numba",
]

dependencies = [
    "scp",
    "scikit-learn",
    "parso",
    "cython",
    "setuptools",
    "msgpack",
    "numba",
    "py7zr",
    "python-dotenv",
    "tomlkit",
    "logging",
    "dask[distributed]",
    "wheel",
    "scipy==1.15.2",
    "psutil",
    "typing-inspection>=0.4.1",
    "polars",
    "pandas",
    "jupyter",
    "mypy",
    "pydantic",
    "requests",
    "asyncssh",
]

version = "0.5.7"
[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab/tree/main/src/agilab"
Tracker = "https://github.com/ThalesGroup/agilab/issue"

[dependency-groups]
dev = [
    "black",
    "pytest",
    "licensecheck",
    "pytest-local-badge",
    "pytest-cov",
    "pytest-asyncio",
    "fastparquet",
    "polars",
    "pandas"
]

[tool.uv.sources.agi-env]
path = "../agi-env"
editable = true

[tool.uv.sources.agi-node]
path = "../agi-node"
editable = true

[tool.uv.sources.agi-cluster]
path = "../agi-cluster"
editable = true

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.pyment]
source_dir = "src"
format = "google"
