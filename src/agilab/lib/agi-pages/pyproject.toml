[project]
version = "2026.05.12.post2"
name = "agi-pages"
description = "AGILAB public analysis page bundle package"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "Jean-Pierre Morard" }
]
maintainers = [{ name = "Jean-Pierre Morard" }]
license = "BSD-3-Clause"
license-files = ["LICENSE"]

classifiers = [
    "Intended Audience :: Developers",
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]

keywords = [
    "agilab",
    "analysis",
    "streamlit",
    "dashboards",
    "page-bundles",
]

dependencies = ["agi-gui==2026.05.12.post2"]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab/tree/main/src/agilab/lib/agi-pages"
Issues = "https://github.com/ThalesGroup/agilab/issues"
Homepage = "https://github.com/ThalesGroup/agilab"
Repository = "https://github.com/ThalesGroup/agilab"
Discussions = "https://github.com/ThalesGroup/agilab/discussions"
Changelog = "https://github.com/ThalesGroup/agilab/releases"







[dependency-groups]
dev = [
    "pytest",
]

[tool.uv.sources.agi-gui]
    path = "../agi-gui"
    editable = true

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = false
package-dir = {"agi_pages" = "../../apps-pages"}
packages = ["agi_pages"]

[tool.setuptools.package-data]
agi_pages = [
    "README.md",
    "*/README.md",
    "*/pyproject.toml",
    "*/*.py",
    "*/src/**/*.py",
]

[tool.setuptools.exclude-package-data]
agi_pages = [
    "*/.venv/*",
    "*/.venv/**/*",
    "*/__pycache__/*",
    "*/src/*/__pycache__/*",
    "*/src/*/*/__pycache__/*",
    "*.pyc",
    "*/*.pyc",
    "*/src/**/*.pyc",
    "*/uv.lock",
]

[tool.pytest.ini_options]
testpaths = ["test"]
