[project]
name = "uav_relay_queue_project"
version = "0.1.0"
description = "Built-in AGILAB lightweight UAV relay queue example"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.13.post3,<2027.0", "agi-node>=2026.05.13.post3,<2027.0", "agi-cluster>=2026.05.13.post3,<2027.0", "networkx>=3.6.1,<4", "pandas>=2.3.0,<4", "pydantic>=2.11,<2.13", "simpy>=4.1,<5", "streamlit>=1.56,<1.57"]

[tool.setuptools.package-data]
uav_relay_queue = ["sample_data/*.json"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
