[project]
version = "2026.05.16"
name = "agi-app-global-dag"
description = "AGILAB cross-app DAG preview showing artifact handoffs between demo projects"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "Jean-Pierre Morard" }
]
maintainers = [{ name = "Jean-Pierre Morard" }]
license = "BSD-3-Clause"
license-files = ["LICENSE"]

classifiers = [
    "Intended Audience :: Developers",
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]

keywords = [
    "agilab",
    "apps",
    "reproducibility",
    "workflow-orchestration",
]

dependencies = ["agi-core>=2026.05.13,<2027.0"]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab/tree/main/src/agilab/lib/agi-app-global-dag"
Issues = "https://github.com/ThalesGroup/agilab/issues"
Homepage = "https://github.com/ThalesGroup/agilab"
Repository = "https://github.com/ThalesGroup/agilab"
Discussions = "https://github.com/ThalesGroup/agilab/discussions"
Changelog = "https://github.com/ThalesGroup/agilab/releases"

[project.entry-points."agilab.apps"]
global_dag = "agi_app_global_dag:project_root"
global_dag_project = "agi_app_global_dag:project_root"


[dependency-groups]
dev = [
    "pytest",
]

[tool.uv.sources.agi-core]
    path = "../../core/agi-core"
    editable = true

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = false
package-dir = {"" = "src"}
packages = ["agi_app_global_dag"]

[tool.setuptools.package-data]
"agi_app_global_dag" = [
    "project/**/*",
]

[tool.setuptools.exclude-package-data]
"agi_app_global_dag" = [
    "project/**/.venv/**",
    "project/**/__pycache__/**",
    "project/**/*.pyc",
    "project/**/*.pyo",
    "project/**/*.pyx",
    "project/**/*.c",
    "project/**/*.so",
    "project/**/uv.lock",
]

[tool.pytest.ini_options]
testpaths = ["test"]
