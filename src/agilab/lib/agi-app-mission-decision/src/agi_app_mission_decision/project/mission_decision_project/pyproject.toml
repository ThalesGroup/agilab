[project]
name = "mission_decision_project"
version = "0.1.0"
description = "Built-in AGILAB Mission Decision autonomous demo"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.13.post3,<2027.0", "agi-node>=2026.05.13.post3,<2027.0", "agi-cluster>=2026.05.13.post3,<2027.0", "pandas>=2.3.0,<4", "pydantic>=2.11,<2.13", "streamlit>=1.56,<1.57"]

[tool.agilab]
runtime_target = "mission_decision"

[tool.setuptools.package-data]
mission_decision = ["sample_data/*.json"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
