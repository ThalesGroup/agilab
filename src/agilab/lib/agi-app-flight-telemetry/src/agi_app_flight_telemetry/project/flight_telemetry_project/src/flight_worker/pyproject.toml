description = ""
requires-python = ">=3.11,<3.14"
readme = "README.md"
dependencies = [
    "agi-env>=2026.05.13.post3,<2027.0",
    "agi-node>=2026.05.13.post3,<2027.0",
    "polars",
    "pydantic",
]

[[project.authors]]
name = "Jean-Pierre Morard"
email = "focus@thalesgroup.com"


[project.license]
text = "Thales SIX GTS France SAS"

[project.optional-dependencies]
