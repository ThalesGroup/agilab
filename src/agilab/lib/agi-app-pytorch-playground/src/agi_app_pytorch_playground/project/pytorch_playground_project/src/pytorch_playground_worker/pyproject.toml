[project]
name = "pytorch_playground_worker"
version = "2026.05.20"
description = "Worker package for the AGILAB PyTorch playground app"
requires-python = ">=3.12"
dependencies = [
    "agi-env>=2026.05.20",
    "agi-node>=2026.05.20",
    "numpy>=2.2",
    "pandas>=2.3.0",
    "pydantic",
    "torch>=2.8.0",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
