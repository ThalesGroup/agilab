[[connectors]]
id = "weather_training_sql"
kind = "sql"
label = "Weather Training SQL"
description = "Read-only station weather training data for forecast experiments."
uri = "postgresql://weather.example.invalid/agilab"
driver = "postgresql"
query_mode = "read_only"

[[connectors]]
id = "weather_ops_opensearch"
kind = "opensearch"
label = "Weather Operations OpenSearch"
description = "Forecast run and promotion evidence index."
url = "https://opensearch.example.invalid"
index = "agilab-weather-*"
auth_ref = "env:OPENSEARCH_TOKEN"

[[connectors]]
id = "weather_artifact_store"
kind = "object_storage"
label = "Weather Artifact Store"
description = "Object-storage prefix for forecast metrics and predictions."
provider = "s3"
bucket = "agilab-artifacts"
prefix = "weather_forecast/"
auth_ref = "env:AWS_PROFILE"
