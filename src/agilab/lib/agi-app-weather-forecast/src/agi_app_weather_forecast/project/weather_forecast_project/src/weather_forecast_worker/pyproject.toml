[project]
name = "weather_forecast_project"
version = "0.1.0"
description = "Built-in AGILab weather forecasting example migrated from notebooks"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.17,<2027.0", "agi-node>=2026.05.17,<2027.0", "pandas>=2.3.0,<4", "pydantic>=2.11,<3", "scikit-learn>=1.7.2,<2", "skforecast>=0.19,<0.20"]

[tool.setuptools.package-data]
weather_forecast = ["sample_data/*.csv"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
