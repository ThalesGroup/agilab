[project]
name = "link_sim_project"
version = "0.8.17"
description = ""
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "cython",
    "dask[distributed]",
    "fastparquet",
    "geopy",
    "humanize",
    "numpy",
    "parso",
    "polars",
    "psutil",
    "py7zr",
    "python-dotenv",
    "setuptools",
    "noise",
    "pyarrow",
]

[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-asyncio",
    "licensecheck",
]

[[project.authors]]
name = "Jean-Pierre Morard"
email = "focus@thalesgroup.com"

[project.license]
text = "Thales SIX GTS France SAS"

[tool.uv.sources.link_sim_project]
workspace = true

# llvmlite (required via numba) does not yet publish wheels for the
# free-threaded CPython builds, so keep this worker on the standard
# interpreter until upstream support lands.
[tool.freethread_info]
is_app_freethreaded = false

[project.optional-dependencies]
dag-worker = []
polars-worker = [ "polars", "pandas","pyarrow"]
