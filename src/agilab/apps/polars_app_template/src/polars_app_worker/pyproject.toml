[project]
name = "polars_app_project"
version = "0.1.8"
description = ""
requires-python = ">=3.11"
readme = "README.md"
dependencies = ["numpy", "geopy", "setuptools", "cython", "psutil", "parso", "py7zr", "python-dotenv", ]
[[project.authors]]
name = "Jean-Pierre Morard"
email = "focus@thalesgroup.com"

[dependency-groups]
dev = ["black", "pytest", "licensecheck", "flight_project", ]

[project.license]
text = "Thales SIX GTS France SAS"

[project.optional-dependencies]
agi-worker = []
polars-worker = ["polars", ]
workers = ["agi-core[agi-worker]", "agi-core[polars-worker]", ]
managers = ["agi-core[managers]", ]
default-groups = ["dev", ]

[tool.mypy]
mypy_path = ["stubs", ]
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.uv.sources.polars_app_project]
workspace = true