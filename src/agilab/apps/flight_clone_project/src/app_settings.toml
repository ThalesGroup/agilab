[args]
num_flights = 20
data_in = "flight_clone/dataset"
data_out = "flight_clone/dataframe"
data_source = "file"
beam_file = "beams.csv"
sat_file = "satellites.csv"
waypoints = "waypoints.geojson"
regenerate_waypoints = true
yaw_angular_speed = 1.0
roll_angular_speed = 3.0
pitch_angular_speed = 2.0
vehicule_acceleration = 5.0
max_speed = 900.0
max_roll = 30.0
max_pitch = 12.0
target_climbup_pitch = 8.0
pitch_enable_speed_ratio = 0.3
altitude_loss_speed_threshold = 400.0
landing_speed_target = 200.0
descent_pitch_target = -3.0
landing_pitch_target = 3.0
cruising_pitch_max = 3.0
descent_altitude_threshold_landing = 500
max_speed_ratio_while_turining = 0.8
enable_climb = true
enable_descent = true
default_alt_value = 4000.0
plane_type = "avions"
dataset_format = "parquet"

[cluster]
cython = true
pool = true
rapids = true
cluster_enabled = true
verbose = 1
user = "agi"
auth_method = "password"
scheduler = "192.168.20.111"

[cluster.workers]
"192.168.20.111" = 1
"192.168.20.130" = 1

[pages]
view_module = [
    "view_maps",
]

[ui.map]
center_lat = 49.0
center_lon = 32.0
default_zoom = 5.4
