[project]
name = "mycode_project"
version = "0.8.17"
description = "Example project used to validate AGILab installers."
requires-python = ">=3.11"
authors = [
    { name = "Jean-Pierre Morard", email = "focus@thalesgroup.com" }
]
dependencies = [
    "ipython",
    "psutil",
    "py7zr",
    "python-dotenv",
    "setuptools",
    "astor",
    "asyncssh",
    "build",
    "cmake>=3.29",
    "fastparquet",
    "geojson",
    "geopy",
    "humanize",
    "jupyter-ai[all]",
    "keras",
    "matplotlib",
    "mlflow",
    "networkx",
    "noise",
    "numba",
    "numpy>=1.14.1",
    "openai",
    "pathspec",
    "pip",
    "plotly",
    "polars",
    "pulp",
    "pytest-cov",
    "scipy==1.15.2",
    "seaborn",
    "streamlit",
    "streamlit-modal",
    "streamlit_code_editor",
    "streamlit_extras",
    "tomli",
    "tomli_w",
    "twine",
    "watchdog",
    "wheel",
    "sgp4",
    "legacy-cgi",
    "standard-imghdr",
    "pydantic",
    "tomlkit",
    "scikit-learn",
    "parso",
    "cython",
    "msgpack",
    "dask[distributed]",
    "typing-inspection>=0.4.1",
    "pandas",
    "jupyter",
    "mypy",
    "requests",
    "scp",
]

[project.license]
text = "Thales SIX GTS France SAS"



[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-asyncio",
    "licensecheck",
    "mycode_project",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv.sources.mycode_project]
workspace = true

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
mycode_project = [
    "**/*.json",
    "**/*.toml",
]

[tool.pytest.ini_options]
testpaths = ["test"]
asyncio_mode = "auto"
filterwarnings = []
