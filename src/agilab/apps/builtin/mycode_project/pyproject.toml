[project]
name = "mycode_project"
version = "2026.4.27"
description = "Built-in AGILab example app template (minimal manager + worker)"
requires-python = ">=3.11"
dependencies = [
  "pydantic",
  "humanize",
  "python-dotenv",
  "setuptools",
  "tomlkit",
  "astor",
  "psutil",
  "pathspec",
  "py7zr",
  "numba>=0.61.0",
  "streamlit",
  "scikit-learn",
  "parso",
  "cython",
  "msgpack",
  "tomli",
  "dask[distributed]",
  "wheel",
  "scipy==1.16.1",
  "typing-inspection>=0.4.1",
  "polars",
  "pandas",
  "streamlit>=1.56.0",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
