[project]
name = "mycode_project"
version = "2026.05.17"
description = "Built-in AGILab example app template (minimal manager + worker)"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.17", "agi-node>=2026.05.17", "polars", "pydantic", "streamlit>=1.56.0"]

[tool.uv.sources]
agi-env = { path = "../../../../../core/agi-env", editable = true }
agi-node = { path = "../../../../../core/agi-node", editable = true }

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
