[args]
data_source = "file"
data_in = "flight/dataset"
data_out = "flight/dataframe"
files = "*"
nfile = 1
nskip = 0
nread = 0
sampling_rate = 1.0
datemin = "2020-01-01"
datemax = "2021-01-01"
output_format = "parquet"
reset_target = false

[cluster]
verbose = 1
cython = true
pool = true
rapids = true
cluster_enabled = false

[cluster.service_health]
allow_idle = false
max_unhealthy = 0
max_restart_rate = 0.25

[view_maps]
datadir = "/home/agi/export/flight"
file_ext_choice = "all"
df_select_mode = "Multi-select"
df_file_regex = ""
df_file = "export.csv"
df_files_selected = [
    "export.csv",
]
discrete = "time_s"
lat = "latitude"
long = "longitude"
coltype = "discrete"

[pages]
view_module = [
    "view_maps_network",
]

[pages.view_maps_network]
dataset_base_choice = "AGI_SHARE_DIR"
dataset_custom_base = ""
dataset_subpath = "flight/dataframe"
default_traj_globs = [
    "flight/dataframe/*.parquet",
    "flight/dataframe/*.csv",
]

[view_maps_network]
base_dir_choice = "AGI_SHARE_DIR"
input_datadir = ""
datadir_rel = "flight/dataframe"
file_ext_choice = "all"
id_col = ""
time_col = ""
edges_file = ""
allocations_file = ""
baseline_allocations_file = ""
traj_glob = ""
link_multiselect = []
show_map = true
show_graph = true
show_terrain = true
show_cloud_heatmap = false
cloud_heatmap_sat_path = ""
cloud_heatmap_ivdl_path = ""
cloud_heatmap_stride = 25
cloud_heatmap_min_weight = 0.0
jitter_overlap = false
show_metrics = false
map_marker_style = "Plane icons"
df_file = ""
df_select_mode = "Single file"
df_file_regex = ""
df_files = []
layout_type_select = "spring"
metric_type_select = ""
