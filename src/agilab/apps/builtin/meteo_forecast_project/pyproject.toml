[project]
name = "meteo_forecast_project"
version = "2026.4.22"
description = "Built-in AGILab weather forecasting example migrated from notebooks"
requires-python = ">=3.13"
dependencies = [
  "pydantic",
  "python-dotenv",
  "setuptools",
  "tomlkit",
  "psutil",
  "pathspec",
  "py7zr",
  "streamlit>=1.55.0",
  "pandas>=2.3.0",
  "scikit-learn",
  "skforecast>=0.19,<0.20",
]

[tool.setuptools.package-data]
meteo_forecast = ["sample_data/*.csv"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
