[args]
data_in = "uav_relay_queue/scenarios"
data_out = "uav_relay_queue/results"
files = "*.json"
nfile = 1
routing_policy = "shortest_path"
sim_time_s = 30.0
sampling_interval_s = 0.5
source_rate_pps = 14.0
queue_weight = 2.5
random_seed = 2026
reset_target = false

[cluster]
verbose = 1
cython = false
pool = false
rapids = false
cluster_enabled = false

[cluster.service_health]
allow_idle = false
max_unhealthy = 0
max_restart_rate = 0.25

[pages]
view_module = [
    "view_uav_relay_queue_analysis",
    "view_maps_network",
]
