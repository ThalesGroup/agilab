[project]
name = "mission_decision_project"
version = "2026.05.16"
description = "Built-in AGILAB Mission Decision autonomous demo"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.16", "agi-node>=2026.05.16", "agi-cluster>=2026.05.16", "pandas>=2.3.0", "pydantic", "streamlit>=1.56.0"]

[tool.agilab]
runtime_target = "data_io_2026"

[tool.uv.sources]
agi-env = { path = "../../../core/agi-env", editable = true }
agi-node = { path = "../../../core/agi-node", editable = true }
agi-cluster = { path = "../../../core/agi-cluster", editable = true }

[tool.setuptools.package-data]
data_io_2026 = ["sample_data/*.json"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
