[project]
name = "pytorch_playground_project"
version = "2026.05.23"
description = "Built-in AGILab app for reproducible PyTorch classifier playground experiments."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "agi-env>=2026.05.23,<2027.0",
    "agi-node>=2026.05.23,<2027.0",
    "agi-cluster>=2026.05.23,<2027.0",
    "agi-gui>=2026.05.23,<2027.0",
    "numpy>=2.2,<3",
    "pandas>=2.3.0,<4",
    "plotly>=6.3.0,<7",
    "pydantic>=2.11,<3",
    "streamlit>=1.56,<1.57",
    "torch>=2.8.0,<3",
]

[project.urls]
Documentation = "https://thalesgroup.github.io/agilab"
Source = "https://github.com/ThalesGroup/agilab/tree/main/src/agilab/apps/builtin/pytorch_playground_project"
Issues = "https://github.com/ThalesGroup/agilab/issues"
Homepage = "https://github.com/ThalesGroup/agilab"
Repository = "https://github.com/ThalesGroup/agilab"
Discussions = "https://github.com/ThalesGroup/agilab/discussions"
Changelog = "https://github.com/ThalesGroup/agilab/releases"

[tool.uv.sources]
agi-env = { path = "../../../core/agi-env", editable = true }
agi-node = { path = "../../../core/agi-node", editable = true }
agi-cluster = { path = "../../../core/agi-cluster", editable = true }
agi-gui = { path = "../../../lib/agi-gui", editable = true }

[tool.agilab.app]
distribution_preview = false
service_mode = false

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
