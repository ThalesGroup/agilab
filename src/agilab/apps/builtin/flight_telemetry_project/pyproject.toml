[project]
name = "flight_telemetry_project"
version = "2026.05.29"
description = "Built-in AGILab example app (flight-telemetry preprocessing)"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.29", "agi-node>=2026.05.29", "agi-cluster>=2026.05.29", "polars[rtcompat]>=1.35,<2", "pydantic>=2.11,<2.13", "py7zr>=1.0,<1.1", "streamlit>=1.56,<1.57"]

[tool.agilab]
runtime_target = "flight_telemetry"

[tool.uv.sources]
agi-env = { path = "../../../core/agi-env", editable = true }
agi-node = { path = "../../../core/agi-node", editable = true }
agi-cluster = { path = "../../../core/agi-cluster", editable = true }

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
