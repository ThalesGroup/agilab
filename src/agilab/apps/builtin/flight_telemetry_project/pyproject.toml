[project]
name = "flight_telemetry_project"
version = "2026.05.16"
description = "Built-in AGILab example app (flight-telemetry preprocessing)"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.16", "agi-node>=2026.05.16", "agi-cluster>=2026.05.16", "polars[rtcompat]", "pydantic", "py7zr", "streamlit>=1.56.0"]

[tool.agilab]
runtime_target = "flight"

[tool.uv.sources]
agi-env = { path = "../../../core/agi-env", editable = true }
agi-node = { path = "../../../core/agi-node", editable = true }
agi-cluster = { path = "../../../core/agi-cluster", editable = true }

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
