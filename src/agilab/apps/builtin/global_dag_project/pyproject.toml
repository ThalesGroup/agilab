[project]
name = "global_dag_project"
version = "2026.05.12.post3"
description = "Built-in AGILAB global DAG example project"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.12.post3", "agi-node>=2026.05.12.post3", "agi-cluster>=2026.05.12.post3", "polars", "pydantic", "streamlit>=1.56.0"]

[tool.uv.sources]
agi-env = { path = "../../../core/agi-env", editable = true }
agi-node = { path = "../../../core/agi-node", editable = true }
agi-cluster = { path = "../../../core/agi-cluster", editable = true }

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
