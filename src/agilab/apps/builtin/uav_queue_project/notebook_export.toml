[notebook_export]

[[notebook_export.related_pages]]
module = "view_scenario_cockpit"
label = "Scenario Cockpit"
description = "Inspect scenario setup, queue buildup, drops, per-packet events, node positions, and route usage for the lightweight UAV queue demo."
artifacts = [
  "*_summary_metrics.json",
  "*_queue_timeseries.csv",
  "*_packet_events.csv",
  "*_node_positions.csv",
  "*_routing_summary.csv",
]
launch_note = "Open this first for the scenario-level view over the current run directory."

[[notebook_export.related_pages]]
module = "view_queue_resilience"
label = "Queue Resilience"
description = "Inspect queue health, congestion pressure, and packet delivery evidence for the same run."
artifacts = [
  "*_summary_metrics.json",
  "*_queue_timeseries.csv",
  "*_packet_events.csv",
]
launch_note = "Use this to focus on queue and delivery resilience metrics."

[[notebook_export.related_pages]]
module = "view_maps_network"
label = "Maps Network"
description = "Reuse the same UAV queue run as a generic topology, allocation, and trajectory map."
artifacts = [
  "pipeline/topology.gml",
  "pipeline/allocations_steps.csv",
  "*_trajectory_summary.json",
  "*_trajectory*.csv",
]
launch_note = "Use this when you want the generic network and trajectory surface instead of the dedicated queue page."
