[project]
name = "r_stage_smoke_project"
version = "2026.05.25"
description = "Worker package for the AGILAB R stage smoke app"
requires-python = ">=3.11"
dependencies = ["agi-env>=2026.05.25,<2027.0", "agi-node>=2026.05.25,<2027.0", "pandas>=2.3.0,<4", "pydantic>=2.11,<3"]

[tool.uv.sources]
agi-env = { path = "../../../../../core/agi-env", editable = true }
agi-node = { path = "../../../../../core/agi-node", editable = true }

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
