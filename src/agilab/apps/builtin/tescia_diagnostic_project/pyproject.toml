[project]
name = "tescia_diagnostic_project"
version = "2026.05.23"
description = "Built-in AGILAB TeSciA-style diagnostic reasoning example"
requires-python = ">=3.13"
dependencies = ["agi-env>=2026.05.23,<2027.0", "agi-node>=2026.05.23,<2027.0", "agi-cluster>=2026.05.23,<2027.0", "pandas>=2.3.0,<4", "pydantic>=2.11,<3", "streamlit>=1.56,<1.57"]

[tool.uv.sources]
agi-env = { path = "../../../core/agi-env", editable = true }
agi-node = { path = "../../../core/agi-node", editable = true }
agi-cluster = { path = "../../../core/agi-cluster", editable = true }

[tool.setuptools.package-data]
tescia_diagnostic = ["curriculum/*.json", "sample_data/*.json"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
