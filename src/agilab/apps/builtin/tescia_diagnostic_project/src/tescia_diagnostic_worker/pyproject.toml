[project]
name = "tescia_diagnostic_project"
version = "2026.05.30"
description = "Built-in AGILAB TeSciA-style diagnostic reasoning example"
requires-python = ">=3.13"
dependencies = ["agi-env>=2026.05.30", "agi-node>=2026.05.30", "pandas>=2.3.0,<4", "pydantic>=2.11,<2.13"]

[tool.uv.sources]
agi-env = { path = "../../../../../core/agi-env", editable = true }
agi-node = { path = "../../../../../core/agi-node", editable = true }

[tool.setuptools.package-data]
tescia_diagnostic = ["sample_data/*.json"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
