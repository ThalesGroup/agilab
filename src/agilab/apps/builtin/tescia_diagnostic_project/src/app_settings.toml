[args]
data_in = "tescia_diagnostic/cases"
data_out = "tescia_diagnostic/reports"
files = "*.json"
nfile = 1
minimum_evidence_confidence = 0.65
minimum_regression_coverage = 0.6
reset_target = false
case_source = "bundled"
generated_cases_filename = "tescia_diagnostic_cases.generated.json"
regenerate_cases = false
ai_provider = "gpt-oss"
ai_endpoint = "http://127.0.0.1:8000/v1/responses"
ai_model = "gpt-oss-120b"
ai_topic = "AGILAB engineering diagnostics, cluster runs, pipeline DAGs, and evidence-backed fixes"
ai_case_count = 2
ai_temperature = 0.2
ai_timeout_s = 120.0

[cluster]
verbose = 1
cython = false
pool = false
rapids = false
cluster_enabled = false
scheduler = "127.0.0.1:8786"
workers_data_path = ""

[cluster.workers]
"127.0.0.1" = 2

[cluster.service_health]
allow_idle = false
max_unhealthy = 0
max_restart_rate = 0.25
