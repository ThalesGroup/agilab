[[connectors]]
id = "execution_pandas_sql"
kind = "sql"
label = "Pandas Execution SQL"
description = "Read-only benchmark input table for pandas execution experiments."
uri = "postgresql://execution.example.invalid/pandas"
driver = "postgresql"
query_mode = "read_only"

[[connectors]]
id = "execution_pandas_ops_opensearch"
kind = "opensearch"
label = "Pandas Execution Operations OpenSearch"
description = "Execution benchmark run evidence index."
url = "https://opensearch.example.invalid"
index = "agilab-execution-pandas-*"
auth_ref = "env:OPENSEARCH_TOKEN"

[[connectors]]
id = "execution_pandas_artifact_store"
kind = "object_storage"
label = "Pandas Execution Artifact Store"
description = "Object-storage prefix for pandas benchmark artifacts."
provider = "s3"
bucket = "agilab-artifacts"
prefix = "execution_pandas/"
auth_ref = "env:AWS_PROFILE"
