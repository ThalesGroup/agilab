[args]
data_in = "execution_playground/dataset"
data_out = "execution_pandas/results"
files = "*.csv"
nfile = 16
n_partitions = 16
rows_per_file = 100000
n_groups = 32
compute_passes = 8
output_format = "csv"
seed = 42
reset_target = false

[cluster]
verbose = 1
cython = false
pool = false
rapids = false
cluster_enabled = false

[cluster.service_health]
allow_idle = false
max_unhealthy = 0
max_restart_rate = 0.25
