[args]
data_source = "file"
data_uri = "data/flight"
files = "csv/*"
nfile = 10
nskip = 0
nread = 0
sampling_rate = 1.0
datemin = "2020-01-01"
datemax = "2021-01-01"
output_format = "csv"

[views]
view_module = [
    "maps",
    "maps-3d",
    "autoencoder-latentspace",
    "maps-network-graph",
    "barycentric-graph",
]

[cluster]
verbose = true
cython = false
cluster_enabled = true
rapids = false
pool = false
scheduler = "127.0.0.1"

[cluster.workers]
"127.0.0.1" = 2
