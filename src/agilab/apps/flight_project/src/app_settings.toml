[args]
data_source = "file"
data_in = "flight/dataset"
data_out = "flight/dataframe"
files = "*"
nfile = 1
nskip = 0
nread = 0
sampling_rate = 1.0
datemin = "2020-01-01"
datemax = "2021-01-01"
output_format = "parquet"

[cluster]
verbose = 1
cython = true
pool = true
rapids = true
cluster_enabled = true
user = "agi"
auth_method = "password"
agi_share_dir = "~/clustershare"
scheduler = "192.168.3.84"

[cluster.workers]
"192.168.3.84" = 1
"192.168.3.86" = 1

[pages]
view_module = [
    "view_maps",
]
