[project]
name = "your_pandas_project"
version = "2025.12.12"
description = ""
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "your name", email = "your.email@example.com"}
]

dependencies = [
    "agi-cluster>=2026.05.23,<2027.0",
    "agi-env>=2026.05.23,<2027.0",
    "agi-node>=2026.05.23,<2027.0",
    "pandas>=2.3.0,<4",
    "pydantic>=2.11,<3",
    "py7zr>=1.1,<2",
    "streamlit>=1.56,<1.57",
]

[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-cov",
    "pytest-local-badge",
    "pytest-asyncio",
    "licensecheck",
    "your_pandas_project",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv.sources.your_pandas_project]
workspace = true

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
your_pandas_project = [
    "**/*.ipynb",
    "**/*.json",
    "**/*.toml",
]

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = true
ignore_missing_imports = true

# Quiet known third-party deprecations
[tool.pytest.ini_options]
filterwarnings = [
    "ignore:ast\\.Num is deprecated.*:DeprecationWarning:ast",
    "ignore:.*Theme names and color schemes are lowercase in IPython 9.0.*:DeprecationWarning:IPython\\.core\\.ultratb",
]
