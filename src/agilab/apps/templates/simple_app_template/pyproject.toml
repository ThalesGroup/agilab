[project]
name = "your_simple_project"
version = "2025.12.12"
description = ""
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "your name", email = "your.email@example.com"}
]

dependencies = [
    "agi-env",
    "pydantic",
    "streamlit>=1.56,<1.57",
]

[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-cov",
    "pytest-local-badge",
    "pytest-asyncio",
    "licensecheck",
    "your_simple_project",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv.sources.your_simple_project]
workspace = true

[tool.agilab.app]
runtime = "local"
workerless = true

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
simple_app = [
    "**/*.ipynb",
    "**/*.json",
    "**/*.toml",
]

[tool.mypy]
mypy_path = [
    "stubs",
]
disallow_untyped_defs = true
ignore_missing_imports = true
