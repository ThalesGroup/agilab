[project]
name = "sb3_trainer_project"
version = "0.8.17"
description = ""
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "cython",
    "dask[distributed]",
    "geopy",
    "humanize",
    "numpy<2.3",
    "parso",
    "psutil",
    "py7zr",
    "python-dotenv",
    "requests",
    "setuptools",
    "stable_baselines3",
    "gymnasium[all]",
    "tensorboard",
    "torch"
]

[[project.authors]]
name = "Jean-Pierre Morard"
email = "focus@thalesgroup.com"

[project.license]
text = "Thales SIX GTS France SAS"

[dependency-groups]
dev = [
    "black",
    "pytest",
    "pytest-asyncio",
    "licensecheck",
]

[tool.mypy]
mypy_path = [ "stubs",]
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.setuptools]
packages = ["sb3_trainer_worker", "sb3_trainer_worker.envs"]

[project.optional-dependencies]
dag-worker = []
polars-worker = []
