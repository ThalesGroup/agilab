[project]
name = "view-demo"
version = "0.1.0"
description = "AGILAB analysis page template"
requires-python = ">=3.11"
dependencies = [
    "agi-env>=2026.05.18,<2027.0",
    "agi-node>=2026.05.18,<2027.0",
    "streamlit>=1.56,<1.59",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
