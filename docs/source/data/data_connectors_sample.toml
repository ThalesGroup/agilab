[[connectors]]
id = "warehouse_sql"
kind = "sql"
label = "Warehouse SQL"
description = "Read-only analytics warehouse connector definition."
uri = "postgresql://warehouse.example.invalid/agilab"
driver = "postgresql"
query_mode = "read_only"

[[connectors]]
id = "ops_opensearch"
kind = "opensearch"
label = "Operations OpenSearch"
description = "OpenSearch index pattern for run and operator evidence."
url = "https://opensearch.example.invalid"
index = "agilab-runs-*"
auth_ref = "env:OPENSEARCH_TOKEN"

[[connectors]]
id = "artifact_object_store"
kind = "object_storage"
label = "Artifact Object Store"
description = "Object-storage prefix for reusable experiment artifacts."
provider = "s3"
bucket = "agilab-artifacts"
prefix = "experiments/"
auth_ref = "env:AWS_PROFILE"
