schema = "agilab.release_proof.v1"
title = "Release Proof"
intro = [
  "This page is the public verification index for the current AGILAB release. It records install, CI, demo, and scope evidence in one place so reviewers can check the release without inferring status from scattered badges.",
]
proof_bullets = [
  "The public GitHub Actions matrix validated the packaged first proof on Ubuntu, macOS, and Windows runners.",
  "The hosted Hugging Face Space opened the public AGILAB demo route during the release guardrail run.",
  "The public demo scope includes the lightweight ``flight_project`` and ``meteo_forecast_project`` routes documented in :doc:`agilab-demo`.",
  "The release tag, PyPI package, public documentation, and hosted demo point to the same public product story: browser preview, local first proof, then source-checkout expansion.",
]
related_pages = [
  "quick-start",
  "demos",
  "agilab-demo",
  "compatibility-matrix",
  "agilab-mlops-positioning",
]

[release]
package_name = "agilab"
package_version = "2026.05.06"
pypi_url = "https://pypi.org/project/agilab/"
github_release_tag = "v2026.05.06-2"
github_release_url = "https://github.com/ThalesGroup/agilab/releases/tag/v2026.05.06-2"
hf_space_label = "jpmorard/agilab"
hf_space_url = "https://huggingface.co/spaces/jpmorard/agilab"
hf_space_commit = "63d4f2ebcf649246118b2e9f346551dab82e39f6"

[[ci_runs]]
id = "release-guardrails"
label = "Public guardrails"
workflow = "repo-guardrails"
run_id = "25223901208"
url = "https://github.com/ThalesGroup/agilab/actions/runs/25223901208"
summary = "passed repository guardrails and clean package first-proof jobs"

[[ci_runs]]
id = "docs-source-guard"
label = "Docs source guard"
workflow = "docs-source-guard"
run_id = "25223361024"
url = "https://github.com/ThalesGroup/agilab/actions/runs/25223361024"
summary = "passed docs mirror and release-proof consistency checks"

[[ci_runs]]
id = "docs-publish"
label = "Docs publish"
workflow = "docs-publish"
run_id = "25223720649"
url = "https://github.com/ThalesGroup/agilab/actions/runs/25223720649"
summary = "built the public documentation from the managed docs mirror"

[[ci_runs]]
id = "coverage"
label = "Coverage"
workflow = "coverage"
run_id = "25223720635"
url = "https://github.com/ThalesGroup/agilab/actions/runs/25223720635"
summary = "passed component coverage and badge freshness checks"

[proof_command]
summary = "A clean package install can run the public first proof:"
commands = [
  "python -m pip install {package_spec}",
  "agilab first-proof --json --max-seconds 60",
]

[verification]
intro = "Use the package route when you want to prove the released artifact rather than the current source checkout:"
commands = [
  "python -m venv .venv",
  ". .venv/bin/activate",
  "python -m pip install --upgrade pip",
  "python -m pip install {package_spec}",
  "agilab first-proof --json --max-seconds 60",
]
follow_up = "Use :doc:`quick-start` when you want the fuller source-checkout path with the built-in app installation and Streamlit UI."

[maintenance]
intro = "Maintainers can refresh the manifest from local release evidence and GitHub Actions evidence, render the page, and run the same consistency checks with one command:"
commands = [
  "uv --preview-features extra-build-dependencies run python tools/release_proof_report.py --refresh-from-local --refresh-from-github --render --check --check-github-runs --compact",
]
follow_up = "Pass ``--github-release-tag``, ``--github-release-url``, ``--hf-space-commit``, or ``--github-head-sha`` only when public evidence changes outside the default local repository and latest successful ``main`` workflow state."

[scope]
paragraph = "This evidence proves the public package smoke, hosted demo availability at the time of validation, and documented first-proof routes. It does not certify every remote cluster topology, every GPU stack, private app repositories, cloud accounts, security posture, or long-running production operations. Those areas remain environment-dependent and are tracked in :doc:`compatibility-matrix`."
