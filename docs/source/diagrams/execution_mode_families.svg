<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Execution mode families at a glance</title>
  <desc id="desc">Two-panel summary of AGILAB execution benchmark families for execution_pandas_project and execution_polars_project, comparing baseline local execution, local pool execution, and 2-node Dask execution.</desc>
  <rect width="1200" height="760" fill="#f7f9fc"/>
  <text x="60" y="72" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#10243e">Execution mode families at a glance</text>
  <text x="60" y="104" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#45627f">Same workload, same orchestration, but 3 clearly separated families on these 2 Macs.</text>

  <rect x="760" y="42" width="380" height="90" rx="18" fill="#eef4fb" stroke="#c8d8ec" stroke-width="2"/>
  <text x="788" y="75" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#17324f">Interpretation note</text>
  <text x="788" y="102" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4c647f">Rows 8-15 keep the RAPIDS bit visible.</text>
  <text x="788" y="124" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4c647f">On these Macs they remain CPU-only, so read the chart with rows 0-7.</text>

  <rect x="60" y="150" width="1080" height="250" rx="24" fill="#ffffff" stroke="#d8e2ef" stroke-width="2"/>
  <rect x="60" y="430" width="1080" height="250" rx="24" fill="#ffffff" stroke="#d8e2ef" stroke-width="2"/>

  <text x="92" y="196" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#17324f">execution_pandas_project</text>
  <text x="92" y="226" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53708e">Best non-RAPIDS mode: _d__ at 0.540s. Dask wins, but only slightly ahead of the local pool family.</text>

  <text x="92" y="476" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#17324f">execution_polars_project</text>
  <text x="92" y="506" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#53708e">Best non-RAPIDS mode: _d_p at 0.262s. The 2-node Dask family separates very clearly from the local baseline.</text>

  <text x="92" y="272" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17324f">Local baseline</text>
  <text x="92" y="292" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">modes 0-2</text>
  <rect x="250" y="258" width="420" height="40" rx="12" fill="#9aa8b8"/>
  <text x="690" y="284" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#17324f">0.885s</text>
  <text x="790" y="284" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5a718b">reference</text>

  <text x="92" y="332" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17324f">Local pool / process family</text>
  <text x="92" y="352" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">best of modes 1-3</text>
  <rect x="250" y="318" width="273" height="40" rx="12" fill="#0da3b8"/>
  <text x="543" y="344" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#17324f">0.575s</text>
  <text x="643" y="344" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#0d7f90">-35%</text>
  <text x="708" y="344" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5a718b">best mode __cp</text>

  <text x="92" y="392" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17324f">2-node Dask family</text>
  <text x="92" y="412" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">best of modes 4-7</text>
  <rect x="250" y="378" width="256" height="40" rx="12" fill="#3d63ff"/>
  <text x="526" y="404" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#17324f">0.540s</text>
  <text x="626" y="404" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#3150cb">-39%</text>
  <text x="691" y="404" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5a718b">best mode _d__</text>

  <text x="92" y="552" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17324f">Local baseline</text>
  <text x="92" y="572" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">modes 0-2</text>
  <rect x="250" y="538" width="420" height="40" rx="12" fill="#9aa8b8"/>
  <text x="690" y="564" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#17324f">0.885s</text>
  <text x="790" y="564" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5a718b">reference</text>

  <text x="92" y="612" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17324f">Local pool / process family</text>
  <text x="92" y="632" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">best of modes 1-3</text>
  <rect x="250" y="598" width="204" height="40" rx="12" fill="#0da3b8"/>
  <text x="474" y="624" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#17324f">0.430s</text>
  <text x="574" y="624" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#0d7f90">-51%</text>
  <text x="639" y="624" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5a718b">best mode ___p</text>

  <text x="92" y="672" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17324f">2-node Dask family</text>
  <text x="92" y="692" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">best of modes 4-7</text>
  <rect x="250" y="658" width="124" height="40" rx="12" fill="#3d63ff"/>
  <text x="394" y="684" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#17324f">0.262s</text>
  <text x="494" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#3150cb">-70%</text>
  <text x="559" y="684" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#5a718b">best mode _d_p</text>

  <rect x="60" y="708" width="18" height="18" rx="5" fill="#9aa8b8"/>
  <text x="90" y="722" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">Local Python/Cython baseline</text>
  <rect x="330" y="708" width="18" height="18" rx="5" fill="#0da3b8"/>
  <text x="360" y="722" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">Local pool/process family</text>
  <rect x="610" y="708" width="18" height="18" rx="5" fill="#3d63ff"/>
  <text x="640" y="722" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#5a718b">2-node Dask family</text>
</svg>
