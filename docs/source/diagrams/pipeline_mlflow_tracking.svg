<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">PIPELINE execution tracked in MLflow</title>
  <desc id="desc">Shows how Run pipeline creates one parent MLflow run, one nested run per executed step, and sends both in-process and subprocess execution traces to the same MLflow tracking store and UI.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .panel { stroke: #94a3b8; stroke-width: 1.6; rx: 20; ry: 20; }
      .title { font-size: 24px; font-weight: 700; }
      .caption { font-size: 18px; font-weight: 700; }
      .body { font-size: 13px; }
      .small { font-size: 12px; }
      .muted { fill: #334155; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); }
      .pill { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a" />
    </marker>
    <marker id="arrow-soft" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="26" ry="26" />
  <text class="title" x="640" y="48" text-anchor="middle">PIPELINE execution tracked in MLflow</text>

  <!-- Left column -->
  <g transform="translate(44,108)">
    <rect class="box" width="252" height="106" fill="#bfdbfe" />
    <text class="caption" x="126" y="34" text-anchor="middle">PIPELINE page</text>
    <text class="body" x="126" y="64" text-anchor="middle">user clicks</text>
    <text class="body" x="126" y="86" text-anchor="middle">Run pipeline</text>
  </g>

  <g transform="translate(44,260)">
    <rect class="box" width="252" height="128" fill="#ddd6fe" />
    <text class="caption" x="126" y="34" text-anchor="middle">lab_steps.toml</text>
    <text class="body" x="126" y="66" text-anchor="middle">step description</text>
    <text class="body" x="126" y="88" text-anchor="middle">prompt, model, engine, runtime</text>
  </g>

  <g transform="translate(44,446)">
    <rect class="box" width="252" height="118" fill="#e2e8f0" />
    <text class="caption" x="126" y="34" text-anchor="middle">Execution paths</text>
    <text class="body" x="126" y="66" text-anchor="middle">runpy in the managed env</text>
    <text class="body" x="126" y="88" text-anchor="middle">or subprocess in a selected venv</text>
  </g>

  <!-- Main center lane -->
  <g transform="translate(356,108)">
    <rect class="box" width="500" height="106" fill="#fde68a" />
    <text class="caption" x="250" y="34" text-anchor="middle">Parent MLflow run</text>
    <text class="body" x="250" y="64" text-anchor="middle">one run for the whole pipeline execution</text>
    <text class="body" x="250" y="86" text-anchor="middle">logs lab-level metadata and the run log</text>
  </g>

  <g transform="translate(330,252)">
    <rect class="panel" width="620" height="270" fill="#fff7ed" />
    <text class="caption" x="24" y="36">Nested step runs</text>
    <text class="small muted" x="24" y="58">each executed step becomes its own MLflow run under the parent</text>
  </g>

  <rect class="pill" x="356" y="296" width="320" height="32" />
  <text class="small muted" x="516" y="316" text-anchor="middle">metadata comes from lab_steps.toml</text>

  <g transform="translate(356,358)">
    <rect class="box" width="178" height="124" fill="#fee2e2" />
    <text class="caption" x="89" y="34" text-anchor="middle">Step 1 run</text>
    <text class="body" x="89" y="66" text-anchor="middle">nested MLflow run</text>
    <text class="body" x="89" y="88" text-anchor="middle">params + stdout</text>
    <text class="body" x="89" y="110" text-anchor="middle">snippet + dataframe</text>
  </g>

  <g transform="translate(551,358)">
    <rect class="box" width="178" height="124" fill="#fee2e2" />
    <text class="caption" x="89" y="34" text-anchor="middle">Step 2 run</text>
    <text class="body" x="89" y="66" text-anchor="middle">same tracking URI</text>
    <text class="body" x="89" y="88" text-anchor="middle">same artifact contract</text>
    <text class="body" x="89" y="110" text-anchor="middle">different step metadata</text>
  </g>

  <g transform="translate(746,358)">
    <rect class="box" width="178" height="124" fill="#fee2e2" />
    <text class="caption" x="89" y="34" text-anchor="middle">Step N run</text>
    <text class="body" x="89" y="66" text-anchor="middle">keeps the full step trace</text>
    <text class="body" x="89" y="88" text-anchor="middle">visible after the run</text>
    <text class="body" x="89" y="110" text-anchor="middle">in the same MLflow UI</text>
  </g>

  <g transform="translate(356,570)">
    <rect class="box" width="500" height="102" fill="#e0f2fe" />
    <text class="caption" x="250" y="36" text-anchor="middle">Shared runtime contract</text>
    <text class="body" x="250" y="66" text-anchor="middle">
      <tspan x="250" dy="0">runpy and subprocess steps both receive</tspan>
      <tspan x="250" dy="18">the same MLFLOW_TRACKING_URI</tspan>
    </text>
  </g>

  <!-- Right column -->
  <g transform="translate(984,108)">
    <rect class="box" width="246" height="106" fill="#c7f9cc" />
    <text class="caption" x="123" y="34" text-anchor="middle">MLFLOW_TRACKING_DIR</text>
    <text class="body" x="123" y="64" text-anchor="middle">shared tracking store</text>
    <text class="body" x="123" y="86" text-anchor="middle">all runs write here</text>
  </g>

  <rect class="pill" x="990" y="390" width="214" height="32" />
  <text class="small muted" x="1097" y="410" text-anchor="middle">all step traces converge here</text>

  <g transform="translate(1014,570)">
    <rect class="box" width="186" height="96" fill="#bae6fd" />
    <text class="caption" x="93" y="34" text-anchor="middle">MLflow UI</text>
    <text class="body" x="93" y="66" text-anchor="middle">sidebar Open UI link</text>
    <text class="body" x="93" y="88" text-anchor="middle">reads the same store</text>
  </g>

  <!-- Flow arrows -->
  <path class="arrow" d="M296,161 L356,161" />
  <path class="soft-arrow" d="M296,260 L356,296" />
  <path class="soft-arrow" d="M296,564 L356,570" />

  <path class="arrow" d="M356,214 L330,252" />
  <path class="soft-arrow" d="M356,570 L330,522" />

  <path class="arrow" d="M856,161 L984,161" />
  <path class="soft-arrow" d="M950,406 L990,406" />
  <path class="arrow" d="M1204,390 L1230,214" />
  <path class="arrow" d="M1230,214 L1200,570" />
</svg>
