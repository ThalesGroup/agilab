<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="840" viewBox="0 0 1380 840" role="img" aria-labelledby="title desc">
  <title id="title">PIPELINE execution tracked in MLflow</title>
  <desc id="desc">Shows how Run pipeline creates one parent MLflow run, one nested run per executed step, and sends both in-process and subprocess execution traces to the same MLflow tracking store and UI.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .panel { stroke: #94a3b8; stroke-width: 1.6; rx: 20; ry: 20; }
      .title { font-size: 26px; font-weight: 700; }
      .caption { font-size: 18px; font-weight: 700; }
      .body { font-size: 13px; }
      .small { font-size: 12px; }
      .muted { fill: #334155; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); }
      .pill { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a" />
    </marker>
    <marker id="arrow-soft" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="28" ry="28" />
  <text class="title" x="690" y="54" text-anchor="middle">PIPELINE execution tracked in MLflow</text>

  <!-- Left column -->
  <g transform="translate(48,120)">
    <rect class="box" width="268" height="112" fill="#bfdbfe" />
    <text class="caption" x="134" y="36" text-anchor="middle">PIPELINE page</text>
    <text class="body" x="134" y="68" text-anchor="middle">user clicks</text>
    <text class="body" x="134" y="90" text-anchor="middle">Run pipeline</text>
  </g>

  <g transform="translate(48,292)">
    <rect class="box" width="268" height="132" fill="#ddd6fe" />
    <text class="caption" x="134" y="36" text-anchor="middle">lab_steps.toml</text>
    <text class="body" x="134" y="70" text-anchor="middle">step definitions</text>
    <text class="body" x="134" y="92" text-anchor="middle">prompt, model, engine, runtime</text>
  </g>

  <g transform="translate(48,528)">
    <rect class="box" width="268" height="122" fill="#e2e8f0" />
    <text class="caption" x="134" y="36" text-anchor="middle">Execution paths</text>
    <text class="body" x="134" y="70" text-anchor="middle">runpy in the managed env</text>
    <text class="body" x="134" y="92" text-anchor="middle">or subprocess in a selected venv</text>
  </g>

  <!-- Center column -->
  <g transform="translate(392,120)">
    <rect class="box" width="560" height="112" fill="#fde68a" />
    <text class="caption" x="280" y="36" text-anchor="middle">Parent MLflow run</text>
    <text class="body" x="280" y="68" text-anchor="middle">one pipeline-level run</text>
    <text class="body" x="280" y="90" text-anchor="middle">stores run log and lab-level metadata</text>
  </g>

  <g transform="translate(360,282)">
    <rect class="panel" width="640" height="282" fill="#fff7ed" />
    <text class="caption" x="320" y="40" text-anchor="middle">Nested step runs</text>
  <text class="small muted" x="320" y="62" text-anchor="middle">one nested MLflow run is created for each executed step</text>
  </g>

  <rect class="pill" x="392" y="362" width="336" height="34" />
  <text class="small muted" x="560" y="383" text-anchor="middle">step metadata comes from lab_steps.toml</text>

  <g transform="translate(392,424)">
    <rect class="box" width="184" height="128" fill="#fee2e2" />
    <text class="caption" x="92" y="36" text-anchor="middle">Step 1 run</text>
    <text class="body" x="92" y="70" text-anchor="middle">nested MLflow run</text>
    <text class="body" x="92" y="92" text-anchor="middle">params + stdout</text>
    <text class="body" x="92" y="114" text-anchor="middle">snippet + dataframe</text>
  </g>

  <g transform="translate(588,424)">
    <rect class="box" width="184" height="128" fill="#fee2e2" />
    <text class="caption" x="92" y="36" text-anchor="middle">Step 2 run</text>
    <text class="body" x="92" y="70" text-anchor="middle">same tracking URI</text>
    <text class="body" x="92" y="92" text-anchor="middle">same artifact contract</text>
    <text class="body" x="92" y="114" text-anchor="middle">different step metadata</text>
  </g>

  <g transform="translate(784,424)">
    <rect class="box" width="184" height="128" fill="#fee2e2" />
    <text class="caption" x="92" y="36" text-anchor="middle">Step N run</text>
    <text class="body" x="92" y="70" text-anchor="middle">keeps the full step trace</text>
    <text class="body" x="92" y="92" text-anchor="middle">visible after the run</text>
    <text class="body" x="92" y="114" text-anchor="middle">in the same MLflow UI</text>
  </g>

  <g transform="translate(392,589)">
    <rect class="box" width="560" height="114" fill="#e0f2fe" />
    <text class="caption" x="280" y="38" text-anchor="middle">Shared runtime contract</text>
    <text class="body" x="280" y="72" text-anchor="middle">
      <tspan x="280" dy="0">runpy and subprocess steps both receive</tspan>
      <tspan x="280" dy="18">the same MLFLOW_TRACKING_URI</tspan>
    </text>
  </g>

  <!-- Right column -->
  <g transform="translate(1032,120)">
    <rect class="box" width="272" height="112" fill="#c7f9cc" />
    <text class="caption" x="136" y="36" text-anchor="middle">MLFLOW_TRACKING_DIR</text>
    <text class="body" x="136" y="68" text-anchor="middle">shared tracking store</text>
    <text class="body" x="136" y="90" text-anchor="middle">parent run and step runs write here</text>
  </g>

  <rect class="pill" x="1036" y="466" width="250" height="34" />
  <text class="small muted" x="1161" y="487" text-anchor="middle">all run traces converge in the same store</text>

  <g transform="translate(1064,591)">
    <rect class="box" width="208" height="112" fill="#bae6fd" />
    <text class="caption" x="104" y="38" text-anchor="middle">MLflow UI</text>
    <text class="body" x="104" y="72" text-anchor="middle">sidebar Open UI link</text>
    <text class="body" x="104" y="94" text-anchor="middle">reads the same store</text>
  </g>

  <!-- Orthogonal flow arrows -->
  <path class="arrow" d="M316,176 H392" />
  <path class="soft-arrow" d="M316,379 H392" />
  <path class="soft-arrow" d="M316,615 H392" />

  <path class="arrow" d="M672,232 V282" />

  <path class="arrow" d="M952,176 H1032" />
  <path class="soft-arrow" d="M1000,482 H1036" />
  <path class="arrow" d="M1168,232 V591" />
</svg>
