<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline example</title>
  <desc id="desc">Example analysis pipeline where air trajectories, space trajectories, and environment maps feed a simulation stage, then learned and optimization decision engines, then visualisation and KPI reporting.</desc>
  <defs>
    <style>
      text {
        font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        fill: #10233f;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 16px;
        fill: #566b88;
      }
      .lane {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        fill: #72859d;
      }
      .card {
        stroke: #10233f;
        stroke-width: 2.4;
        rx: 24;
        ry: 24;
      }
      .card-title {
        font-size: 22px;
        font-weight: 700;
      }
      .card-body {
        font-size: 16px;
      }
      .card-note {
        font-size: 14px;
        fill: #4d617b;
      }
      .arrow {
        stroke: #10233f;
        stroke-width: 3.2;
        stroke-linecap: round;
      }
      .arrow-soft {
        stroke: #627892;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-dasharray: 8 8;
      }
      .label {
        font-size: 14px;
        fill: #556a86;
      }
      .callout {
        stroke: #d8e1ee;
        stroke-width: 2;
        rx: 18;
        ry: 18;
      }
      .callout-title {
        font-size: 16px;
        font-weight: 700;
      }
      .callout-body {
        font-size: 14px;
        fill: #4d617b;
      }
    </style>
    <marker id="arrowhead-pipe" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#10233f" />
    </marker>
    <marker id="arrowhead-pipe-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#627892" />
    </marker>
    <linearGradient id="pipe-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#edf3fb" />
    </linearGradient>
  </defs>

  <rect width="1280" height="560" fill="url(#pipe-bg)" rx="34" ry="34" />

  <g transform="translate(64,52)">
    <text class="title" x="0" y="0">Pipeline example</text>
    <text class="subtitle" x="0" y="30">Trajectory and environment inputs feed simulation, then learned and optimization baselines, then maps and KPI outputs.</text>
  </g>

  <g transform="translate(60,118)">
    <text class="lane" x="0" y="30">Inputs</text>
    <text class="lane" x="0" y="230">Processing and decisions</text>
    <text class="lane" x="0" y="438">Outputs</text>
  </g>

  <g transform="translate(138,108)">
    <rect class="card" width="236" height="96" fill="#d8ebff" />
    <text class="card-title" x="118" y="34" text-anchor="middle">Trajectory generator</text>
    <text class="card-body" x="118" y="62" text-anchor="middle">Air tracks</text>
  </g>

  <g transform="translate(138,228)">
    <rect class="card" width="236" height="96" fill="#d8ebff" />
    <text class="card-title" x="118" y="34" text-anchor="middle">Trajectory generator</text>
    <text class="card-body" x="118" y="62" text-anchor="middle">Space tracks</text>
  </g>

  <g transform="translate(138,348)">
    <rect class="card" width="236" height="96" fill="#dff6ff" />
    <text class="card-title" x="118" y="34" text-anchor="middle">Environment maps</text>
    <text class="card-body" x="118" y="62" text-anchor="middle">Weather and attenuation layers</text>
  </g>

  <g transform="translate(456,220)">
    <rect class="card" width="264" height="112" fill="#d7f7dc" />
    <text class="card-title" x="132" y="38" text-anchor="middle">Simulation</text>
    <text class="card-body" x="132" y="68" text-anchor="middle">Link model and demand model</text>
    <text class="card-note" x="132" y="92" text-anchor="middle">Shared state prepared for downstream decisions</text>
  </g>

  <g transform="translate(804,150)">
    <rect class="card" width="258" height="104" fill="#ffe8a8" />
    <text class="card-title" x="129" y="36" text-anchor="middle">Learned decision engine</text>
    <text class="card-body" x="129" y="66" text-anchor="middle">ML and RL allocation policies</text>
  </g>

  <g transform="translate(804,300)">
    <rect class="card" width="258" height="104" fill="#ffe8a8" />
    <text class="card-title" x="129" y="36" text-anchor="middle">Optimization baseline</text>
    <text class="card-body" x="129" y="66" text-anchor="middle">ILP and MILP allocation reference</text>
  </g>

  <g transform="translate(1132,226)">
    <rect class="card" width="112" height="112" fill="#ffd7ea" />
    <text class="card-title" x="56" y="38" text-anchor="middle">Visualisation</text>
    <text class="card-body" x="56" y="68" text-anchor="middle">Maps</text>
    <text class="card-body" x="56" y="90" text-anchor="middle">Charts</text>
  </g>

  <g transform="translate(856,450)">
    <rect class="callout" width="294" height="64" fill="#ffffff" />
    <text class="callout-title" x="20" y="28">Decision output contract</text>
    <text class="callout-body" x="20" y="50">Both engines emit allocations that feed the same KPI and visual analysis layer.</text>
  </g>

  <line class="arrow" x1="374" y1="156" x2="456" y2="246" marker-end="url(#arrowhead-pipe)" />
  <line class="arrow" x1="374" y1="276" x2="456" y2="276" marker-end="url(#arrowhead-pipe)" />
  <line class="arrow" x1="374" y1="396" x2="456" y2="306" marker-end="url(#arrowhead-pipe)" />

  <line class="arrow" x1="720" y1="256" x2="804" y2="202" marker-end="url(#arrowhead-pipe)" />
  <line class="arrow" x1="720" y1="296" x2="804" y2="352" marker-end="url(#arrowhead-pipe)" />

  <line class="arrow" x1="1062" y1="202" x2="1132" y2="254" marker-end="url(#arrowhead-pipe)" />
  <line class="arrow" x1="1062" y1="352" x2="1132" y2="310" marker-end="url(#arrowhead-pipe)" />

  <text class="label" x="406" y="340">attenuation inputs</text>
  <text class="label" x="1080" y="186">allocations</text>
  <text class="label" x="1080" y="394">allocations</text>

  <line class="arrow-soft" x1="1188" y1="338" x2="1188" y2="450" marker-end="url(#arrowhead-pipe-soft)" />
</svg>
