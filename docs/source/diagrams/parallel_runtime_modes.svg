<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">AGILAB parallel runtime modes</title>
  <desc id="desc">A three-step diagram showing how a parallel stage contract becomes partitions and how different runtime modes execute or only preview those partitions.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#f1f8f4"/>
      <stop offset="1" stop-color="#edf4ff"/>
    </linearGradient>
    <linearGradient id="contractGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="partitionGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="134%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#3f5870"/>
    </marker>
    <style>
      .title { font: 700 33px Arial, Helvetica, sans-serif; fill: #10243d; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #52657a; }
      .step-num { font: 700 14px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .step-label { font: 700 13px Arial, Helvetica, sans-serif; letter-spacing: .08em; text-transform: uppercase; fill: #0f766e; }
      .step-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #10243d; }
      .card-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #10243d; }
      .mode-label { font: 700 12px Arial, Helvetica, sans-serif; letter-spacing: .08em; text-transform: uppercase; fill: #0f766e; }
      .body { font: 400 14px Arial, Helvetica, sans-serif; fill: #2f4154; }
      .note { font: 400 12.5px Arial, Helvetica, sans-serif; fill: #587086; }
      .mono { font: 700 13.5px "Courier New", monospace; fill: #eef7ff; }
      .panel { fill: #ffffff; stroke: #c9d8e6; stroke-width: 1.4; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #c9d8e6; stroke-width: 1.3; filter: url(#shadow); }
      .soft { fill: #f8fbff; stroke: #d7e3ee; stroke-width: 1.1; }
      .partition { fill: #dff7ec; stroke: #12937b; stroke-width: 1.2; }
      .worker { fill: #e8f0ff; stroke: #4f79d8; stroke-width: 1.2; }
      .inner { fill: #fff4dd; stroke: #d97706; stroke-width: 1.2; }
      .arrow { stroke: #3f5870; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #d9e4ef; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1200" height="860" fill="url(#page)"/>

  <text class="title" x="70" y="66">Parallelism is a contract first, then a runtime choice</text>
  <text class="subtitle" x="70" y="96">Define partitions and reducer once. Let the selected runtime decide what starts and where work runs.</text>

  <g id="top-flow">
    <rect class="panel" x="70" y="138" width="305" height="168" rx="22"/>
    <circle cx="102" cy="170" r="18" fill="#0f766e"/>
    <text class="step-num" x="97" y="175">1</text>
    <text class="step-label" x="132" y="166">Contract</text>
    <text class="step-title" x="132" y="193">Describe intent</text>
    <rect x="96" y="216" width="245" height="58" rx="14" fill="url(#contractGrad)"/>
    <text class="mono" x="116" y="240">
      <tspan x="116" dy="0">function + split rule</tspan>
      <tspan x="116" dy="22">+ reducer</tspan>
    </text>
    <text class="note" x="96" y="294">No workers start from the file alone.</text>

    <path class="arrow" d="M 384 222 L 438 222"/>

    <rect class="panel" x="448" y="138" width="305" height="168" rx="22"/>
    <circle cx="480" cy="170" r="18" fill="#1d4ed8"/>
    <text class="step-num" x="475" y="175">2</text>
    <text class="step-label" x="510" y="166">Partition plan</text>
    <text class="step-title" x="510" y="193">Create work units</text>
    <rect class="soft" x="478" y="216" width="245" height="58" rx="14"/>
    <g transform="translate(498 232)">
      <rect class="partition" x="0" y="0" width="37" height="26" rx="7"/>
      <rect class="partition" x="47" y="0" width="37" height="26" rx="7"/>
      <rect class="partition" x="94" y="0" width="37" height="26" rx="7"/>
      <rect class="partition" x="141" y="0" width="37" height="26" rx="7"/>
      <rect class="partition" x="188" y="0" width="37" height="26" rx="7"/>
    </g>
    <text class="note" x="478" y="294">Partitions, not files, are scheduled.</text>

    <path class="arrow" d="M 762 222 L 816 222"/>

    <rect class="panel" x="826" y="138" width="305" height="168" rx="22"/>
    <circle cx="858" cy="170" r="18" fill="#d97706"/>
    <text class="step-num" x="853" y="175">3</text>
    <text class="step-label" x="888" y="166">Runtime</text>
    <text class="step-title" x="888" y="193">Choose execution</text>
    <text class="body" x="858" y="226">
      <tspan x="858" dy="0">Preview may only plan.</tspan>
      <tspan x="858" dy="22">Local and distributed modes</tspan>
      <tspan x="858" dy="22">actually dispatch partitions.</tspan>
    </text>
    <text class="note" x="858" y="294">Evidence is written by the consuming runtime.</text>
  </g>

  <text class="step-label" x="70" y="366">Runtime modes</text>
  <text class="subtitle" x="70" y="392">Same contract, different execution boundary.</text>

  <g id="mode-cards">
    <g transform="translate(65 420)">
      <rect class="card" x="0" y="0" width="200" height="224" rx="20"/>
      <text class="mode-label" x="24" y="34">Preview</text>
      <text class="card-title" x="24" y="63">Plan only</text>
      <text class="body" x="24" y="96">
        <tspan x="24" dy="0">No worker.</tspan>
        <tspan x="24" dy="21">No scheduler.</tspan>
        <tspan x="24" dy="21">Validates the</tspan>
        <tspan x="24" dy="21">contract and</tspan>
        <tspan x="24" dy="21">estimates partitions.</tspan>
      </text>
      <line class="muted-line" x1="24" y1="184" x2="176" y2="184"/>
      <text class="note" x="24" y="207">Output: preview JSON</text>
    </g>

    <g transform="translate(295 420)">
      <rect class="card" x="0" y="0" width="200" height="224" rx="20"/>
      <text class="mode-label" x="24" y="34">Local</text>
      <text class="card-title" x="24" y="63">Dispatcher pool</text>
      <text class="body" x="24" y="96">
        <tspan x="24" dy="0">One partition can</tspan>
        <tspan x="24" dy="21">be proven first.</tspan>
        <tspan x="24" dy="21">Then local pools</tspan>
        <tspan x="24" dy="21">run partitions on</tspan>
        <tspan x="24" dy="21">one machine.</tspan>
      </text>
      <line class="muted-line" x1="24" y1="184" x2="176" y2="184"/>
      <text class="note" x="24" y="207">No Dask dashboard</text>
    </g>

    <g transform="translate(525 420)">
      <rect class="card" x="0" y="0" width="200" height="224" rx="20"/>
      <text class="mode-label" x="24" y="34">Dask</text>
      <text class="card-title" x="24" y="63">Outer scheduler</text>
      <g transform="translate(24 88)">
        <rect class="worker" x="0" y="0" width="64" height="34" rx="9"/>
        <rect class="worker" x="82" y="0" width="64" height="34" rx="9"/>
        <text class="note" x="18" y="22">task</text>
        <text class="note" x="100" y="22">task</text>
      </g>
      <text class="body" x="24" y="146">
        <tspan x="24" dy="0">Dashboard sees</tspan>
        <tspan x="24" dy="21">coarse AGILAB</tspan>
        <tspan x="24" dy="21">work-plan tasks.</tspan>
      </text>
      <text class="note" x="24" y="207">Nested inner work is opaque</text>
    </g>

    <g transform="translate(755 420)">
      <rect class="card" x="0" y="0" width="200" height="224" rx="20"/>
      <text class="mode-label" x="24" y="34">Service</text>
      <text class="card-title" x="24" y="63">Persistent workers</text>
      <text class="body" x="24" y="96">
        <tspan x="24" dy="0">Workers stay alive</tspan>
        <tspan x="24" dy="21">and pull partition</tspan>
        <tspan x="24" dy="21">tasks across runs.</tspan>
        <tspan x="24" dy="21">Health gates decide</tspan>
        <tspan x="24" dy="21">if work proceeds.</tspan>
      </text>
      <line class="muted-line" x1="24" y1="184" x2="176" y2="184"/>
      <text class="note" x="24" y="207">Best for repeated runs</text>
    </g>

    <g transform="translate(985 420)">
      <rect class="card" x="0" y="0" width="200" height="224" rx="20"/>
      <text class="mode-label" x="24" y="34">Inside worker</text>
      <text class="card-title" x="24" y="63">Library threads</text>
      <rect class="inner" x="24" y="86" width="150" height="42" rx="12"/>
      <text class="note" x="47" y="112">Polars / NumPy</text>
      <text class="body" x="24" y="154">
        <tspan x="24" dy="0">Inner threads are</tspan>
        <tspan x="24" dy="21">not separate</tspan>
        <tspan x="24" dy="21">AGILAB tasks.</tspan>
      </text>
      <text class="note" x="24" y="207">Avoid over-stacking workers</text>
    </g>
  </g>

  <g id="bottom-rule">
    <rect x="110" y="710" width="980" height="80" rx="24" fill="#10243d" filter="url(#shadow)"/>
    <text x="150" y="745" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Rule of thumb</text>
    <text x="150" y="774" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#dcecff">Create enough independent partitions, then pick the lightest runtime that can execute them.</text>
  </g>
</svg>
