<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="840" viewBox="0 0 1360 840" role="img" aria-labelledby="title desc">
  <title id="title">AGILAB quick tour</title>
  <desc id="desc">Compact onboarding diagram for the AGILAB README showing the main user path from PROJECT to ANALYSIS and the resulting productivity gain.</desc>
  <defs>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        fill: #11283f;
      }
      .title {
        font-size: 42px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 21px;
        fill: #536c88;
      }
      .section {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #657d98;
      }
      .card {
        stroke: #17324d;
        stroke-width: 3.2;
        rx: 30;
        ry: 30;
      }
      .card-title {
        font-size: 23px;
        font-weight: 700;
      }
      .card-body {
        font-size: 17px;
        fill: #39536f;
      }
      .mini {
        font-size: 15px;
        fill: #617997;
      }
      .pill {
        fill: #17324d;
      }
      .pill-text {
        font-size: 14px;
        font-weight: 700;
        fill: #f8fbff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .step-circle {
        fill: #17324d;
      }
      .step-text {
        font-size: 18px;
        font-weight: 700;
        fill: #f8fbff;
      }
      .value-title {
        font-size: 20px;
        font-weight: 700;
      }
      .value-body {
        font-size: 16px;
        fill: #3d5875;
      }
      .arrow {
        stroke: #17324d;
        stroke-width: 4.8;
        stroke-linecap: round;
      }
      .soft-arrow {
        stroke: #8298b4;
        stroke-width: 3.4;
        stroke-linecap: round;
      }
      .line {
        stroke: #d4deea;
        stroke-width: 2.2;
      }
      .shadow {
        filter: url(#shadow);
      }
      .arrow-head {
        fill: #17324d;
      }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfdff" />
      <stop offset="100%" stop-color="#eef4fb" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#90a5c1" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1360" height="840" fill="url(#bg)" rx="36" ry="36" />

  <g transform="translate(80,68)">
    <text class="title" x="0" y="0">AGILAB in one quick tour</text>
    <text class="subtitle" x="0" y="40">
      <tspan x="0" dy="0">Use the built-in flight project to see one app, one execution path,</tspan>
      <tspan x="0" dy="28">and one visible analysis loop in a few minutes.</tspan>
    </text>
  </g>

  <g transform="translate(80,150)">
    <rect x="0" y="0" width="430" height="82" rx="24" ry="24" fill="#ffffff" stroke="#d6dfeb" stroke-width="2.2" class="shadow" />
    <rect x="18" y="18" width="112" height="36" rx="18" ry="18" class="pill" />
    <text class="pill-text" x="74" y="41" text-anchor="middle">Demo path</text>
    <text class="card-body" x="154" y="40">
      <tspan x="154" dy="0">flight_project demo:</tspan>
      <tspan x="154" dy="22">PROJECT → ANALYSIS</tspan>
    </text>
  </g>

  <g transform="translate(80,258)">
    <text class="section" x="0" y="0">Main user path</text>
    <line class="line" x1="220" y1="-8" x2="1200" y2="-8" />
  </g>

  <g transform="translate(60,290)">
    <rect class="card shadow" width="270" height="230" fill="#d9efff" />
    <circle class="step-circle" cx="34" cy="34" r="18" />
    <text class="step-text" x="34" y="40" text-anchor="middle">1</text>
    <text class="card-title" x="58" y="42">PROJECT</text>
    <text class="card-body" x="28" y="86">Choose the active app.</text>
    <text class="card-body" x="28" y="112">Load settings and source.</text>
    <text class="mini" x="28" y="188">Start with the built-in</text>
    <text class="mini" x="28" y="210">flight_project demo.</text>
  </g>

  <g transform="translate(370,290)">
    <rect class="card shadow" width="270" height="230" fill="#e1dcff" />
    <circle class="step-circle" cx="34" cy="34" r="18" />
    <text class="step-text" x="34" y="40" text-anchor="middle">2</text>
    <text class="card-title" x="58" y="42">ORCHESTRATE</text>
    <text class="card-body" x="28" y="86">Install, package, and run.</text>
    <text class="card-body" x="28" y="112">Launch one documented</text>
    <text class="card-body" x="28" y="138">execution path.</text>
    <text class="mini" x="28" y="188">This is where AGILAB removes</text>
    <text class="mini" x="28" y="210">the most manual glue work.</text>
  </g>

  <g transform="translate(680,290)">
    <rect class="card shadow" width="270" height="230" fill="#fff2bf" />
    <circle class="step-circle" cx="34" cy="34" r="18" />
    <text class="step-text" x="34" y="40" text-anchor="middle">3</text>
    <text class="card-title" x="58" y="42">PIPELINE</text>
    <text class="card-body" x="28" y="86">Inspect generated steps.</text>
    <text class="card-body" x="28" y="112">Replay snippets and</text>
    <text class="card-body" x="28" y="138">execution flow.</text>
    <text class="mini" x="28" y="188">Useful for debugging,</text>
    <text class="mini" x="28" y="210">validation, and repeatability.</text>
  </g>

  <g transform="translate(990,290)">
    <rect class="card shadow" width="270" height="230" fill="#ffe2e9" />
    <circle class="step-circle" cx="34" cy="34" r="18" />
    <text class="step-text" x="34" y="40" text-anchor="middle">4</text>
    <text class="card-title" x="58" y="42">ANALYSIS</text>
    <text class="card-body" x="28" y="86">Open built-in views.</text>
    <text class="card-body" x="28" y="112">Review artifacts</text>
    <text class="card-body" x="28" y="138">and visible outputs.</text>
    <text class="mini" x="28" y="188">The demo ends with evidence,</text>
    <text class="mini" x="28" y="210">not only shell logs.</text>
  </g>

  <line class="arrow" x1="336" y1="426" x2="354" y2="426" />
  <polygon class="arrow-head" points="354,418 354,434 370,426" />
  <line class="arrow" x1="646" y1="426" x2="664" y2="426" />
  <polygon class="arrow-head" points="664,418 664,434 680,426" />
  <line class="arrow" x1="956" y1="426" x2="974" y2="426" />
  <polygon class="arrow-head" points="974,418 974,434 990,426" />

  <g transform="translate(80,562)">
    <text class="section" x="0" y="0">What AGILAB gives you</text>
    <line class="line" x1="210" y1="-8" x2="1200" y2="-8" />
  </g>

  <g transform="translate(60,598)">
    <rect class="card shadow" width="270" height="146" fill="#ffffff" />
    <text class="value-title" x="24" y="40">One app path</text>
    <text class="value-body" x="24" y="74">The demo starts from</text>
    <text class="value-body" x="24" y="98">one concrete app,</text>
    <text class="value-body" x="24" y="122">not a generic shell script.</text>
  </g>

  <g transform="translate(370,598)">
    <rect class="card shadow" width="270" height="146" fill="#ffffff" />
    <text class="value-title" x="24" y="40">Less glue code</text>
    <text class="value-body" x="24" y="74">AGILAB handles envs,</text>
    <text class="value-body" x="24" y="98">packaging, and launch</text>
    <text class="value-body" x="24" y="122">instead of ad hoc scripting.</text>
  </g>

  <g transform="translate(680,598)">
    <rect class="card shadow" width="270" height="146" fill="#ffffff" />
    <text class="value-title" x="24" y="40">Visible trace</text>
    <text class="value-body" x="24" y="74">Generated steps stay</text>
    <text class="value-body" x="24" y="98">inspectable and replayable</text>
    <text class="value-body" x="24" y="122">during debugging.</text>
  </g>

  <g transform="translate(990,598)">
    <rect class="card shadow" width="270" height="146" fill="#ffffff" />
    <text class="value-title" x="24" y="40">Evidence first</text>
    <text class="value-body" x="24" y="74">The path ends in</text>
    <text class="value-body" x="24" y="98">views and artifacts,</text>
    <text class="value-body" x="24" y="122">not only terminal logs.</text>
  </g>

  <line class="soft-arrow" x1="195" y1="528" x2="195" y2="580" />
  <polygon points="187,580 203,580 195,596" fill="#8298b4" />
  <line class="soft-arrow" x1="505" y1="528" x2="505" y2="580" />
  <polygon points="497,580 513,580 505,596" fill="#8298b4" />
  <line class="soft-arrow" x1="815" y1="528" x2="815" y2="580" />
  <polygon points="807,580 823,580 815,596" fill="#8298b4" />
  <line class="soft-arrow" x1="1125" y1="528" x2="1125" y2="580" />
  <polygon points="1117,580 1133,580 1125,596" fill="#8298b4" />

  <g transform="translate(80,762)">
    <rect x="0" y="0" width="1180" height="52" rx="22" ry="22" fill="#ffffff" stroke="#d6dfeb" stroke-width="2.2" class="shadow" />
    <text class="value-title" x="28" y="34">Productivity gain</text>
    <text class="value-body" x="232" y="34">Less orchestration work before the model work even starts.</text>
  </g>
</svg>
