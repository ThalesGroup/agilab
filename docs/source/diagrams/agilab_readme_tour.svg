<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="940" viewBox="0 0 1360 940" role="img" aria-labelledby="title desc">
  <title id="title">AGILAB 3-minute tour</title>
  <desc id="desc">Narrative README diagram showing the built-in UAV Relay Queue path across Project, Orchestrate, Workflow, and Analysis, then the concrete value AGILAB gives to engineering teams.</desc>
  <defs>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        fill: #10263a;
      }
      .title {
        font-size: 46px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 21px;
        fill: #55708c;
      }
      .eyebrow {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #5d7691;
      }
      .chip-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #f8fbff;
      }
      .section-label {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #6a829c;
      }
      .card-title {
        font-size: 24px;
        font-weight: 700;
      }
      .card-kicker {
        font-size: 15px;
        font-weight: 700;
        fill: #5f7b96;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .body {
        font-size: 18px;
        fill: #35506d;
      }
      .mini {
        font-size: 15px;
        fill: #5f7895;
      }
      .benefit-title {
        font-size: 22px;
        font-weight: 700;
      }
      .benefit-body {
        font-size: 17px;
        fill: #3a5876;
      }
      .step {
        fill: #18324a;
      }
      .step-text {
        font-size: 18px;
        font-weight: 700;
        fill: #f8fbff;
      }
      .pill-dark {
        fill: #18324a;
      }
      .pill-accent {
        fill: #1c7ed6;
      }
      .line {
        stroke: #d7e2ee;
        stroke-width: 2.4;
      }
      .arrow {
        stroke: #17324d;
        stroke-width: 4.5;
        stroke-linecap: round;
        marker-end: url(#arrowHead);
      }
      .soft-arrow {
        stroke: #87a0bb;
        stroke-width: 3.3;
        stroke-linecap: round;
        marker-end: url(#softArrowHead);
      }
      .card-stroke {
        stroke: #16314a;
        stroke-width: 3;
      }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#8da4be" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17324d"/>
    </marker>
    <marker id="softArrowHead" markerWidth="9" markerHeight="9" refX="7.2" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#87a0bb"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1360" height="940" rx="34" ry="34" fill="url(#bg)"/>

  <g transform="translate(72,64)">
    <text class="eyebrow" x="0" y="0">Start here</text>
    <text class="title" x="0" y="56">AGILAB 3-minute tour</text>
    <text class="subtitle" x="0" y="100">
      <tspan x="0" dy="0">Use the built-in UAV Relay Queue demo to see the full path:</tspan>
      <tspan x="0" dy="28">select one app, run it, inspect the replayable pipeline, and end on queue evidence.</tspan>
    </text>
  </g>

  <g transform="translate(838,62)" filter="url(#shadow)">
    <rect x="0" y="0" width="450" height="94" rx="26" ry="26" fill="#ffffff" stroke="#d7e2ee" stroke-width="2.2"/>
    <rect x="20" y="22" width="124" height="34" rx="17" ry="17" class="pill-dark"/>
    <text class="chip-text" x="82" y="44" text-anchor="middle">Demo app</text>
    <rect x="154" y="22" width="96" height="34" rx="17" ry="17" class="pill-accent"/>
    <text class="chip-text" x="202" y="44" text-anchor="middle">3 minutes</text>
    <text class="body" x="22" y="73">
      <tspan x="22" dy="0">UAV Relay Queue from PROJECT</tspan>
      <tspan x="22" dy="22">to WORKFLOW to ANALYSIS</tspan>
    </text>
  </g>

  <g transform="translate(72,224)">
    <text class="section-label" x="0" y="0" dominant-baseline="middle">One guided path</text>
    <line class="line" x1="188" y1="0" x2="1210" y2="0"/>
  </g>

  <g transform="translate(72,252)" filter="url(#shadow)">
    <rect x="0" y="0" width="274" height="286" rx="30" ry="30" fill="#dcefff" class="card-stroke"/>
    <circle class="step" cx="36" cy="36" r="18"/>
    <text class="step-text" x="36" y="42" text-anchor="middle">1</text>
    <text class="card-title" x="64" y="42">PROJECT</text>
    <text class="card-kicker" x="28" y="78">Choose the app</text>
    <text class="body" x="28" y="116">
      <tspan x="28" dy="0">Select the built-in</tspan>
      <tspan x="28" dy="24">UAV Relay Queue app,</tspan>
      <tspan x="28" dy="24">keep the scenario and</tspan>
      <tspan x="28" dy="24">routing policy visible.</tspan>
    </text>
    <text class="mini" x="28" y="230">
      <tspan x="28" dy="0">You start from one concrete app,</tspan>
      <tspan x="28" dy="22">not from a loose script folder.</tspan>
    </text>
  </g>

  <g transform="translate(384,252)" filter="url(#shadow)">
    <rect x="0" y="0" width="274" height="286" rx="30" ry="30" fill="#e7e1ff" class="card-stroke"/>
    <circle class="step" cx="36" cy="36" r="18"/>
    <text class="step-text" x="36" y="42" text-anchor="middle">2</text>
    <text class="card-title" x="64" y="42">ORCHESTRATE</text>
    <text class="card-kicker" x="28" y="78">Install and run</text>
    <text class="body" x="28" y="116">
      <tspan x="28" dy="0">AGILAB installs and</tspan>
      <tspan x="28" dy="24">runs the queue demo</tspan>
      <tspan x="28" dy="24">through one packaged</tspan>
      <tspan x="28" dy="24">execution path.</tspan>
    </text>
    <text class="mini" x="28" y="230">
      <tspan x="28" dy="0">This is where env bootstrap and</tspan>
      <tspan x="28" dy="22">glue code stop eating time.</tspan>
    </text>
  </g>

  <g transform="translate(696,252)" filter="url(#shadow)">
    <rect x="0" y="0" width="274" height="286" rx="30" ry="30" fill="#fff1bf" class="card-stroke"/>
    <circle class="step" cx="36" cy="36" r="18"/>
    <text class="step-text" x="36" y="42" text-anchor="middle">3</text>
    <text class="card-title" x="64" y="42">WORKFLOW</text>
    <text class="card-kicker" x="28" y="78">Replay the stages</text>
    <text class="body" x="28" y="116">
      <tspan x="28" dy="0">WORKFLOW keeps the</tspan>
      <tspan x="28" dy="24">queue experiment explicit</tspan>
      <tspan x="28" dy="24">with replayable stages</tspan>
      <tspan x="28" dy="24">and topology artifacts.</tspan>
    </text>
    <text class="mini" x="28" y="230">
      <tspan x="28" dy="0">The run stays inspectable,</tspan>
      <tspan x="28" dy="22">not buried in one-off scripts.</tspan>
    </text>
  </g>

  <g transform="translate(1008,252)" filter="url(#shadow)">
    <rect x="0" y="0" width="274" height="286" rx="30" ry="30" fill="#ffe2e9" class="card-stroke"/>
    <circle class="step" cx="36" cy="36" r="18"/>
    <text class="step-text" x="36" y="42" text-anchor="middle">4</text>
    <text class="card-title" x="64" y="42">ANALYSIS</text>
    <text class="card-kicker" x="28" y="78">End on evidence</text>
    <text class="body" x="28" y="116">
      <tspan x="28" dy="0">Open queue plots and</tspan>
      <tspan x="28" dy="24">maps over exported</tspan>
      <tspan x="28" dy="24">drops, delays, and</tspan>
      <tspan x="28" dy="24">route usage evidence.</tspan>
    </text>
    <text class="mini" x="28" y="230">
      <tspan x="28" dy="0">The demo closes the loop with</tspan>
      <tspan x="28" dy="22">visible queue evidence.</tspan>
    </text>
  </g>

  <line class="arrow" x1="352" y1="395" x2="376" y2="395"/>
  <line class="arrow" x1="664" y1="395" x2="688" y2="395"/>
  <line class="arrow" x1="976" y1="395" x2="1000" y2="395"/>

  <g transform="translate(72,596)">
    <text class="section-label" x="0" y="0" dominant-baseline="middle">What you leave with</text>
    <line class="line" x1="230" y1="0" x2="1210" y2="0"/>
  </g>

  <g transform="translate(72,628)" filter="url(#shadow)">
    <rect x="0" y="0" width="386" height="172" rx="28" ry="28" fill="#ffffff" stroke="#d7e2ee" stroke-width="2.4"/>
    <text class="benefit-title" x="28" y="46">One app, one control path</text>
    <text class="benefit-body" x="28" y="84">
      <tspan x="28" dy="0">The tour shows a single app moving</tspan>
      <tspan x="28" dy="24">through UI, orchestration, execution,</tspan>
      <tspan x="28" dy="24">and analysis without changing tools.</tspan>
    </text>
  </g>

  <g transform="translate(486,628)" filter="url(#shadow)">
    <rect x="0" y="0" width="386" height="172" rx="28" ry="28" fill="#ffffff" stroke="#d7e2ee" stroke-width="2.4"/>
    <text class="benefit-title" x="28" y="46">Less manual glue</text>
    <text class="benefit-body" x="28" y="84">
      <tspan x="28" dy="0">AGILAB absorbs environment setup,</tspan>
      <tspan x="28" dy="24">worker packaging, and launch mechanics</tspan>
      <tspan x="28" dy="24">before model work even starts.</tspan>
    </text>
  </g>

  <g transform="translate(900,628)" filter="url(#shadow)">
    <rect x="0" y="0" width="370" height="172" rx="28" ry="28" fill="#ffffff" stroke="#d7e2ee" stroke-width="2.4"/>
    <text class="benefit-title" x="28" y="46">Visible, repeatable evidence</text>
    <text class="benefit-body" x="28" y="84">
      <tspan x="28" dy="0">The path stays inspectable and ends</tspan>
      <tspan x="28" dy="24">with artifacts and views you can</tspan>
      <tspan x="28" dy="24">review, rerun, and share.</tspan>
    </text>
  </g>

  <line class="soft-arrow" x1="265" y1="546" x2="265" y2="612"/>
  <line class="soft-arrow" x1="679" y1="546" x2="679" y2="612"/>
  <line class="soft-arrow" x1="1085" y1="546" x2="1085" y2="612"/>

  <g transform="translate(72,838)" filter="url(#shadow)">
    <rect x="0" y="0" width="1198" height="54" rx="24" ry="24" fill="#ffffff" stroke="#d7e2ee" stroke-width="2.2"/>
    <text class="benefit-title" x="28" y="35">AGILAB promise</text>
    <text class="benefit-body" x="232" y="35">Move from app selection to visible evidence quickly, with far less orchestration overhead than ad hoc scripts.</text>
  </g>
</svg>
