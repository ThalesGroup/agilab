<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">AGI core orchestration</title>
  <desc id="desc">Diagram showing web and CLI entrypoints feeding agi_core, then agi_env, agi_cluster, agi_node workers, and artifacts with a clear orchestration flow.</desc>
  <defs>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        fill: #0e223f;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 16px;
        fill: #536984;
      }
      .lane {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #70849c;
      }
      .card {
        stroke: #0e223f;
        stroke-width: 2.4;
        rx: 22;
        ry: 22;
      }
      .card-title {
        font-size: 22px;
        font-weight: 700;
      }
      .card-body {
        font-size: 16px;
      }
      .card-note {
        font-size: 14px;
        fill: #4d617c;
      }
      .arrow {
        stroke: #0e223f;
        stroke-width: 3.2;
        stroke-linecap: round;
      }
      .arrow-soft {
        stroke: #627790;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-dasharray: 9 8;
      }
      .callout {
        stroke: #d9e2ef;
        stroke-width: 2;
        rx: 18;
        ry: 18;
      }
      .callout-title {
        font-size: 16px;
        font-weight: 700;
      }
      .callout-body {
        font-size: 14px;
        fill: #4d617c;
      }
    </style>
    <marker id="arrowhead-core" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e223f" />
    </marker>
    <marker id="arrowhead-soft-core" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#627790" />
    </marker>
    <linearGradient id="core-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#edf3fb" />
    </linearGradient>
  </defs>

  <rect width="1180" height="560" fill="url(#core-bg)" rx="34" ry="34" />

  <g transform="translate(62,48)">
    <text class="title" x="0" y="0">AGI core orchestration</text>
    <text class="subtitle" x="0" y="30">How entry points feed agi_core, then environment resolution, cluster dispatch, worker execution, and artifacts.</text>
  </g>

  <g transform="translate(60,120)">
    <text class="lane" x="0" y="30">Entry</text>
    <text class="lane" x="0" y="214">Control</text>
    <text class="lane" x="0" y="410">Execution</text>
  </g>

  <g transform="translate(174,108)">
    <rect class="card" width="250" height="116" fill="#d9f0ff" />
    <text class="card-title" x="125" y="34" text-anchor="middle">Web interface</text>
    <text class="card-body" x="125" y="62" text-anchor="middle">agilab.py and built-in pages</text>
    <text class="card-note" x="125" y="88" text-anchor="middle">HOME · PROJECT · ORCHESTRATE · PIPELINE · ANALYSIS</text>
  </g>

  <g transform="translate(174,252)">
    <rect class="card" width="250" height="100" fill="#d9f0ff" />
    <text class="card-title" x="125" y="34" text-anchor="middle">CLI and PyCharm</text>
    <text class="card-body" x="125" y="62" text-anchor="middle">AGI_run scripts · run configs · uv launchers</text>
  </g>

  <g transform="translate(484,170)">
    <rect class="card" width="308" height="142" fill="#e3dcff" />
    <text class="card-title" x="24" y="38">agi_core</text>
    <text class="card-body" x="24" y="72">Resolve app and args, build run plans</text>
    <text class="card-body" x="24" y="96">Drive lab_steps and structured telemetry</text>
    <text class="card-note" x="24" y="122">
      <tspan x="24" dy="0">Reusable widgets, services, history,</tspan>
      <tspan x="24" dy="18">and orchestration helpers</tspan>
    </text>
  </g>

  <g transform="translate(500,350)">
    <rect class="card" width="296" height="92" fill="#ffe8ac" />
    <text class="card-title" x="24" y="36">agi_env</text>
    <text class="card-body" x="24" y="64">Paths, configs, logging, credentials, share roots</text>
  </g>

  <g transform="translate(836,150)">
    <rect class="card" width="276" height="94" fill="#ffdbe2" />
    <text class="card-title" x="138" y="34" text-anchor="middle">Artifacts and telemetry</text>
    <text class="card-body" x="20" y="58">
      <tspan x="20" dy="0">Outputs, logs, history,</tspan>
      <tspan x="20" dy="20">reports and exports</tspan>
    </text>
  </g>

  <g transform="translate(836,284)">
    <rect class="card" width="276" height="94" fill="#d6f6d8" />
    <text class="card-title" x="138" y="34" text-anchor="middle">agi_cluster</text>
    <text class="card-body" x="138" y="60" text-anchor="middle">AGI.distributor, scheduler, Dask, balancing</text>
  </g>

  <g transform="translate(836,410)">
    <rect class="card" width="276" height="104" fill="#ffe7a8" />
    <text class="card-title" x="138" y="34" text-anchor="middle">agi_node workers</text>
    <text class="card-body" x="138" y="60" text-anchor="middle">BaseWorker, DagWorker, PandasWorker, PolarsWorker</text>
    <text class="card-note" x="138" y="86" text-anchor="middle">Plus app-specific workers packaged under <tspan font-style="italic">~/wenv</tspan></text>
  </g>

  <g transform="translate(54,474)">
    <rect class="callout" width="460" height="58" fill="#ffffff" />
    <text class="callout-title" x="20" y="33">Reading guide</text>
    <text class="callout-body" x="136" y="33">Inputs converge into agi_core, then flow through environment setup to cluster and worker execution.</text>
  </g>

  <line class="arrow" x1="424" y1="166" x2="484" y2="210" marker-end="url(#arrowhead-core)" />
  <line class="arrow" x1="424" y1="302" x2="484" y2="254" marker-end="url(#arrowhead-core)" />
  <line class="arrow" x1="648" y1="312" x2="648" y2="350" marker-end="url(#arrowhead-core)" />
  <line class="arrow" x1="792" y1="236" x2="836" y2="198" marker-end="url(#arrowhead-core)" />
  <line class="arrow" x1="796" y1="396" x2="836" y2="331" marker-end="url(#arrowhead-core)" />
  <line class="arrow" x1="974" y1="378" x2="974" y2="410" marker-end="url(#arrowhead-core)" />
  <line class="arrow-soft" x1="792" y1="210" x2="836" y2="210" marker-end="url(#arrowhead-soft-core)" />
</svg>
