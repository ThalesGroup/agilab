<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">AGILAB social card</title>
  <desc id="desc">Shareable AGILAB visual showing UI and CLI entrypoints flowing through packaged workers into reproducible evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.58" stop-color="#f2f8f3"/>
      <stop offset="1" stop-color="#fff6ed"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10324d"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#bf5a24"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f3ff"/>
      <stop offset="1" stop-color="#d7ebff"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8fbf1"/>
      <stop offset="1" stop-color="#d6f4e4"/>
    </linearGradient>
    <linearGradient id="orangeCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3e6"/>
      <stop offset="1" stop-color="#ffe2c4"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.3" fill="#9fb3c8" opacity="0.30"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="134%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#31485f"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #14283f; }
      .eyebrow { font-size: 16px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; fill: #f7fbff; }
      .title { font-size: 54px; font-weight: 800; letter-spacing: -0.03em; fill: #10243d; }
      .subtitle { font-size: 24px; font-weight: 400; fill: #4f667f; }
      .card-label { font-size: 13px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; fill: #0f766e; }
      .card-title { font-size: 24px; font-weight: 800; letter-spacing: -0.015em; fill: #10243d; }
      .card-body { font-size: 17px; font-weight: 400; fill: #415a73; }
      .note { font-size: 14px; font-weight: 700; fill: #31485f; }
      .footer-title { font-size: 23px; font-weight: 800; fill: #ffffff; }
      .footer-body { font-size: 17px; font-weight: 400; fill: #dcecff; }
      .panel { fill: #ffffff; stroke: #c7d7e6; stroke-width: 1.4; filter: url(#shadow); }
      .soft { fill: #ffffff; stroke: #d8e4ee; stroke-width: 1.2; }
      .arrow { stroke: #31485f; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="680" rx="34" fill="url(#dots)" opacity="0.55"/>
  <circle cx="1088" cy="94" r="168" fill="#dbeafe" opacity="0.55"/>
  <circle cx="104" cy="620" r="150" fill="#f8ddc0" opacity="0.50"/>
  <path d="M 830 0 C 960 120, 1006 232, 1200 270 L 1200 0 Z" fill="#e3f4ef" opacity="0.85"/>

  <rect x="62" y="54" width="190" height="48" rx="24" fill="url(#hero)" filter="url(#shadow)"/>
  <text class="eyebrow" x="157" y="84" text-anchor="middle">AGILAB</text>

  <text class="title" x="62" y="164">
    <tspan x="62" dy="0">Turn AI experiments</tspan>
    <tspan x="62" dy="58">into replayable evidence</tspan>
  </text>
  <text class="subtitle" x="62" y="260">
    <tspan x="62" dy="0">One workbench for notebooks, UI runs, packaged workers,</tspan>
    <tspan x="62" dy="31">distributed execution, and health-gated services.</tspan>
  </text>

  <g transform="translate(755 72)">
    <rect class="panel" x="0" y="0" width="370" height="196" rx="28"/>
    <text class="card-label" x="30" y="40">Runtime map</text>
    <g transform="translate(31 65)">
      <rect class="soft" x="0" y="0" width="88" height="46" rx="14"/>
      <rect class="soft" x="0" y="66" width="88" height="46" rx="14"/>
      <text class="note" x="44" y="29" text-anchor="middle">UI</text>
      <text class="note" x="44" y="95" text-anchor="middle">CLI</text>
      <path class="arrow" d="M 98 23 L 154 57"/>
      <path class="arrow" d="M 98 89 L 154 67"/>
      <rect x="164" y="32" width="104" height="48" rx="16" fill="#e8fbf1" stroke="#0f766e" stroke-width="1.3"/>
      <text class="note" x="216" y="61" text-anchor="middle">workers</text>
      <path class="arrow" d="M 278 56 L 318 56"/>
      <circle cx="336" cy="56" r="20" fill="#fff3e6" stroke="#bf5a24" stroke-width="1.4"/>
      <path d="M 327 56 L 334 63 L 346 48" stroke="#bf5a24" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text class="card-body" x="30" y="164">
      <tspan x="30" dy="0">Same project path from entrypoint</tspan>
      <tspan x="30" dy="22">to worker outputs and evidence.</tspan>
    </text>
  </g>

  <g transform="translate(62 330)">
    <rect class="panel" x="0" y="0" width="330" height="176" rx="26" fill="url(#blueCard)"/>
    <text class="card-label" x="28" y="38">Start anywhere</text>
    <text class="card-title" x="28" y="70">UI, CLI, or notebook</text>
    <text class="card-body" x="28" y="106">
      <tspan x="28" dy="0">Keep one project shape while</tspan>
      <tspan x="28" dy="24">moving from exploration to</tspan>
      <tspan x="28" dy="24">repeatable execution.</tspan>
    </text>
  </g>

  <g transform="translate(435 330)">
    <rect class="panel" x="0" y="0" width="330" height="176" rx="26" fill="url(#greenCard)"/>
    <text class="card-label" x="28" y="38">Scale intentionally</text>
    <text class="card-title" x="28" y="70">Workers and services</text>
    <text class="card-body" x="28" y="106">
      <tspan x="28" dy="0">Package environments, isolate</tspan>
      <tspan x="28" dy="24">workers, and choose local, Dask,</tspan>
      <tspan x="28" dy="24">or persistent service mode.</tspan>
    </text>
  </g>

  <g transform="translate(808 330)">
    <rect class="panel" x="0" y="0" width="330" height="176" rx="26" fill="url(#orangeCard)"/>
    <text class="card-label" x="28" y="38">Prove the run</text>
    <text class="card-title" x="28" y="70">Artifacts and health</text>
    <text class="card-body" x="28" y="106">
      <tspan x="28" dy="0">Capture manifests, reducer</tspan>
      <tspan x="28" dy="24">outputs, analysis views, and</tspan>
      <tspan x="28" dy="24">health-gated execution evidence.</tspan>
    </text>
  </g>

  <path class="arrow" d="M 392 418 L 423 418"/>
  <path class="arrow" d="M 765 418 L 796 418"/>

  <rect x="62" y="552" width="1076" height="84" rx="26" fill="#10243d" filter="url(#shadow)"/>
  <text class="footer-title" x="92" y="586">Best fit: experimentation and validation teams</text>
  <text class="footer-body" x="92" y="615">Use AGILAB when you need less manual orchestration and more replayable proof around AI/ML work.</text>
  <rect x="930" y="574" width="178" height="38" rx="19" fill="#f8fbff" opacity="0.96"/>
  <text x="1019" y="598" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" fill="#10243d">PROJECT to ANALYSIS</text>
</svg>
